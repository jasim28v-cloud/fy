<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CHROMA-NEBULA V21 | THE ULTIMATE IONIC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Share+Tech+Mono&family=Cairo:wght@400;700;900&display=swap');
        
        :root { 
            --neon-cyan: #00f2ff; 
            --neon-purple: #bd00ff;
            --neon-gold: #ffd700;
            --bg-black: #000000;
        }

        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg-black); color: #fff; overflow: hidden; font-family: 'Cairo', sans-serif; user-select: none; }

        /* محرك التمرير الكروماتي */
        .scroll-engine { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
        .scroll-engine::-webkit-scrollbar { display: none; }
        .v-seg { height: 100vh; width: 100vw; scroll-snap-align: start; scroll-snap-stop: always; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; background: #000; }
        
        video { 
            width: 100%; height: 100%; object-fit: cover; 
            filter: brightness(0.9) contrast(1.1); 
            mask-image: radial-gradient(circle, black 50%, transparent 98%);
            -webkit-mask-image: radial-gradient(circle, black 50%, transparent 98%);
            transition: 1.2s cubic-bezier(0.19, 1, 0.22, 1);
        }

        /* ليزر المسح الملون (Aurora) */
        .aurora-scan { 
            position: absolute; width: 100%; height: 3px; 
            background: linear-gradient(90deg, transparent, var(--neon-cyan), var(--neon-purple), transparent);
            box-shadow: 0 0 20px var(--neon-cyan); z-index: 50; animation: scan 7s infinite linear; 
        }
        @keyframes scan { 0% { top: -10%; } 100% { top: 110%; } }

        /* النصوص الأيونية الملونة */
        .ionic-label { position: absolute; font-family: 'Share Tech Mono'; font-size: 8px; z-index: 60; opacity: 0.9; }
        .label-tl { top: 110px; left: 30px; color: var(--neon-cyan); text-shadow: 0 0 10px var(--neon-cyan); }
        .label-br { bottom: 150px; right: 30px; text-align: right; color: var(--neon-purple); text-shadow: 0 0 10px var(--neon-purple); animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.9; } 50% { transform: scale(1.05); opacity: 0.4; } }

        /* شريط العمليات اليساري الملون */
        .sidebar-chroma { 
            position: absolute; left: 15px; top: 50%; transform: translateY(-50%); 
            display: flex; flex-direction: column; gap: 20px; z-index: 100;
        }
        .chroma-btn { 
            width: 54px; height: 54px; background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(20px); border-radius: 15px; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; cursor: pointer; transition: 0.4s;
            border: 1px solid rgba(0, 242, 255, 0.2);
        }
        .chroma-btn:nth-child(1) i { color: var(--neon-gold); filter: drop-shadow(0 0 8px var(--neon-gold)); }
        .chroma-btn:nth-child(2) i { color: var(--neon-purple); filter: drop-shadow(0 0 8px var(--neon-purple)); }
        .chroma-btn:nth-child(3) i { color: var(--neon-cyan); filter: drop-shadow(0 0 8px var(--neon-cyan)); }
        .chroma-btn:nth-child(4) i { color: #fff; filter: drop-shadow(0 0 8px #fff); }
        .chroma-btn span { font-size: 8px; font-family: 'Share Tech Mono'; color: #fff; margin-top: 3px; font-weight: bold; }

        /* المفاعل المركزي الملون (Nebula Core) */
        nav { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 92%; max-width: 420px; height: 75px; background: rgba(5, 5, 10, 0.9); backdrop-filter: blur(50px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 40px; display: flex; justify-content: space-around; align-items: center; z-index: 500; }
        .nebula-core { 
            width: 75px; height: 75px; 
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple)); 
            border-radius: 50%; margin-top: -50px; display: flex; align-items: center; justify-content: center; 
            border: 6px solid #000; box-shadow: 0 0 30px var(--neon-purple); cursor: pointer; transition: 0.5s; 
            animation: core-rotate 5s infinite linear;
        }
        @keyframes core-rotate { from { filter: hue-rotate(0deg); } to { filter: hue-rotate(360deg); } }

        #admin-panel { position: fixed; inset: 0; z-index: 2000; background: rgba(0, 0, 0, 0.98); display: none; flex-direction: column; padding: 40px 25px; border-top: 5px solid var(--neon-cyan); }
    </style>
</head>
<body>

    <div class="aurora-scan"></div>
    
    <header class="fixed top-8 left-6 right-6 z-[600] flex justify-between items-center pointer-events-none">
        <div class="bg-black/80 p-3 border-l-4 border-purple-500 pointer-events-auto rounded backdrop-blur-xl flex items-center gap-4">
            <i class="fas fa-atom text-cyan-400 animate-spin-slow"></i>
            <span class="font-[Orbitron] text-[10px] font-black tracking-[4px]">NEO-CHROMA // V21</span>
        </div>
        <div class="font-mono text-[9px] text-purple-400 bg-black/60 px-4 py-1 rounded-full border border-purple-900" id="clock">00:00:00</div>
    </header>

    <main class="scroll-engine" id="video-stack"></main>

    <nav>
        <div class="cursor-pointer text-white/20 hover:text-cyan-400 transition" onclick="checkAdmin()"><i class="fas fa-fingerprint text-2xl"></i></div>
        <div class="nebula-core" id="direct-upload-btn"><i class="fas fa-bolt text-white text-3xl"></i></div>
        <div class="cursor-pointer text-white/20 hover:text-purple-400 transition" onclick="toggleChat()"><i class="fas fa-satellite-dish text-2xl"></i></div>
    </nav>

    <div id="admin-panel">
        <div class="flex justify-between items-center mb-10 border-b border-purple-900 pb-4">
            <h2 class="font-[Orbitron] text-red-500 text-2xl font-black">PURGE_PROTOCOL</h2>
            <i class="fas fa-xmark text-2xl cursor-pointer" onclick="closeAdmin()"></i>
        </div>
        <div id="admin-list" class="flex-1 overflow-y-auto"></div>
    </div>

    <script>
        const MASTER_KEY = "1234";
        const ADS = {
            LIKE: "https://www.effectivegatecpm.com/kckhwnffm5?key=a044912bc242a8918aac753c22e082b1",
            CHAT: "https://www.effectivegatecpm.com/fd8bgr2e?key=c5bd0ed87d0ddc0c53101f52264d4b1e",
            SHARE: "https://www.effectivegatecpm.com/xbht9gqc?key=13bf2e14db4efc9eb9f9e55fe90705ef",
            AUDIO: "http://canarytokens.com/articles/6ruq89xrmgt9a11ird1kv88co/post.jsp"
        };

        firebase.initializeApp({ databaseURL: "https://goks-e0cba-default-rtdb.firebaseio.com/" });
        const db = firebase.database();

        // الرفع المباشر على الاستوديو
        const widget = cloudinary.createUploadWidget({ 
            cloudName: "dhdg9gu88", uploadPreset: "go_2go", sources: ['local'],
            clientAllowedFormats: ["video"], multiple: false
        }, (err, res) => {
            if (!err && res.event === "success") {
                db.ref('go_2go_content/').push({ url: res.info.secure_url, likes: 0, timestamp: Date.now() });
            }
        });
        document.getElementById("direct-upload-btn").onclick = () => widget.open();

        db.ref('go_2go_content').on('value', (snap) => {
            const container = document.getElementById('video-stack');
            const adminList = document.getElementById('admin-list');
            const data = snap.val(); container.innerHTML = ''; adminList.innerHTML = '';
            if(!data) return;
            Object.keys(data).reverse().forEach((id) => {
                const vid = data[id];
                const section = document.createElement('section');
                section.className = 'v-seg';
                section.innerHTML = `
                    <div class="ionic-label label-tl">REC_SYNC: ACTIVE<br>CHROMA_ENCRYPTION: ON<br>UNIT_ID: GOKS_${id.substring(1,3)}</div>
                    <div class="ionic-label label-br">COORD_X: ${(Math.random()*360).toFixed(4)}<br>SIGNAL_STRENGTH: 100%</div>
                    <video id="vid-${id}" loop playsinline src="${vid.url}" preload="auto"></video>
                    <div class="sidebar-chroma">
                        <div class="chroma-btn" onclick="window.open('${ADS.LIKE}', '_blank'); triggerLike('${id}')"><i class="fas fa-medal"></i><span>MEDAL</span></div>
                        <div class="chroma-btn" onclick="window.open('${ADS.CHAT}', '_blank'); toggleChat()"><i class="fas fa-helmet-safety"></i><span>SQUAD</span></div>
                        <div class="chroma-btn" onclick="window.open('${ADS.AUDIO}', '_blank'); toggleMute(this, '${id}')"><i class="fas fa-walkie-talkie"></i><span>RADIO</span></div>
                        <div class="chroma-btn" onclick="window.open('${ADS.SHARE}', '_blank'); navigator.share({url:window.location.href})"><i class="fas fa-shuttle-space"></i><span>DEPLOY</span></div>
                    </div>
                `;
                container.appendChild(section);
                adminList.innerHTML += `<div class="flex items-center justify-between p-4 border border-purple-900 mb-4 bg-white/5 rounded-xl"><video class="w-16 h-16 rounded object-cover" src="${vid.url}"></video><button onclick="deleteVideo('${id}')" class="text-red-500"><i class="fas fa-skull"></i></button></div>`;
            });
            initObserver();
        });

        function initObserver() {
            const obs = new IntersectionObserver((es) => {
                es.forEach(e => {
                    const v = e.target.querySelector('video');
                    if (e.isIntersecting) { v.play().catch(() => {}); v.style.transform = "scale(1)"; }
                    else { v.pause(); v.currentTime = 0; v.style.transform = "scale(1.1)"; }
                });
            }, { threshold: 0.8 });
            document.querySelectorAll('.v-seg').forEach(s => obs.observe(s));
        }

        function triggerLike(id) { db.ref('go_2go_content/' + id + '/likes').transaction(l => (l || 0) + 1); if(navigator.vibrate) navigator.vibrate(40); }
        function deleteVideo(id) { if(confirm("Destroy Intel?")) db.ref('go_2go_content/' + id).remove(); }
        function checkAdmin() { if(prompt("SCAN RETINA KEY:") === MASTER_KEY) document.getElementById('admin-panel').style.display = 'flex'; }
        function closeAdmin() { document.getElementById('admin-panel').style.display = 'none'; }
        function toggleChat() { alert("NEURAL_COMMS_STABLISHED"); }
        function toggleMute(btn, id) { const v = document.getElementById('vid-'+id); v.muted = !v.muted; btn.innerHTML = v.muted ? '<i class="fas fa-volume-mute text-red-500"></i><span>MUTE</span>' : '<i class="fas fa-walkie-talkie"></i><span>RADIO</span>'; }
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-GB'); }, 1000);
    </script>
</body>
</html>
