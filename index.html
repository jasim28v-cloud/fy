<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VØID_X | INFINITY ELITE</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Cairo:wght@300;600;900&display=swap');
        
        :root { 
            --neon: #ff007f; 
            --accent: #00f3ff;
            --glass: rgba(255, 255, 255, 0.04);
            --glass-border: rgba(255, 255, 255, 0.12);
            --blur: saturate(200%) blur(30px);
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; 
            background: #000; color: #fff; 
            overflow: hidden; font-family: 'Cairo', sans-serif; 
            user-select: none; -webkit-tap-highlight-color: transparent;
        }

        .viewport { 
            height: 100vh; overflow-y: scroll; 
            scroll-snap-type: y mandatory; scrollbar-width: none; 
            -webkit-overflow-scrolling: touch; 
        }
        .viewport::-webkit-scrollbar { display: none; }
        
        .card { 
            height: 100vh; width: 100vw; 
            scroll-snap-align: start; scroll-snap-stop: always; 
            position: relative; overflow: hidden;
            background: #000;
        }
        
        video { 
            width: 100%; height: 100%; object-fit: cover;
            filter: brightness(0.9);
        }

        header { 
            position: fixed; top: env(safe-area-inset-top, 20px); 
            width: 100%; padding: 0 25px; z-index: 1000; 
            display: flex; justify-content: space-between; align-items: center; 
            pointer-events: none; 
        }

        .brand-pill { 
            background: var(--glass); backdrop-filter: var(--blur);
            border: 1px solid var(--glass-border);
            padding: 10px 22px; border-radius: 100px; 
            pointer-events: auto; box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        .side-bar { 
            position: absolute; left: 20px; bottom: 160px; 
            display: flex; flex-direction: column; gap: 20px; z-index: 500; 
        }

        .action-btn { 
            width: 56px; height: 56px; border-radius: 22px; 
            background: var(--glass); backdrop-filter: var(--blur);
            border: 1px solid var(--glass-border);
            display: flex; flex-direction: column; align-items: center; 
            justify-content: center; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            color: var(--neon);
        }
        .action-btn:active { transform: scale(0.85); }

        nav { 
            position: fixed; bottom: calc(30px + env(safe-area-inset-bottom)); 
            left: 50%; transform: translateX(-50%); 
            width: 88%; max-width: 380px; height: 78px; 
            background: rgba(15, 15, 15, 0.75); 
            backdrop-filter: var(--blur); border: 1px solid var(--glass-border);
            border-radius: 35px; display: flex; 
            justify-content: space-around; align-items: center; z-index: 1000; 
            box-shadow: 0 25px 60px rgba(0,0,0,0.9);
        }

        .main-upload-wrapper {
            position: relative; transform: translateY(-28px);
        }

        .main-upload { 
            width: 68px; height: 68px; 
            background: linear-gradient(135deg, var(--neon), #6e00ff); 
            border-radius: 24px; display: flex; align-items: center; 
            justify-content: center; border: 6px solid #000; 
            box-shadow: 0 15px 35px rgba(255,0,127,0.4);
            cursor: pointer; transition: 0.5s ease;
        }

        #file-input { display: none; }

        .overlay { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.9); 
            backdrop-filter: blur(45px); z-index: 2000; 
            display: none; flex-direction: column; padding: 40px 25px; 
        }

        .premium-card {
            background: linear-gradient(145deg, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0) 100%);
            border: 1px solid var(--glass-border); border-radius: 32px;
            padding: 30px; text-align: center; margin-bottom: 25px;
        }
    </style>
</head>
<body>

    <header>
        <div class="brand-pill">
            <span class="font-black italic text-xl text-white">VØID <span id="glow-text" style="color: var(--neon)">ELITE</span></span>
        </div>
        <div class="brand-pill font-[Orbitron] text-[10px] text-cyan-400" id="timer">00:00:00</div>
    </header>

    <main class="viewport" id="feed"></main>

    <nav>
        <div onclick="openAdmin()" class="opacity-60"><i class="fas fa-shield-halved text-2xl" style="color: var(--neon)"></i></div>
        
        <div class="main-upload-wrapper">
            <label for="file-input" class="main-upload" id="upload-label">
                <i class="fas fa-plus text-2xl text-white"></i>
            </label>
            <input type="file" id="file-input" accept="video/*,image/*">
        </div>

        <div onclick="openChatWithAd()" class="opacity-60"><i class="fas fa-comment-dots text-2xl text-blue-400"></i></div>
    </nav>

    <div id="admin-ui" class="overlay">
        <div class="flex justify-between items-center mb-10">
            <h1 class="font-[Orbitron] text-2xl font-black text-pink-500">SYSTEM_CORE</h1>
            <div class="w-12 h-12 flex items-center justify-center rounded-full bg-white/10" onclick="closeAdmin()"><i class="fas fa-times"></i></div>
        </div>
        <div class="premium-card">
            <div class="text-[10px] font-[Orbitron] opacity-50 mb-3 tracking-[5px] text-pink-400">SYNC_NODES</div>
            <div class="text-7xl font-black font-[Orbitron] text-white" id="live-visitors">0</div>
        </div>
        <div id="admin-list" class="flex-1 overflow-y-auto space-y-4"></div>
    </div>

    <div id="chat-ui" class="overlay">
        <div class="flex justify-between items-center mb-8">
            <h1 class="font-[Orbitron] text-xl text-pink-500">CH_DECRYPTED</h1>
            <i class="fas fa-chevron-down text-2xl opacity-30" onclick="toggleChat()"></i>
        </div>
        <div id="chat-msgs" class="flex-1 overflow-y-auto space-y-5"></div>
        <div class="mt-6 flex gap-3 pb-6">
            <input type="text" id="msg-input" class="bg-white/5 flex-1 rounded-2xl p-5 outline-none border border-white/10" placeholder="ارسل بياناتك...">
            <button onclick="sendMsg()" class="bg-pink-600 w-16 h-16 rounded-2xl flex items-center justify-center"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://fokx-c135a-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const MY_AD = "https://data527.click/21330bf1d025d41336e6/57154ac610/?placementName=default";
        const AD_LINKS = [MY_AD, "https://www.effectivegatecpm.com/bxwxuk2f39?key=566216691dc8b76a740840e94f68f44c"];
        let currentAd = 0;
        let isGlobalMuted = true; // حالة الصوت العامة
        const USR_ID = "X-" + Math.random().toString(36).substr(2, 4).toUpperCase();

        // نظام الرفع المباشر
        document.getElementById('file-input').onchange = async function(e) {
            const file = e.target.files[0];
            if (!file) return;
            document.getElementById('upload-label').innerHTML = '<i class="fas fa-sync fa-spin text-white"></i>';
            const formData = new FormData();
            formData.append('file', file);
            formData.append('upload_preset', 'go_kck');
            try {
                const res = await fetch('https://api.cloudinary.com/v1_1/dk5kas1gc/upload', { method: 'POST', body: formData });
                const data = await res.json();
                if (data.secure_url) { db.ref('videos').push({ url: data.secure_url, likes: 0 }); alert('تم الرفع!'); }
            } catch (err) { alert('خطأ في الرفع'); }
            finally { document.getElementById('upload-label').innerHTML = '<i class="fas fa-plus text-2xl text-white"></i>'; }
        };

        const myPresenceRef = db.ref(`presence/${USR_ID}`);
        myPresenceRef.onDisconnect().remove();
        myPresenceRef.set(true);
        db.ref('presence').on('value', snap => { document.getElementById('live-visitors').innerText = snap.numChildren(); });

        function triggerAd() { window.open(AD_LINKS[currentAd], '_blank'); currentAd = (currentAd + 1) % AD_LINKS.length; }
        function openChatWithAd() { triggerAd(); toggleChat(); }
        setInterval(() => { document.getElementById('timer').innerText = new Date().toLocaleTimeString('en-GB', { hour12: false }); }, 1000);

        // جلب الفيديوهات مع زر الصوت
        db.ref('videos').on('value', (snap) => {
            const feed = document.getElementById('feed'), adminList = document.getElementById('admin-list'), data = snap.val();
            feed.innerHTML = ''; adminList.innerHTML = '';
            if(data) {
                Object.keys(data).reverse().forEach(id => {
                    const v = data[id];
                    const section = document.createElement('div');
                    section.className = 'card';
                    section.innerHTML = `
                        <video loop playsinline muted src="${v.url}" onclick="togglePlay(this)"></video>
                        <div class="side-bar">
                            <div class="action-btn mute-trigger" onclick="toggleGlobalMute()">
                                <i class="fas ${isGlobalMuted ? 'fa-volume-xmark' : 'fa-volume-high'}"></i>
                            </div>
                            <div class="action-btn" onclick="likeVid('${id}')">
                                <i class="fas fa-bolt-lightning"></i>
                                <span class="text-[10px] font-black mt-1 text-white">${v.likes || 0}</span>
                            </div>
                            <div class="action-btn" onclick="openChatWithAd()"><i class="fas fa-fingerprint"></i></div>
                            <div class="action-btn" onclick="shareVid()"><i class="fas fa-share-nodes"></i></div>
                        </div>
                    `;
                    feed.appendChild(section);
                    adminList.innerHTML += `<div class="bg-white/5 p-4 rounded-3xl flex items-center justify-between">
                        <video src="${v.url}" class="w-12 h-12 rounded-xl object-cover"></video>
                        <button onclick="deleteVid('${id}')" class="text-red-500"><i class="fas fa-trash-alt"></i></button>
                    </div>`;
                });
                observeFeed();
            }
        });

        // وظيفة التحكم في الصوت العام
        function toggleGlobalMute() {
            isGlobalMuted = !isGlobalMuted;
            const allVideos = document.querySelectorAll('video');
            const allMuteIcons = document.querySelectorAll('.mute-trigger i');
            
            allVideos.forEach(v => { v.muted = isGlobalMuted; });
            allMuteIcons.forEach(i => {
                i.className = isGlobalMuted ? 'fas fa-volume-xmark' : 'fas fa-volume-high';
            });
        }

        function togglePlay(v) { v.paused ? v.play() : v.pause(); }
        function likeVid(id) { triggerAd(); db.ref(`videos/${id}/likes`).transaction(l => (l || 0) + 1); }
        function shareVid() { triggerAd(); if(navigator.share) navigator.share({url: window.location.href}); }
        function openAdmin() { if(prompt("كود الدخول:") === "1234") document.getElementById('admin-ui').style.display = 'flex'; }
        function closeAdmin() { document.getElementById('admin-ui').style.display = 'none'; }
        function toggleChat() { const c = document.getElementById('chat-ui'); c.style.display = c.style.display==='flex'?'none':'flex'; }
        function deleteVid(id) { if(confirm("حذف؟")) db.ref(`videos/${id}`).remove(); }

        function sendMsg() {
            const i = document.getElementById('msg-input');
            if(i.value.trim()) { db.ref('chat').push({u: USR_ID, t: i.value}); i.value = ''; }
        }

        db.ref('chat').limitToLast(25).on('value', s => {
            const b = document.getElementById('chat-msgs'); b.innerHTML = '';
            s.forEach(m => {
                const d = m.val();
                b.innerHTML += `<div class="bg-white/5 p-4 rounded-2xl border-l-4 border-pink-500">
                    <div class="text-[9px] text-pink-500 font-bold mb-1">${d.u}</div>
                    <div class="text-sm">${d.t}</div>
                </div>`;
            });
            b.scrollTop = b.scrollHeight;
        });

        function observeFeed() {
            const colors = ['#ff007f', '#00f3ff', '#bd00ff', '#00ff88'];
            const obs = new IntersectionObserver(entries => {
                entries.forEach(e => {
                    const v = e.target.querySelector('video');
                    if(e.isIntersecting) {
                        v.play().catch(()=>{});
                        v.muted = isGlobalMuted; // الحفاظ على حالة الصوت المختارة
                        const color = colors[Math.floor(Math.random()*colors.length)];
                        document.documentElement.style.setProperty('--neon', color);
                        e.target.querySelectorAll('.action-btn').forEach(b => b.style.color = color);
                        document.getElementById('upload-label').style.background = `linear-gradient(135deg, ${color}, #6e00ff)`;
                    } else { v.pause(); }
                });
            }, { threshold: 0.6 });
            document.querySelectorAll('.card').forEach(c => obs.observe(c));
        }
    </script>
</body>
</html>
