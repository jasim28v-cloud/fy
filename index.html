<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VØID_X | ULTRA GLASS PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js" async></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;900&family=Cairo:wght@400;700&display=swap');
        
        :root { --neon: #ff007f; --bg: #050002; }
        body, html { 
            margin: 0; padding: 0; height: 100%; background: var(--bg); color: #fff; 
            overflow: hidden; font-family: 'Cairo', sans-serif; user-select: none;
            /* تحسين أداء العرض */
            text-rendering: optimizeLegibility;
            -webkit-font-smoothing: antialiased;
        }

        .pink-void-bg { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at 50% 50%, #1a000d 0%, #000 100%); will-change: transform; }
        
        .scroll-engine { 
            height: 100vh; 
            overflow-y: scroll; 
            scroll-snap-type: y mandatory; 
            scrollbar-width: none; 
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }
        .scroll-engine::-webkit-scrollbar { display: none; }
        
        .video-segment { 
            height: 100vh; width: 100vw; scroll-snap-align: start; 
            scroll-snap-stop: always; position: relative; overflow: hidden;
            contain: strict; /* يخبر المتصفح أن محتوى هذا القسم لن يؤثر على غيره (تسريع الرندر) */
        }
        
        .crystal-frame { width: 100%; height: 100%; position: relative; background: #000; }
        
        /* تحسين أداء الفيديو */
        video { 
            width: 100%; height: 100%; object-fit: cover; 
            will-change: transform; 
            background: #000;
        }

        header { position: fixed; top: 25px; left: 20px; right: 20px; z-index: 500; display: flex; justify-content: space-between; align-items: center; pointer-events: none; }
        .brand-box { padding: 8px 22px; border-radius: 20px; background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); pointer-events: auto; }
        .brand-name { font-family: 'Orbitron', sans-serif; font-weight: 900; letter-spacing: 2px; text-shadow: 0 0 15px var(--neon); }

        .v-watermark { position: absolute; top: 20%; right: 10%; font-family: 'Orbitron'; font-size: 0.8rem; color: rgba(255,255,255,0.15); z-index: 20; letter-spacing: 4px; animation: floatMark 10s infinite; }
        @keyframes floatMark { 0%, 100% { transform: translate(0,0); } 50% { transform: translate(-10px, 20px); } }

        .side-actions { position: absolute; left: 20px; bottom: 150px; display: flex; flex-direction: column; gap: 15px; z-index: 100; }
        .action-btn { width: 50px; height: 50px; border-radius: 18px; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .action-btn i { font-size: 1.2rem; color: var(--neon); filter: drop-shadow(0 0 5px var(--neon)); }
        .btn-label { font-size: 8px; font-weight: bold; margin-top: 2px; color: #fff; opacity: 0.7; font-family: 'Orbitron'; }

        nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; height: 70px; border-radius: 30px; background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-around; align-items: center; z-index: 200; }

        #upload-trigger { background: var(--neon); cursor: pointer; width: 55px; height: 55px; border-radius: 20px; display: flex; align-items: center; justify-content: center; transform: translateY(-10px); border: 3px solid var(--bg); box-shadow: 0 5px 15px var(--neon); }

        /* اللوحات المنبثقة */
        .overlay-panel { position: fixed; inset: 0; z-index: 1000; background: rgba(5,0,2,0.98); display: none; flex-direction: column; padding: 30px 20px; backdrop-filter: blur(30px); }
    </style>
</head>
<body>

    <div class="pink-void-bg"></div>

    <header>
        <div class="brand-box"><span class="brand-name">VØID_X</span></div>
        <div class="text-[11px] font-[Orbitron] text-white/80 px-4 py-2 rounded-full border border-white/10 backdrop-blur-md" id="clock">00:00:00</div>
    </header>

    <main class="scroll-engine" id="video-stack"></main>

    <nav id="main-nav">
        <div class="finger-admin text-pink-500 cursor-pointer" onclick="openAdmin()"><i class="fas fa-fingerprint text-2xl"></i></div>
        <div id="upload-trigger"><i class="fas fa-plus text-xl text-white"></i></div>
        <div onclick="toggleChat()" class="text-white/30 cursor-pointer"><i class="fas fa-comment-dots text-2xl"></i></div>
    </nav>

    <div id="admin-panel" class="overlay-panel">
        <div class="flex justify-between items-center mb-6">
            <h2 class="font-[Orbitron] text-xl text-pink-500">ADMIN_CORE</h2>
            <i class="fas fa-xmark text-2xl cursor-pointer" onclick="closeAdmin()"></i>
        </div>
        <div id="admin-list" class="flex-1 overflow-y-auto space-y-3"></div>
    </div>

    <div id="chat-overlay" class="overlay-panel">
        <div class="flex justify-between items-center mb-6">
            <h2 class="font-[Orbitron] text-pink-500 text-xl">VØID_CHAT</h2>
            <i class="fas fa-chevron-down text-2xl cursor-pointer" onclick="toggleChat()"></i>
        </div>
        <div id="chat-box" class="flex-1 overflow-y-auto space-y-4 pr-2"></div>
        <div class="mt-4 flex gap-2">
            <input type="text" id="msg-input" class="bg-white/5 flex-1 rounded-xl p-4 outline-none border border-white/10 text-sm" placeholder="Say something...">
            <button onclick="sendMsg()" class="bg-pink-600 px-5 rounded-xl"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <script>
        // ثوابت الإعدادات
        const ADMIN_CODE = "1234";
        const AD_LINKS = ["https://data527.click/21330bf1d025d41336e6/57154ac610/?placementName=default"]; // تم تحديث الرابط بناءً على تفضيلاتك
        let currentAd = 0;
        let isMuted = true;
        let observer = null;
        const USR_ID = "ION-" + Math.floor(Math.random()*999);

        // Firebase Initialization
        const firebaseConfig = { databaseURL: "https://goms-8fdfd-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // تفعيل الإعلانات بذكاء
        function triggerAd() { 
            window.open(AD_LINKS[currentAd], '_blank'); 
            currentAd = (currentAd + 1) % AD_LINKS.length; 
        }

        // ساعة النظام
        setInterval(() => { 
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-GB'); 
        }, 1000);

        // جلب البيانات مع تحديد العدد لتقليل الضغط (LimitToLast)
        db.ref('videos').limitToLast(20).on('value', (snap) => {
            const container = document.getElementById('video-stack');
            const adminList = document.getElementById('admin-list');
            const data = snap.val();
            
            // تنظيف الأوبزرفر القديم لمنع تسرب الذاكرة
            if(observer) observer.disconnect();
            
            container.innerHTML = ''; 
            adminList.innerHTML = '';
            
            if(!data) return;
            
            const fragment = document.createDocumentFragment();
            Object.keys(data).reverse().forEach((id) => {
                const vid = data[id];
                const section = document.createElement('section');
                section.className = 'video-segment';
                section.innerHTML = `
                    <div class="crystal-frame">
                        <div class="v-watermark">VØID_X</div>
                        <video loop playsinline muted preload="metadata" src="${vid.url}" onclick="this.paused ? this.play() : this.pause()"></video>
                        <div class="side-actions">
                            <div class="action-btn" onclick="toggleMute()">
                                <i class="${isMuted ? 'fas fa-volume-xmark' : 'fas fa-volume-high'} mute-icon"></i>
                                <span class="btn-label">AUDIO</span>
                            </div>
                            <div class="action-btn" onclick="likeVideo('${id}')">
                                <i class="fas fa-bolt"></i>
                                <span class="btn-label">${vid.likes || 0}</span>
                            </div>
                            <div class="action-btn" onclick="toggleChat()">
                                <i class="fas fa-terminal"></i>
                                <span class="btn-label">CHAT</span>
                            </div>
                        </div>
                    </div>
                `;
                fragment.appendChild(section);

                // قائمة الإدارة
                const item = document.createElement('div');
                item.className = "flex items-center justify-between bg-white/5 p-3 rounded-xl border-l-4 border-pink-600";
                item.innerHTML = `<span class="text-[10px] font-mono opacity-50">${id.substring(0,8)}</span>
                                 <button onclick="deleteVideo('${id}')" class="text-red-500"><i class="fas fa-trash"></i></button>`;
                adminList.appendChild(item);
            });
            
            container.appendChild(fragment);
            initObserver();
        });

        // تحسين أداء تشغيل الفيديوهات (Intersection Observer)
        function initObserver() {
            const options = { threshold: 0.7 };
            observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    const video = entry.target.querySelector('video');
                    if (entry.isIntersecting) {
                        video.play().catch(() => {});
                        // تغيير لون الـ Neon بشكل عشوائي عند التمرير لزيادة الحيوية
                        const colors = ['#ff007f', '#00f3ff', '#bd00ff'];
                        document.documentElement.style.setProperty('--neon', colors[Math.floor(Math.random()*colors.length)]);
                    } else {
                        video.pause();
                        video.currentTime = 0; // توفير الذاكرة
                    }
                });
            }, options);

            document.querySelectorAll('.video-segment').forEach(seg => observer.observe(seg));
        }

        // وظائف إضافية سريعة
        function toggleMute() {
            isMuted = !isMuted;
            document.querySelectorAll('video').forEach(v => v.muted = isMuted);
            document.querySelectorAll('.mute-icon').forEach(i => i.className = isMuted ? 'fas fa-volume-xmark mute-icon' : 'fas fa-volume-high mute-icon');
        }

        function likeVideo(id) { triggerAd(); db.ref(`videos/${id}/likes`).transaction(l => (l || 0) + 1); }
        
        function openAdmin() { if(prompt("PASS:") === ADMIN_CODE) document.getElementById('admin-panel').style.display = 'flex'; }
        function closeAdmin() { document.getElementById('admin-panel').style.display = 'none'; }
        function toggleChat() { 
            const c = document.getElementById('chat-overlay'); 
            c.style.display = c.style.display === 'flex' ? 'none' : 'flex'; 
        }

        function sendMsg() {
            const inp = document.getElementById('msg-input');
            if(inp.value.trim()){ 
                db.ref('chat').push({user:USR_ID, text:inp.value, time: Date.now()}); 
                inp.value=''; 
            }
        }

        // جلب الدردشة بشكل أسرع (آخر 10 رسائل فقط)
        db.ref('chat').limitToLast(10).on('value', s => {
            const box = document.getElementById('chat-box'); box.innerHTML = '';
            s.forEach(m => {
                const d = m.val();
                box.innerHTML += `<div class="bg-white/5 p-3 rounded-xl border-r-2 border-pink-500/30">
                    <span class="text-[9px] text-pink-500 font-bold uppercase">${d.user}</span>
                    <p class="text-xs text-white/90">${d.text}</p>
                </div>`;
            });
            box.scrollTop = box.scrollHeight;
        });

        // أداة الرفع - Cloudinary
        const myWidget = cloudinary.createUploadWidget({ 
            cloudName: "dpcysggzh", uploadPreset: "poro_go",
            maxFiles: 1, clientAllowedFormats: ["mp4", "mov"],
            powerUps: { viewport: true } // تحسين الأداء في الموبايل
        }, (err, res) => {
            if (!err && res.event === "success") {
                db.ref('videos/').push({ url: res.info.secure_url, likes: 0, timestamp: Date.now() });
            }
        });
        document.getElementById("upload-trigger").onclick = () => myWidget.open();

    </script>
</body>
</html>
