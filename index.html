<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VØID_X | SINGULARITY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Space+Grotesk:wght@300;700&display=swap');
        
        :root { --hyper-cyan: #00f3ff; --hyper-pink: #ff007f; --void-black: #010101; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--void-black); color: #fff; overflow: hidden; font-family: 'Space Grotesk', sans-serif; }

        /* الإنترو الذري */
        #singularity-intro {
            position: fixed; inset: 0; z-index: 9999; background: var(--void-black);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .core-logo { font-family: 'Syncopate'; font-size: 2.5rem; letter-spacing: 12px; background: linear-gradient(90deg, #fff, var(--hyper-cyan), var(--hyper-pink)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: glitch 1s infinite; }
        @keyframes glitch { 0% { transform: skew(0deg); } 20% { transform: skew(3deg); } 40% { transform: skew(-3deg); } 100% { transform: skew(0deg); } }

        /* مسرح الفيديوهات */
        .master-viewport { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .master-viewport::-webkit-scrollbar { display: none; }
        .v-frame { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; transition: 0.8s filter; }

        /* العلامة المائية الشبحية */
        .phantom-mark { position: absolute; top: 15%; left: 5%; font-family: 'Syncopate'; font-size: 10px; opacity: 0.1; letter-spacing: 5px; transform: rotate(-90deg); pointer-events: none; }

        /* الهيدر الزجاجي */
        header { position: fixed; top: 0; width: 100%; height: 70px; display: flex; align-items: center; justify-content: space-between; padding: 0 25px; z-index: 1000; pointer-events: none; }
        .status-pill { background: rgba(255,255,255,0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); padding: 5px 15px; border-radius: 50px; pointer-events: auto; font-size: 10px; font-family: 'Syncopate'; }

        /* أزرار التفاعل الجانبية (نظام Gravity) */
        .side-gravity { position: absolute; left: 20px; bottom: 120px; display: flex; flex-direction: column; gap: 20px; z-index: 500; }
        .g-btn { width: 55px; height: 55px; border-radius: 20px; background: rgba(255,255,255,0.03); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.4s; }
        .g-btn i { font-size: 1.3rem; color: #fff; }
        .g-btn:active { transform: scale(0.7) translateY(-10px); background: var(--hyper-pink); }

        /* شريط التحكم السفلي */
        nav { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); width: 85%; max-width: 400px; height: 70px; background: rgba(255,255,255,0.02); backdrop-filter: blur(40px); border: 1px solid rgba(255,255,255,0.08); border-radius: 35px; display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
        .trigger-icon { font-size: 1.8rem; color: var(--hyper-cyan); filter: drop-shadow(0 0 10px var(--hyper-cyan)); cursor: pointer; }
        .add-node { width: 55px; height: 55px; background: linear-gradient(45deg, var(--hyper-cyan), var(--hyper-pink)); border-radius: 20px; display: flex; align-items: center; justify-content: center; transform: translateY(-15px); border: 3px solid var(--void-black); box-shadow: 0 10px 20px rgba(0,0,0,0.5); }

        /* القوائم */
        .singularity-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 2000; display: none; flex-direction: column; padding: 40px 30px; }
        .radar-container { width: 220px; height: 220px; border-radius: 100%; border: 1px solid var(--hyper-cyan); margin: 0 auto 40px; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .radar-line { position: absolute; width: 50%; height: 2px; background: var(--hyper-cyan); top: 50%; left: 50%; transform-origin: left; animation: scan 3s linear infinite; box-shadow: 0 0 15px var(--hyper-cyan); }
        @keyframes scan { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="singularity-intro">
        <div class="core-logo">VØID_X</div>
        <div class="mt-4 text-[8px] tracking-[8px] opacity-30 uppercase">Initializing Quantum Core</div>
    </div>

    <header>
        <div class="status-pill text-cyan-400">VØID_X | <span class="text-white">SINGULARITY</span></div>
        <div class="status-pill" id="live-time">00:00</div>
    </header>

    <main class="master-viewport" id="v-stream"></main>

    <nav>
        <div onclick="openAdmin()"><i class="fas fa-fingerprint trigger-icon"></i></div>
        <div class="add-node" id="upload-trigger"><i class="fas fa-plus text-white text-xl"></i></div>
        <div onclick="openNet()"><i class="fas fa-braille text-2xl opacity-30"></i></div>
    </nav>

    <div id="admin-menu" class="singularity-overlay">
        <div class="flex justify-between items-center mb-10">
            <span class="font-[Syncopate] text-[10px] text-pink-500 tracking-[5px]">SYSTEM_RADAR</span>
            <i class="fas fa-times text-2xl" onclick="closeAll()"></i>
        </div>
        <div class="radar-container">
            <div class="radar-line"></div>
            <div class="text-center z-10">
                <div class="text-[10px] opacity-40">ACTIVE_VISITORS</div>
                <div id="v-count" class="text-5xl font-bold">0</div>
            </div>
        </div>
        <div id="mng-list" class="flex-1 overflow-y-auto space-y-3"></div>
    </div>

    <div id="net-menu" class="singularity-overlay">
        <div class="flex justify-between items-center mb-8">
            <span class="font-[Syncopate] text-[10px] text-cyan-400 tracking-[5px]">QUANTUM_NET</span>
            <i class="fas fa-chevron-down text-2xl" onclick="closeAll()"></i>
        </div>
        <div id="chat-box" class="flex-1 overflow-y-auto space-y-4"></div>
        <div class="mt-4 flex gap-2">
            <input type="text" id="m-in" class="bg-white/5 flex-1 rounded-2xl p-5 outline-none border border-white/5" placeholder="Connect...">
            <button onclick="sendMsg()" class="bg-pink-600 px-8 rounded-2xl"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <script>
        const config = { databaseURL: "https://fokx-c135a-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(config);
        const db = firebase.database();
        const AD_URL = "https://data527.click/21330bf1d025d41336e6/57154ac610/?placementName=default";
        let isMuted = true;
        const UID = "NODE-" + Math.random().toString(36).substr(2, 4).toUpperCase();

        // تتبع الزوار (الرادار)
        const presence = db.ref(`presence/${UID}`);
        presence.onDisconnect().remove();
        presence.set(true);
        db.ref('presence').on('value', s => { document.getElementById('v-count').innerText = s.numChildren(); });

        function triggerAd() { window.open(AD_URL, '_blank'); }
        function openNet() { triggerAd(); document.getElementById('net-menu').style.display = 'flex'; }
        function closeAll() { document.querySelectorAll('.singularity-overlay').forEach(o => o.style.display = 'none'); }
        setInterval(() => { document.getElementById('live-time').innerText = new Date().toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit'}); }, 1000);

        // محرك المحتوى
        db.ref('videos').on('value', snap => {
            const stream = document.getElementById('v-stream');
            const mng = document.getElementById('mng-list');
            const data = snap.val();
            stream.innerHTML = ''; mng.innerHTML = '';
            if(!data) { hideIntro(); return; }

            Object.keys(data).reverse().forEach((id, idx) => {
                const v = data[id];
                const card = document.createElement('div');
                card.className = 'v-frame';
                card.innerHTML = `
                    <div class="phantom-mark">VØID_X SINGULARITY</div>
                    <video loop playsinline muted src="${v.url}" onclick="this.paused?this.play():this.pause()"></video>
                    <div class="side-gravity">
                        <div class="g-btn" onclick="toggleMute()"><i class="fas ${isMuted?'fa-volume-mute':'fa-volume-up'}"></i></div>
                        <div class="g-btn" onclick="pulseLike('${id}')"><i class="fas fa-heart text-pink-500"></i><span class="text-[9px] mt-1 font-bold">${v.likes || 0}</span></div>
                        <div class="g-btn" onclick="openNet()"><i class="fas fa-comment"></i></div>
                        <div class="g-btn" onclick="shareNode()"><i class="fas fa-share text-cyan-400"></i></div>
                    </div>
                `;
                stream.appendChild(card);
                mng.innerHTML += `<div class="bg-white/5 p-4 rounded-3xl flex items-center justify-between border border-white/5">
                    <video src="${v.url}" class="w-10 h-10 rounded-lg object-cover"></video>
                    <span class="text-[9px] font-mono opacity-20">${id}</span>
                    <button onclick="deleteNode('${id}')" class="text-red-500 px-4"><i class="fas fa-trash-alt"></i></button>
                </div>`;

                if(idx === 0) card.querySelector('video').onloadeddata = hideIntro;
            });
            initObserver();
        });

        function hideIntro() { 
            setTimeout(() => {
                const intro = document.getElementById('singularity-intro');
                intro.style.opacity = '0';
                setTimeout(() => intro.style.display = 'none', 1000);
            }, 1200);
        }

        function toggleMute() {
            isMuted = !isMuted;
            document.querySelectorAll('video').forEach(v => v.muted = isMuted);
        }

        function pulseLike(id) { triggerAd(); db.ref(`videos/${id}/likes`).transaction(l => (l || 0) + 1); }
        function shareNode() { triggerAd(); if(navigator.share) navigator.share({url: window.location.href}); }
        function openAdmin() { if(prompt("MASTER CODE:") === "1234") document.getElementById('admin-menu').style.display = 'flex'; }
        function deleteNode(id) { if(confirm("Erase?")) db.ref(`videos/${id}`).remove(); }

        function sendMsg() {
            const i = document.getElementById('m-in');
            if(i.value.trim()) { db.ref('chat').push({u: UID, t: i.value}); i.value = ''; }
        }
        db.ref('chat').limitToLast(20).on('value', s => {
            const box = document.getElementById('chat-box'); box.innerHTML = '';
            s.forEach(m => {
                const d = m.val();
                box.innerHTML += `<div class="bg-white/5 p-4 rounded-2xl border-r-2 border-cyan-500/50">
                    <div class="text-[8px] text-pink-500 font-bold mb-1">${d.u}</div>
                    <div class="text-sm opacity-90">${d.t}</div>
                </div>`;
            });
            box.scrollTop = box.scrollHeight;
        });

        // الرفع السحابي (Cloudinary)
        const widget = cloudinary.createUploadWidget({
            cloudName: "dk5kas1gc", uploadPreset: "go_kck",
            styles: { palette: { window: "#010101", windowBorder: "#00f3ff", tabIcon: "#00f3ff", action: "#ff007f", textLight: "#fff" } }
        }, (err, res) => { if(!err && res.event === "success") db.ref('videos').push({url: res.info.secure_url, likes: 0}); });
        document.getElementById('upload-trigger').onclick = () => widget.open();

        function initObserver() {
            const obs = new IntersectionObserver(es => {
                es.forEach(e => {
                    const v = e.target.querySelector('video');
                    if(e.isIntersecting) { v.play().catch(()=>{}); v.style.filter = "none"; }
                    else { v.pause(); v.currentTime = 0; v.style.filter = "blur(10px)"; }
                });
            }, { threshold: 0.6 });
            document.querySelectorAll('.v-frame').forEach(c => obs.observe(c));
        }
    </script>
</body>
</html>
