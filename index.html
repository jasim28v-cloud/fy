<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VØID_X | HYPER ELITE v4.0</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;900&family=Cairo:wght@400;700&display=swap');
        
        :root { 
            --neon: #ff007f; 
            --bg: #050505; 
            --ionic-blur: blur(25px);
            --safe-area-inset-bottom: env(safe-area-inset-bottom);
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; 
            background: var(--bg); color: #fff; 
            overflow: hidden; font-family: 'Cairo', sans-serif; 
            user-select: none; -webkit-tap-highlight-color: transparent;
        }

        .viewport { 
            height: 100vh; overflow-y: scroll; 
            scroll-snap-type: y mandatory; scrollbar-width: none; 
            -webkit-overflow-scrolling: touch; 
        }
        .viewport::-webkit-scrollbar { display: none; }
        
        .card { 
            height: 100vh; width: 100vw; 
            scroll-snap-align: start; scroll-snap-stop: always; 
            position: relative; background: #000; overflow: hidden;
        }
        
        video { width: 100%; height: 100%; object-fit: cover; }

        /* العلامة المائية الشفافة والمتحركة */
        .watermark-overlay {
            position: absolute; inset: 0;
            display: flex; justify-content: center; align-items: center;
            pointer-events: none; z-index: 5; opacity: 0.08;
            font-family: 'Orbitron'; font-size: 10vw; font-weight: 900;
            color: white; transform: rotate(-25deg);
            animation: drift 12s infinite alternate ease-in-out;
            white-space: nowrap;
        }

        @keyframes drift {
            from { transform: rotate(-25deg) translateX(-15%); }
            to { transform: rotate(-25deg) translateX(15%); }
        }

        header { 
            position: fixed; top: env(safe-area-inset-top, 15px); 
            width: 100%; padding: 0 20px; z-index: 1000; 
            display: flex; justify-content: space-between; align-items: center; 
        }

        .glass-tag { 
            background: rgba(255,255,255,0.05); 
            backdrop-filter: var(--ionic-blur); -webkit-backdrop-filter: var(--ionic-blur);
            border: 1px solid rgba(255,255,255,0.1); 
            padding: 8px 18px; border-radius: 20px; 
        }

        .side-bar { 
            position: absolute; left: 15px; bottom: 160px; 
            display: flex; flex-direction: column; gap: 22px; z-index: 500; 
        }

        /* أزرار أيونات ملونة وشفافة */
        .btn-ionic { 
            width: 52px; height: 52px; border-radius: 18px; 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: var(--ionic-blur); -webkit-backdrop-filter: var(--ionic-blur);
            border: 1px solid rgba(255,255,255,0.1); 
            display: flex; flex-direction: column; align-items: center; 
            justify-content: center; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .btn-ionic i { font-size: 20px; transition: 0.4s; }
        .btn-ionic:active { transform: scale(0.8); }

        /* شريط التنقل السفلي الشفاف */
        nav { 
            position: fixed; bottom: calc(25px + var(--safe-area-inset-bottom)); 
            left: 50%; transform: translateX(-50%); 
            width: 85%; max-width: 380px; height: 70px; 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255,255,255,0.08); 
            border-radius: 35px; display: flex; 
            justify-content: space-around; align-items: center; z-index: 1000; 
        }

        .add-btn { 
            width: 60px; height: 60px; background: #fff; color: #000;
            border-radius: 50%; display: flex; align-items: center; 
            justify-content: center; transform: translateY(-20px); 
            border: 4px solid var(--bg); box-shadow: 0 10px 20px rgba(255,255,255,0.2);
        }

        .overlay { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.85); 
            backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
            z-index: 2000; display: none; flex-direction: column; padding: 25px; 
        }

        .stat-card {
            background: rgba(255,255,255,0.03);
            border-radius: 25px; padding: 20px; border: 1px solid rgba(255,255,255,0.1);
            text-align: center; margin-bottom: 20px;
        }

        .vid-manager-item {
            background: rgba(255,255,255,0.02);
            border-radius: 15px; padding: 10px;
            display: flex; align-items: center; gap: 15px;
            border: 1px solid rgba(255,255,255,0.05);
        }
    </style>
</head>
<body>

    <header>
        <div class="glass-tag"><span class="font-[Orbitron] font-black text-xs">VØID_X <span class="text-pink-500">SYSTEM</span></span></div>
        <div class="glass-tag font-[Orbitron] text-[10px] text-pink-400" id="timer">00:00:00</div>
    </header>

    <main class="viewport" id="feed"></main>

    <nav>
        <div onclick="openAdmin()"><i class="fas fa-user-shield text-xl text-gray-500"></i></div>
        <div class="add-btn" id="upload-btn"><i class="fas fa-plus text-2xl"></i></div>
        <div onclick="triggerAd2(); toggleChat();"><i class="fas fa-comment-dots text-xl text-gray-500"></i></div>
    </nav>

    <div id="admin-ui" class="overlay">
        <div class="flex justify-between items-center mb-6">
            <h1 class="font-[Orbitron] text-xl text-pink-500 tracking-widest">DASHBOARD_v4</h1>
            <button onclick="closeAdmin()" class="w-10 h-10 rounded-full bg-white/10 flex items-center justify-center"><i class="fas fa-times"></i></button>
        </div>
        <div class="stat-card">
            <div class="text-[10px] font-[Orbitron] text-gray-500 mb-1">LIVE_NODES</div>
            <div class="text-6xl font-black font-[Orbitron] text-white" id="visitor-count">1</div>
        </div>
        <div id="admin-video-list" class="flex-1 overflow-y-auto space-y-3 px-1"></div>
    </div>

    <div id="chat-ui" class="overlay">
        <div class="flex justify-between items-center mb-6">
            <h1 class="font-[Orbitron] text-xl text-cyan-400">SECURE_LINK</h1>
            <i class="fas fa-times" onclick="toggleChat()"></i>
        </div>
        <div id="chat-msgs" class="flex-1 overflow-y-auto space-y-4 px-2"></div>
        <div class="mt-4 flex gap-2">
            <input type="text" id="msg-input" class="bg-white/5 flex-1 rounded-2xl p-4 outline-none border border-white/10" placeholder="ارسل شفرة...">
            <button onclick="sendMsg()" class="bg-white text-black px-6 rounded-2xl font-bold">ارسل</button>
        </div>
    </div>

    <script>
        // الروابط الإعلانية المطلوبة
        const AD_URL_1 = "https://www.effectivegatecpm.com/bxwxuk2f39?key=566216691dc8b76a740840e94f68f44c";
        const AD_URL_2 = "https://www.effectivegatecpm.com/k60w64w4gk?key=564f3d8cc4ac85949f218179b742495e";

        function triggerAd1() { window.open(AD_URL_1, '_blank'); }
        function triggerAd2() { window.open(AD_URL_2, '_blank'); }

        const firebaseConfig = { databaseURL: "https://fokx-c135a-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const USR_ID = "NODE-" + Math.random().toString(36).substr(2, 4).toUpperCase();

        let isMuted = true;

        // تتبع الزوار
        const myPresenceRef = db.ref(`presence/${USR_ID}`);
        myPresenceRef.onDisconnect().remove();
        myPresenceRef.set({status: "online"});
        db.ref('presence').on('value', snap => {
            document.getElementById('visitor-count').innerText = snap.numChildren();
        });

        setInterval(() => { 
            document.getElementById('timer').innerText = new Date().toLocaleTimeString('en-GB', { hour12: false }); 
        }, 1000);

        // جلب البيانات
        db.ref('videos').on('value', (snap) => {
            const feed = document.getElementById('feed');
            const adminList = document.getElementById('admin-video-list');
            const data = snap.val();
            feed.innerHTML = ''; adminList.innerHTML = '';
            
            if(data) {
                Object.keys(data).reverse().forEach(id => {
                    const v = data[id];
                    const section = document.createElement('div');
                    section.className = 'card';
                    section.innerHTML = `
                        <div class="watermark-overlay">VØID_X ELITE</div>
                        <video loop playsinline muted src="${v.url}" onclick="this.paused?this.play():this.pause()"></video>
                        <div class="side-bar">
                            <div class="btn-ionic" onclick="toggleMute(this)"><i class="fas fa-volume-mute text-white/50"></i></div>
                            <div class="btn-ionic" onclick="triggerAd1(); likeVid('${id}')">
                                <i class="fas fa-heart text-pink-500"></i>
                                <span class="text-[10px] font-bold mt-1 text-pink-400">${v.likes || 0}</span>
                            </div>
                            <div class="btn-ionic" onclick="triggerAd2(); toggleChat();">
                                <i class="fas fa-terminal text-cyan-400"></i>
                            </div>
                            <div class="btn-ionic" onclick="triggerAd1(); shareVid()">
                                <i class="fas fa-share-nodes text-green-400"></i>
                            </div>
                        </div>
                    `;
                    feed.appendChild(section);

                    adminList.innerHTML += `
                        <div class="vid-manager-item">
                            <video src="${v.url}" class="w-12 h-12 object-cover rounded-lg"></video>
                            <div class="flex-1 text-[10px] font-mono opacity-40">${id}</div>
                            <button onclick="deleteVid('${id}')" class="text-red-500 p-2"><i class="fas fa-trash"></i></button>
                        </div>
                    `;
                });
                observeFeed();
            }
        });

        function toggleMute(btn) {
            isMuted = !isMuted;
            document.querySelectorAll('video').forEach(v => v.muted = isMuted);
            btn.innerHTML = isMuted ? '<i class="fas fa-volume-mute text-white/50"></i>' : '<i class="fas fa-volume-up text-white"></i>';
        }

        function observeFeed() {
            const colors = ['#ff007f', '#00f3ff', '#bd00ff', '#00ff88', '#ff8800'];
            const obs = new IntersectionObserver(entries => {
                entries.forEach(e => {
                    const v = e.target.querySelector('video');
                    const icons = e.target.querySelectorAll('.btn-ionic i');
                    if(e.isIntersecting) {
                        v.play().catch(()=>{});
                        const randomColor = colors[Math.floor(Math.random()*colors.length)];
                        icons.forEach(icon => {
                            if(!icon.classList.contains('text-white')) {
                                icon.style.filter = `drop-shadow(0 0 8px ${randomColor})`;
                            }
                        });
                    } else { v.pause(); v.currentTime = 0; }
                });
            }, { threshold: 0.7 });
            document.querySelectorAll('.card').forEach(c => obs.observe(c));
        }

        // الرفع (مباشر بدون إعلانات)
        const widget = cloudinary.createUploadWidget({
            cloudName: "dk5kas1gc", uploadPreset: "go_kck",
            clientAllowedFormats: ["mp4", "mov"]
        }, (err, res) => {
            if(!err && res.event === "success") db.ref('videos').push({url: res.info.secure_url, likes: 0});
        });
        document.getElementById('upload-btn').onclick = () => widget.open();

        function openAdmin() { if(prompt("ACCESS_CODE:") === "1234") document.getElementById('admin-ui').style.display = 'flex'; }
        function closeAdmin() { document.getElementById('admin-ui').style.display = 'none'; }
        function toggleChat() { const c = document.getElementById('chat-ui'); c.style.display = c.style.display==='flex'?'none':'flex'; }
        function deleteVid(id) { if(confirm("حذف؟")) db.ref(`videos/${id}`).remove(); }
        function likeVid(id) { db.ref(`videos/${id}/likes`).transaction(l => (l || 0) + 1); }
        function shareVid() { if(navigator.share) navigator.share({url: window.location.href}); }

        function sendMsg() {
            const i = document.getElementById('msg-input');
            if(i.value.trim()) { db.ref('chat').push({u: USR_ID, t: i.value}); i.value = ''; }
        }

        db.ref('chat').limitToLast(15).on('value', s => {
            const b = document.getElementById('chat-msgs'); b.innerHTML = '';
            s.forEach(m => {
                const d = m.val();
                b.innerHTML += `<div class="bg-white/5 p-3 rounded-xl border-r-2 border-cyan-500">
                    <div class="text-[9px] text-cyan-400 font-black mb-1 uppercase">${d.u}</div>
                    <div class="text-sm">${d.t}</div>
                </div>`;
            });
            b.scrollTop = b.scrollHeight;
        });
    </script>
</body>
</html>
