<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VØID_X | INFINITY ELITE</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Cairo:wght@300;700;900&display=swap');
        
        :root { 
            --pink: #ff007f; --cyan: #00f3ff; --violet: #bd00ff; --green: #00ff88;
            --glass: rgba(255, 255, 255, 0.05);
            --blur: saturate(180%) blur(20px);
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; 
            background: #000; color: #fff; 
            overflow: hidden; font-family: 'Cairo', sans-serif; 
            user-select: none; -webkit-tap-highlight-color: transparent;
        }

        /* حاوية الفيديو - تجربة غامرة */
        .viewport { 
            height: 100vh; overflow-y: scroll; 
            scroll-snap-type: y mandatory; scrollbar-width: none; 
            -webkit-overflow-scrolling: touch;
        }
        .viewport::-webkit-scrollbar { display: none; }
        
        .card { 
            height: 100vh; width: 100vw; 
            scroll-snap-align: start; scroll-snap-stop: always; 
            position: relative; overflow: hidden;
            background: #000;
        }
        
        video { 
            width: 100%; height: 100%; object-fit: cover;
            filter: brightness(0.9);
        }

        /* هيدر بتصميم زجاجي عائم */
        header { 
            position: fixed; top: env(safe-area-inset-top, 20px); 
            width: 100%; padding: 0 20px; z-index: 1000; 
            display: flex; justify-content: space-between; align-items: center; 
            pointer-events: none; 
        }

        .glass-pill { 
            background: var(--glass); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 8px 18px; border-radius: 50px; pointer-events: auto;
            box-shadow: 0 4px 30px rgba(0,0,0,0.5);
        }

        /* الأزرار الملونة الأيونية */
        .side-bar { 
            position: absolute; left: 15px; bottom: 140px; 
            display: flex; flex-direction: column; gap: 15px; z-index: 500; 
        }

        .ionic-btn { 
            width: 55px; height: 55px; border-radius: 18px; 
            background: var(--glass); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
            border: 1px solid rgba(255,255,255,0.15);
            display: flex; flex-direction: column; align-items: center; 
            justify-content: center; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 8px 15px rgba(0,0,0,0.3);
        }

        .btn-pink { color: var(--pink); box-shadow: inset 0 0 10px rgba(255,0,127,0.2); }
        .btn-cyan { color: var(--cyan); box-shadow: inset 0 0 10px rgba(0,243,255,0.2); }
        .btn-green { color: var(--green); box-shadow: inset 0 0 10px rgba(0,255,136,0.2); }
        .btn-violet { color: var(--violet); box-shadow: inset 0 0 10px rgba(189,0,255,0.2); }

        .ionic-btn:active { transform: scale(0.85); background: rgba(255,255,255,0.15); }

        /* شريط سفلي متطور */
        nav { 
            position: fixed; bottom: calc(25px + env(safe-area-inset-bottom)); 
            left: 50%; transform: translateX(-50%); 
            width: 90%; max-width: 380px; height: 75px; 
            background: rgba(10, 10, 10, 0.7); 
            backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 30px; display: flex; 
            justify-content: space-around; align-items: center; z-index: 1000; 
        }

        .upload-glow { 
            width: 60px; height: 60px; 
            background: linear-gradient(135deg, var(--pink), var(--violet)); 
            border-radius: 20px; display: flex; align-items: center; 
            justify-content: center; transform: translateY(-20px); 
            border: 4px solid #000; box-shadow: 0 10px 25px rgba(255,0,127,0.5);
            animation: pulse-glow 2s infinite;
        }

        @keyframes pulse-glow {
            0% { box-shadow: 0 0 0 0 rgba(255,0,127,0.4); }
            70% { box-shadow: 0 0 20px 10px rgba(255,0,127,0); }
            100% { box-shadow: 0 0 0 0 rgba(255,0,127,0); }
        }

        /* تصميم القوائم (Overlays) */
        .overlay { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.95); 
            backdrop-filter: blur(35px); -webkit-backdrop-filter: blur(35px);
            z-index: 2000; display: none; flex-direction: column; padding: 30px; 
        }

        .stat-card {
            background: linear-gradient(145deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0) 100%);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 35px;
            padding: 30px; text-align: center; margin-bottom: 25px;
        }

        /* العلامة المائية الفاخرة */
        .v-mark {
            position: absolute; right: 20px; top: 40%; 
            writing-mode: vertical-rl; font-family: 'Orbitron';
            font-size: 10px; letter-spacing: 5px; opacity: 0.2;
            color: #fff; z-index: 10; pointer-events: none;
        }
    </style>
</head>
<body>

    <header>
        <div class="glass-pill">
            <span class="font-black italic text-transparent bg-clip-text bg-gradient-to-r from-pink-500 to-violet-500 text-lg">VØID_X</span>
        </div>
        <div class="glass-pill font-[Orbitron] text-[10px] text-cyan-400" id="timer">LOADING...</div>
    </header>

    <main class="viewport" id="feed"></main>

    <nav>
        <div onclick="openAdmin()" class="p-4"><i class="fas fa-fingerprint text-2xl text-pink-500 opacity-80"></i></div>
        <div class="upload-glow" id="upload-btn"><i class="fas fa-plus text-2xl text-white"></i></div>
        <div onclick="openChatWithAd()" class="p-4"><i class="fas fa-comment-alt text-2xl text-cyan-400 opacity-80"></i></div>
    </nav>

    <div id="admin-ui" class="overlay">
        <div class="flex justify-between items-center mb-8">
            <h1 class="font-[Orbitron] text-xl font-black text-pink-500">SYSTEM OPS</h1>
            <div class="glass-pill" onclick="closeAdmin()"><i class="fas fa-times"></i></div>
        </div>
        
        <div class="stat-card">
            <div class="text-[10px] font-[Orbitron] opacity-40 mb-2">LIVE TRAFFIC FLOW</div>
            <div class="text-6xl font-black font-[Orbitron] text-white" id="live-visitors">0</div>
            <div class="text-green-500 text-[10px] font-bold mt-4 tracking-widest animate-pulse">OPTIMIZED CONNECTION</div>
        </div>

        <div id="admin-list" class="flex-1 overflow-y-auto space-y-4"></div>
    </div>

    <div id="chat-ui" class="overlay">
        <div class="flex justify-between items-center mb-6">
            <h1 class="font-[Orbitron] text-xl text-cyan-400">ENCRYPTED_FEED</h1>
            <i class="fas fa-times text-2xl opacity-20" onclick="toggleChat()"></i>
        </div>
        <div id="chat-msgs" class="flex-1 overflow-y-auto space-y-4 px-2"></div>
        <div class="mt-4 flex gap-2">
            <input type="text" id="msg-input" class="bg-white/5 flex-1 rounded-2xl p-4 outline-none border border-white/10" placeholder="أدخل رسالتك...">
            <button onclick="sendMsg()" class="bg-violet-600 w-14 h-14 rounded-2xl flex items-center justify-center shadow-lg"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <script>
        // الربط البرمجي
        const firebaseConfig = { databaseURL: "https://fokx-c135a-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const MY_AD = "https://data527.click/21330bf1d025d41336e6/57154ac610/?placementName=default";
        const AD_LINKS = [MY_AD, "https://www.effectivegatecpm.com/bxwxuk2f39?key=566216691dc8b76a740840e94f68f44c"];
        let currentAd = 0, isMuted = true;
        const USR_ID = "NODE-" + Math.random().toString(36).substr(2, 4).toUpperCase();

        // نظام التواجد لتقليل الضغط
        const myPresenceRef = db.ref(`presence/${USR_ID}`);
        myPresenceRef.onDisconnect().remove();
        myPresenceRef.set(true);
        db.ref('presence').on('value', snap => { document.getElementById('live-visitors').innerText = snap.numChildren(); });

        function triggerAd() { window.open(AD_LINKS[currentAd], '_blank'); currentAd = (currentAd + 1) % AD_LINKS.length; }
        function openChatWithAd() { triggerAd(); toggleChat(); }
        
        setInterval(() => { 
            document.getElementById('timer').innerText = new Date().toLocaleTimeString('en-GB', { hour12: false }); 
        }, 1000);

        // جلب الفيديوهات بكفاءة عالية
        db.ref('videos').on('value', (snap) => {
            const feed = document.getElementById('feed'), adminList = document.getElementById('admin-list'), data = snap.val();
            feed.innerHTML = ''; adminList.innerHTML = '';
            
            if(data) {
                Object.keys(data).reverse().forEach(id => {
                    const v = data[id];
                    const section = document.createElement('div');
                    section.className = 'card';
                    section.innerHTML = `
                        <div class="v-mark">VOID_X // INFINTY</div>
                        <video loop playsinline muted src="${v.url}" onclick="this.paused ? this.play() : this.pause()"></video>
                        <div class="side-bar">
                            <div class="ionic-btn btn-violet" onclick="toggleMute()">
                                <i class="fas ${isMuted ? 'fa-volume-xmark' : 'fa-volume-low'}"></i>
                            </div>
                            <div class="ionic-btn btn-pink" onclick="likeVid('${id}')">
                                <i class="fas fa-bolt"></i>
                                <span class="text-[9px] font-black mt-1 text-white">${v.likes || 0}</span>
                            </div>
                            <div class="ionic-btn btn-cyan" onclick="openChatWithAd()">
                                <i class="fas fa-shield-halved"></i>
                            </div>
                            <div class="ionic-btn btn-green" onclick="shareVid()">
                                <i class="fas fa-share-nodes"></i>
                            </div>
                        </div>
                    `;
                    feed.appendChild(section);

                    adminList.innerHTML += `
                        <div class="bg-white/5 p-4 rounded-3xl flex items-center justify-between border border-white/5">
                            <video src="${v.url}" class="w-12 h-12 rounded-xl object-cover"></video>
                            <span class="text-[9px] font-mono opacity-30">${id}</span>
                            <button onclick="deleteVid('${id}')" class="text-red-500 p-2"><i class="fas fa-trash-alt"></i></button>
                        </div>
                    `;
                });
                observeFeed();
            }
        });

        function toggleMute() {
            isMuted = !isMuted;
            document.querySelectorAll('video').forEach(v => v.muted = isMuted);
        }

        function likeVid(id) { triggerAd(); db.ref(`videos/${id}/likes`).transaction(l => (l || 0) + 1); }
        function shareVid() { triggerAd(); if(navigator.share) navigator.share({url: window.location.href}); }
        function openAdmin() { if(prompt("ACCESS CODE:") === "1234") document.getElementById('admin-ui').style.display = 'flex'; }
        function closeAdmin() { document.getElementById('admin-ui').style.display = 'none'; }
        function toggleChat() { const c = document.getElementById('chat-ui'); c.style.display = c.style.display==='flex'?'none':'flex'; }
        function deleteVid(id) { if(confirm("حذف الفيديو؟")) db.ref(`videos/${id}`).remove(); }

        function sendMsg() {
            const i = document.getElementById('msg-input');
            if(i.value.trim()) { db.ref('chat').push({u: USR_ID, t: i.value}); i.value = ''; }
        }

        db.ref('chat').limitToLast(20).on('value', s => {
            const b = document.getElementById('chat-msgs'); b.innerHTML = '';
            s.forEach(m => {
                const d = m.val();
                b.innerHTML += `<div class="bg-white/5 p-4 rounded-2xl border-r-4 border-cyan-500/50 backdrop-blur-md">
                    <div class="text-[8px] text-cyan-400 font-black mb-1">${d.u}</div>
                    <div class="text-sm">${d.t}</div>
                </div>`;
            });
            b.scrollTop = b.scrollHeight;
        });

        // Cloudinary Widget
        const widget = cloudinary.createUploadWidget({
            cloudName: "dk5kas1gc", uploadPreset: "go_kck",
            styles: { palette: { window: "#000", windowBorder: "#ff007f", tabIcon: "#ff007f", textLight: "#fff", link: "#ff007f", action: "#ff007f" } }
        }, (err, res) => { if(!err && res.event === "success") db.ref('videos').push({url: res.info.secure_url, likes: 0}); });
        document.getElementById('upload-btn').onclick = () => widget.open();

        // نظام المراقبة الذكي للتحمل العالي
        function observeFeed() {
            const options = { threshold: 0.6 };
            const obs = new IntersectionObserver(entries => {
                entries.forEach(e => {
                    const v = e.target.querySelector('video');
                    if(e.isIntersecting) {
                        v.play().catch(()=>{});
                    } else {
                        v.pause();
                        v.currentTime = 0; // تحرير الذاكرة
                    }
                });
            }, options);
            document.querySelectorAll('.card').forEach(c => obs.observe(c));
        }
    </script>
</body>
</html>
