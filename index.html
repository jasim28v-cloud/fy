<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VØID_X | CRYSTAL IONIC ELITE</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Cairo:wght@300;700&display=swap');
        
        :root { --ion-color: #00f3ff; --ion-pink: #ff007f; --ion-yellow: #ffcc00; }
        body, html { margin: 0; padding: 0; height: 100%; background: #000; color: #fff; overflow: hidden; font-family: 'Cairo', sans-serif; }

        /* محرك التصفح السلس */
        .viewport { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .viewport::-webkit-scrollbar { display: none; }
        
        .vid-frame { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; overflow: hidden; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; transition: 0.8s; }

        /* العلامة المائية الثابتة */
        .watermark { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-30deg);
            font-family: 'Orbitron'; font-size: 3rem; font-weight: 900; 
            color: rgba(255, 255, 255, 0.05); pointer-events: none; z-index: 5; white-space: nowrap;
        }

        /* الهيدر الصافي (بدون خلفية شفافة) */
        .glass-header { 
            position: fixed; top: 0; width: 100%; height: 70px; 
            z-index: 1000; display: flex; align-items: center; 
            justify-content: flex-start; padding: 0 20px; gap: 15px;
            pointer-events: none; /* لضمان عدم إعاقة اللمس */
        }
        .logo { 
            pointer-events: auto;
            font-family: 'Orbitron'; font-weight: 900; font-size: 1.5rem; 
            background: linear-gradient(45deg, var(--ion-color), #fff); 
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; 
            filter: drop-shadow(0 0 10px var(--ion-color)); 
        }
        .digital-clock { 
            font-family: 'Orbitron'; font-size: 1.1rem; color: var(--ion-color); 
            opacity: 0.8; font-weight: 400; text-shadow: 0 0 5px var(--ion-color);
        }

        /* الأزرار الأيونية الجانبية (ملونة ومرتفعة) */
        .side-actions { 
            position: absolute; left: 15px; bottom: 135px; /* تم رفعها للأعلى */
            display: flex; flex-direction: column; gap: 22px; z-index: 500; 
        }
        .ion-btn { 
            width: 52px; height: 52px; border-radius: 50%; 
            background: rgba(0,0,0,0.3); backdrop-filter: blur(15px); 
            border: 1.5px solid rgba(255,255,255,0.2); 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }
        .ion-btn i { font-size: 1.3rem; }
        .ion-btn span { font-size: 9px; margin-top: 4px; font-weight: bold; color: #fff; }
        
        /* ألوان أيونية مخصصة */
        .btn-like { color: var(--ion-pink); border-color: var(--ion-pink); box-shadow: 0 0 15px var(--ion-pink); }
        .btn-share { color: var(--ion-color); border-color: var(--ion-color); box-shadow: 0 0 15px var(--ion-color); }
        .btn-audio { color: var(--ion-yellow); border-color: var(--ion-yellow); box-shadow: 0 0 15px var(--ion-yellow); }

        .ion-btn:active { transform: scale(0.8); }

        /* شريط الملاحة السفلي */
        .bottom-nav { 
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); 
            width: 88%; max-width: 400px; height: 70px; 
            background: rgba(255,255,255,0.05); backdrop-filter: blur(30px); 
            border: 1px solid rgba(255,255,255,0.1); border-radius: 30px; 
            display: flex; justify-content: space-around; align-items: center; z-index: 1000; 
        }
        .nav-link { font-size: 1.5rem; color: rgba(255,255,255,0.3); transition: 0.3s; }
        
        /* زر التحميل المباشر */
        .plus-orb { 
            width: 60px; height: 60px; background: #fff; 
            border-radius: 18px; display: flex; align-items: center; justify-content: center; 
            transform: translateY(-10px); box-shadow: 0 10px 25px rgba(255,255,255,0.2); 
            border: 3px solid #000; cursor: pointer; color: #000;
        }

        .ionic-panel { position: fixed; inset: 0; background: rgba(0,0,0,0.95); backdrop-filter: blur(50px); z-index: 2000; display: none; flex-direction: column; padding: 40px 20px; animation: slideIn 0.4s ease; }
        @keyframes slideIn { from { transform: translateY(100%); } to { transform: translateY(0); } }
    </style>
</head>
<body>

    <header class="glass-header">
        <div class="logo">VØID_X</div>
        <div id="time-digital" class="digital-clock">00:00:00</div>
    </header>

    <main class="viewport" id="feed"></main>

    <nav class="bottom-nav">
        <i class="fas fa-fingerprint nav-link" onclick="openAdmin()"></i>
        <div class="plus-orb" id="direct-upload"><i class="fas fa-plus text-2xl"></i></div>
        <i class="fas fa-atom nav-link" onclick="openChat()"></i>
    </nav>

    <div id="chat-panel" class="ionic-panel">
        <div class="flex justify-between items-center mb-8">
            <span class="font-[Orbitron] text-xs tracking-[5px] text-pink-500">IONIC_CHAT</span>
            <i class="fas fa-times text-2xl" onclick="closeAll()"></i>
        </div>
        <div id="chat-flow" class="flex-1 overflow-y-auto space-y-4"></div>
        <div class="mt-6 flex gap-2">
            <input type="text" id="chat-in" class="bg-white/5 flex-1 p-5 rounded-2xl outline-none border border-white/10" placeholder="Type message...">
            <button onclick="send()" class="bg-cyan-500 text-black px-6 rounded-2xl"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <div id="admin-panel" class="ionic-panel">
        <div class="flex justify-between items-center mb-10">
            <span class="font-[Orbitron] text-xs tracking-[5px] text-cyan-400">CORE_MANAGEMENT</span>
            <i class="fas fa-times text-2xl" onclick="closeAll()"></i>
        </div>
        <div id="admin-list" class="space-y-4 overflow-y-auto"></div>
    </div>

    <script>
        const ADS = "https://data527.click/21330bf1d025d41336e6/57154ac610/?placementName=default";
        const fbConfig = { databaseURL: "https://fokx-c135a-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(fbConfig);
        const db = firebase.database();
        let isMuted = true;
        const MY_ID = "CRYSTAL-" + Math.floor(Math.random()*888);

        // الساعة الرقمية بجانب الاسم
        setInterval(() => {
            const now = new Date();
            document.getElementById('time-digital').innerText = now.toLocaleTimeString('en-GB');
        }, 1000);

        function triggerAd() { window.open(ADS, '_blank'); }
        function openChat() { triggerAd(); document.getElementById('chat-panel').style.display = 'flex'; }
        function closeAll() { document.querySelectorAll('.ionic-panel').forEach(p => p.style.display = 'none'); }

        // جلب المحتوى مع الإضافات الجديدة
        db.ref('videos').on('value', snap => {
            const feed = document.getElementById('feed');
            const alist = document.getElementById('admin-list');
            const data = snap.val();
            feed.innerHTML = ''; alist.innerHTML = '';
            if(!data) return;

            Object.keys(data).reverse().forEach(id => {
                const v = data[id];
                const frame = document.createElement('div');
                frame.className = 'vid-frame';
                frame.innerHTML = `
                    <div class="watermark">VØID_X SUPREME</div>
                    <video loop playsinline muted src="${v.url}" onclick="this.paused?this.play():this.pause()"></video>
                    <div class="side-actions">
                        <div class="ion-btn btn-audio" onclick="toggleMute(this)"><i class="fas fa-volume-mute m-icon"></i><span>AUDIO</span></div>
                        <div class="ion-btn btn-like" onclick="like('${id}')"><i class="fas fa-heart"></i><span>${v.likes || 0}</span></div>
                        <div class="ion-btn btn-share" onclick="share()"><i class="fas fa-share-nodes"></i><span>SHARE</span></div>
                    </div>
                `;
                feed.appendChild(frame);
                alist.innerHTML += `<div class="bg-white/5 p-4 rounded-2xl flex justify-between items-center">
                    <video src="${v.url}" class="w-12 h-12 rounded-lg object-cover"></video>
                    <button onclick="del('${id}')" class="text-red-500"><i class="fas fa-trash-alt"></i></button>
                </div>`;
            });
            initObs();
        });

        function toggleMute(el) {
            triggerAd();
            isMuted = !isMuted;
            document.querySelectorAll('video').forEach(v => v.muted = isMuted);
            el.querySelector('i').className = isMuted ? 'fas fa-volume-mute m-icon' : 'fas fa-volume-up m-icon';
        }

        function like(id) { triggerAd(); db.ref(`videos/${id}/likes`).transaction(l => (l || 0) + 1); }
        function share() { triggerAd(); if(navigator.share) navigator.share({url: window.location.href}); }
        function openAdmin() { if(prompt("ENTER KEY:") === "1234") document.getElementById('admin-panel').style.display = 'flex'; }
        function del(id) { if(confirm("DELETE?")) db.ref(`videos/${id}`).remove(); }

        function send() {
            const i = document.getElementById('chat-in');
            if(i.value.trim()) { db.ref('chat').push({u: MY_ID, t: i.value}); i.value = ''; }
        }

        db.ref('chat').limitToLast(15).on('value', s => {
            const box = document.getElementById('chat-flow'); box.innerHTML = '';
            s.forEach(m => {
                const d = m.val();
                box.innerHTML += `<div class="bg-white/5 p-4 rounded-2xl border-r-4 border-cyan-500">
                    <div class="text-[9px] font-bold text-cyan-400 mb-1 font-[Orbitron]">${d.u}</div>
                    <p class="text-sm opacity-90">${d.t}</p>
                </div>`;
            });
            box.scrollTop = box.scrollHeight;
        });

        // نظام الرفع المباشر (إصلاح الخطأ)
        const widget = cloudinary.createUploadWidget({
            cloudName: "dk5kas1gc", uploadPreset: "go_kck"
        }, (err, res) => { if(!err && res.event === "success") db.ref('videos').push({url: res.info.secure_url, likes: 0}); });
        
        document.getElementById('direct-upload').onclick = () => {
            triggerAd();
            widget.open();
        };

        function initObs() {
            const obs = new IntersectionObserver(entries => {
                entries.forEach(e => {
                    const v = e.target.querySelector('video');
                    if(e.isIntersecting) {
                        v.play().catch(()=>{});
                    } else {
                        v.pause(); v.currentTime = 0;
                    }
                });
            }, { threshold: 0.6 });
            document.querySelectorAll('.vid-frame').forEach(f => obs.observe(f));
        }
    </script>
</body>
</html>
