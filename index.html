<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VØID_X | INTRA ULTRA+</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Syncopate:wght@400;700&display=swap');
        
        :root { --neon-blue: #00f3ff; --neon-pink: #ff007f; --bg-void: #000103; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg-void); color: #fff; overflow: hidden; font-family: 'Orbitron', sans-serif; }

        /* شاشة الإنترو الفائقة (INTRA ULTRA+) */
        #intra-ultra {
            position: fixed; inset: 0; z-index: 9999; background: #000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 1s cubic-bezier(0.4, 0, 0.2, 1), visibility 1s;
        }
        .ultra-brand { font-family: 'Syncopate', sans-serif; font-size: 3rem; font-weight: 700; letter-spacing: 15px; background: linear-gradient(135deg, #fff 30%, var(--neon-blue), var(--neon-pink)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 20px rgba(0,243,255,0.5)); animation: ultraPulse 2s infinite; }
        .nano-load { width: 180px; height: 2px; background: rgba(255,255,255,0.05); border-radius: 10px; margin-top: 25px; overflow: hidden; position: relative; }
        .nano-progress { width: 40%; height: 100%; background: linear-gradient(to right, var(--neon-blue), var(--neon-pink)); position: absolute; animation: nanoScan 1.2s infinite ease-in-out; box-shadow: 0 0 15px var(--neon-blue); }

        @keyframes ultraPulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.8; transform: scale(0.98); } }
        @keyframes nanoScan { 0% { left: -100%; } 100% { left: 100%; } }

        /* محرك التصفح الكوني */
        .nebula-viewport { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
        .nebula-viewport::-webkit-scrollbar { display: none; }
        
        .vid-card { height: 100vh; width: 100vw; scroll-snap-align: start; scroll-snap-stop: always; position: relative; overflow: hidden; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; filter: contrast(1.1) brightness(1.1); transition: opacity 0.5s; }

        /* العلامة المائية الهولوغرافية (خفيفة جداً) */
        .holo-mark { position: absolute; bottom: 20%; left: -30px; font-size: 6rem; font-weight: 900; opacity: 0.02; pointer-events: none; transform: rotate(-90deg); text-transform: uppercase; white-space: nowrap; font-family: 'Orbitron'; color: #fff; }

        /* واجهة التحكم العلوية */
        .top-nav { position: fixed; top: 0; width: 100%; height: 80px; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); z-index: 1000; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; pointer-events: none; }
        .nebula-brand { font-family: 'Syncopate', sans-serif; font-weight: 700; letter-spacing: 5px; color: #fff; text-shadow: 0 0 10px var(--neon-blue); pointer-events: auto; }
        
        /* أزرار التفاعل الجانبية (الأيونيك المتطور) */
        .action-orbit { position: absolute; left: 15px; bottom: 120px; display: flex; flex-direction: column; gap: 20px; z-index: 500; }
        .orbit-btn { width: 55px; height: 55px; border-radius: 20px; background: rgba(0,243,255,0.03); backdrop-filter: blur(20px); border: 1px solid rgba(0,243,255,0.1); display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .orbit-btn i { font-size: 1.3rem; color: #fff; filter: drop-shadow(0 0 10px rgba(255,255,255,0.5)); }
        .btn-val { font-size: 9px; margin-top: 4px; color: rgba(255,255,255,0.7); font-weight: bold; font-family: 'Orbitron'; }
        .orbit-btn:active { transform: scale(0.8) rotate(15deg); background: rgba(255,0,127,0.1); border-color: var(--neon-pink); }

        /* شريط التحكم الكوانتي السريع */
        .quantum-nav { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); width: 85%; max-width: 380px; height: 75px; background: rgba(15,15,15,0.4); backdrop-filter: blur(40px); border: 1px solid rgba(255,255,255,0.08); border-radius: 25px; display: flex; justify-content: space-around; align-items: center; z-index: 1000; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        .core-trigger { font-size: 2.2rem; color: var(--neon-pink); filter: drop-shadow(0 0 15px var(--neon-pink)); cursor: pointer; transition: 0.5s; animation: corePulse 2s infinite; }
        .v-plus { width: 60px; height: 60px; background: linear-gradient(45deg, var(--neon-blue), var(--neon-pink)); border-radius: 22px; display: flex; align-items: center; justify-content: center; transform: translateY(-20px) rotate(45deg); box-shadow: 0 10px 30px rgba(0,243,255,0.3); border: 4px solid var(--bg-void); }
        .v-plus i { transform: rotate(-45deg); font-size: 1.5rem; color: #fff; }

        @keyframes corePulse { 0%, 100% { opacity: 1; filter: drop-shadow(0 0 15px var(--neon-pink)); } 50% { opacity: 0.6; filter: drop-shadow(0 0 5px var(--neon-pink)); } }

        /* القوائم والطبقات */
        .nebula-panel { position: fixed; inset: 0; background: rgba(0,1,5,0.99); z-index: 2000; display: none; flex-direction: column; padding: 40px 25px; backdrop-filter: blur(50px); animation: panelIn 0.4s ease-out; }
        @keyframes panelIn { from { opacity: 0; transform: translateY(50px); } to { opacity: 1; transform: translateY(0); } }
        
        .radar-stats { background: radial-gradient(circle, rgba(0,243,255,0.1) 0%, transparent 70%); border: 1px solid rgba(0,243,255,0.2); padding: 30px; border-radius: 100%; width: 200px; height: 200px; margin: 0 auto 30px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        .radar-stats::before { content: ''; position: absolute; inset: 0; background: conic-gradient(from 0deg, var(--neon-blue), transparent); animation: radarScan 3s linear infinite; opacity: 0.3; }
        @keyframes radarScan { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="intra-ultra">
        <div class="ultra-brand">VØID_X</div>
        <div class="nano-load"><div class="nano-progress"></div></div>
        <div class="text-[9px] tracking-[10px] font-[Orbitron] text-white/20 mt-3">SYSTEM_SYNCING</div>
    </div>

    <header class="top-nav">
        <div class="nebula-brand">VØID_X</div>
        <div class="text-[10px] opacity-40 font-[Orbitron]" id="live-clock">00:00:00</div>
    </header>

    <main class="nebula-viewport" id="main-feed"></main>

    <nav class="quantum-nav">
        <div onclick="accessCore()"><i class="fas fa-fingerprint core-trigger"></i></div>
        <div class="v-plus" id="nebula-upload"><i class="fas fa-plus"></i></div>
        <div onclick="openDeepChat()"><i class="fas fa-atom text-2xl opacity-20"></i></div>
    </nav>

    <div id="admin-panel" class="nebula-panel">
        <div class="flex justify-between items-center mb-10">
            <span class="text-xs tracking-[10px] font-[Syncopate] text-cyan-400">OBSERVER_CORE</span>
            <i class="fas fa-times text-2xl" onclick="closePanel('admin-panel')"></i>
        </div>
        <div class="radar-stats">
            <div class="text-[10px] font-[Orbitron] opacity-50 mb-1">ACTIVE_SOULS</div>
            <div id="soul-count" class="text-5xl font-black text-white font-[Orbitron]">0</div>
        </div>
        <div id="vid-manage" class="flex-1 overflow-y-auto space-y-4 pr-2"></div>
    </div>

    <div id="chat-panel" class="nebula-panel">
        <div class="flex justify-between items-center mb-8">
            <span class="text-xs tracking-[10px] font-[Syncopate] text-pink-500">DEEP_NETWORK</span>
            <i class="fas fa-chevron-down text-2xl" onclick="closePanel('chat-panel')"></i>
        </div>
        <div id="chat-stream" class="flex-1 overflow-y-auto space-y-4 pr-3"></div>
        <div class="mt-6 flex gap-3">
            <input type="text" id="msg-input" class="bg-white/5 flex-1 rounded-2xl p-5 outline-none border border-white/10" placeholder="Broadcast message...">
            <button onclick="broadcast()" class="bg-cyan-600 px-8 rounded-2xl"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <script>
        // التكوينات التقنية (الروابط الجديدة)
        const firebaseConfig = { databaseURL: "https://fokx-c135a-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const ADS = ["https://www.effectivegatecpm.com/bxwxuk2f39?key=566216691dc8b76a740840e94f68f44c", "https://www.effectivegatecpm.com/k60w64w4gk?key=564f3d8cc4ac85949f218179b742495e"];
        let adIdx = 0;
        let muted = true;
        const UID = "NODE-" + Math.random().toString(36).substr(2, 4).toUpperCase();

        // نظام التواجد (Presence)
        const pRef = db.ref(`presence/${UID}`);
        pRef.onDisconnect().remove();
        pRef.set(true);
        db.ref('presence').on('value', s => { document.getElementById('soul-count').innerText = s.numChildren(); });

        function showAd() { window.open(ADS[adIdx], '_blank'); adIdx = (adIdx + 1) % ADS.length; }
        function openDeepChat() { showAd(); document.getElementById('chat-panel').style.display = 'flex'; }
        function closePanel(id) { document.getElementById(id).style.display = 'none'; }
        setInterval(() => { document.getElementById('live-clock').innerText = new Date().toLocaleTimeString('en-GB'); }, 1000);

        // جلب البيانات الكونية
        db.ref('videos').on('value', (snap) => {
            const feed = document.getElementById('main-feed');
            const manage = document.getElementById('vid-manage');
            const data = snap.val();
            feed.innerHTML = ''; manage.innerHTML = '';
            if(!data) {
                // إخفاء الإنترو إذا لم توجد فيديوهات
                hideIntra();
                return;
            }

            const keys = Object.keys(data).reverse();
            keys.forEach((id, index) => {
                const v = data[id];
                const card = document.createElement('div');
                card.className = 'vid-card';
                card.innerHTML = `
                    <div class="holo-mark">VØID_X SUPREME</div>
                    <video loop playsinline muted src="${v.url}" onclick="this.paused?this.play():this.pause()"></video>
                    <div class="action-orbit">
                        <div class="orbit-btn" onclick="toggleAudio()"><i class="fas ${muted?'fa-volume-mute':'fa-volume-up'} m-icon"></i></div>
                        <div class="orbit-btn" onclick="pulseLike('${id}')"><i class="fas fa-bolt text-cyan-400"></i><span class="btn-val">${v.likes || 0}</span></div>
                        <div class="orbit-btn" onclick="openDeepChat()"><i class="fas fa-comment-dots"></i></div>
                        <div class="orbit-btn" onclick="shareNode()"><i class="fas fa-share-alt"></i></div>
                    </div>
                `;
                feed.appendChild(card);
                manage.innerHTML += `<div class="bg-white/5 p-4 rounded-3xl flex items-center justify-between border border-white/5">
                    <video src="${v.url}" class="w-12 h-12 rounded-xl object-cover"></video>
                    <span class="text-[9px] font-mono opacity-30">${id.substr(0,12)}</span>
                    <button onclick="removeNode('${id}')" class="text-pink-500 px-4"><i class="fas fa-trash-alt text-xl"></i></button>
                </div>`;

                // إخفاء الإنترو بمجرد تحميل أول فيديو
                if(index === 0) {
                    const firstVideo = card.querySelector('video');
                    firstVideo.onloadeddata = () => {
                        hideIntra();
                    };
                }
            });
            initNebulaObserver();
        });

        function hideIntra() {
            const intra = document.getElementById('intra-ultra');
            if(intra.style.visibility !== 'hidden') {
                setTimeout(() => {
                    intra.style.opacity = '0';
                    setTimeout(() => intra.style.visibility = 'hidden', 1000);
                }, 1500); // إبقاء الإنترو فترة بسيطة لإعطاء طابع الفخامة
            }
        }

        function toggleAudio() {
            muted = !muted;
            document.querySelectorAll('video').forEach(v => v.muted = muted);
            document.querySelectorAll('.m-icon').forEach(i => i.className = muted ? 'fas fa-volume-mute m-icon' : 'fas fa-volume-up m-icon');
        }

        function pulseLike(id) { showAd(); db.ref(`videos/${id}/likes`).transaction(l => (l || 0) + 1); }
        function shareNode() { showAd(); if(navigator.share) navigator.share({url: window.location.href}); }
        function accessCore() { if(prompt("ACCESS CODE:") === "1234") document.getElementById('admin-panel').style.display = 'flex'; }
        function removeNode(id) { if(confirm("Erase from existence?")) db.ref(`videos/${id}`).remove(); }

        function broadcast() {
            const i = document.getElementById('msg-input');
            if(i.value.trim()) { db.ref('chat').push({u: UID, t: i.value, time: Date.now()}); i.value = ''; }
        }
        db.ref('chat').limitToLast(15).on('value', s => {
            const stream = document.getElementById('chat-stream'); stream.innerHTML = '';
            s.forEach(m => {
                const d = m.val();
                stream.innerHTML += `<div class="bg-white/5 p-4 rounded-3xl border-l-2 border-cyan-500/50">
                    <div class="text-[8px] text-cyan-400 font-black mb-1 font-[Syncopate]">${d.u}</div>
                    <div class="text-sm opacity-90 font-sans">${d.t}</div>
                </div>`;
            });
            stream.scrollTop = stream.scrollHeight;
        });

        // الرفع السحابي المتطور (Cloudinary dk5kas1gc)
        const widget = cloudinary.createUploadWidget({
            cloudName: "dk5kas1gc", uploadPreset: "go_kck",
            clientAllowedFormats: ["mp4", "mov"], maxFiles: 1,
            styles: { palette: { window: "#000103", windowBorder: "#00f3ff", tabIcon: "#00f3ff", textLight: "#fff", link: "#00f3ff", action: "#ff007f" } }
        }, (err, res) => { if(!err && res.event === "success") db.ref('videos').push({url: res.info.secure_url, likes: 0, timestamp: Date.now()}); });
        document.getElementById('nebula-upload').onclick = () => widget.open();

        function initNebulaObserver() {
            const obs = new IntersectionObserver(entries => {
                entries.forEach(entry => {
                    const video = entry.target.querySelector('video');
                    if(entry.isIntersecting) {
                        video.play().catch(()=>{});
                        // تأثير تلوين النيون المتغير عند التمرير
                        document.documentElement.style.setProperty('--neon-blue', ['#00f3ff', '#00ff88', '#ff00ff'][Math.floor(Math.random()*3)]);
                    } else { video.pause(); video.currentTime = 0; video.style.opacity = '0.5'; }
                    
                    video.onplay = () => video.style.opacity = '1';
                });
            }, { threshold: 0.6 });
            document.querySelectorAll('.vid-card').forEach(c => obs.observe(c));
        }
    </script>
</body>
</html>
