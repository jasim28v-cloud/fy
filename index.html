<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VØID_X | CRYSTAL IONIC</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Cairo:wght@300;700&display=swap');
        
        :root { --ion-color: #00f3ff; }
        body, html { margin: 0; padding: 0; height: 100%; background: #000; color: #fff; overflow: hidden; font-family: 'Cairo', sans-serif; }

        /* محرك التصفح السلس */
        .viewport { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .viewport::-webkit-scrollbar { display: none; }
        
        .vid-frame { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; overflow: hidden; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; transition: 0.8s; opacity: 0.7; }
        .vid-frame.active video { opacity: 1; transform: scale(1.02); }

        /* واجهة الكريستال الشفافة */
        .glass-header { position: fixed; top: 0; width: 100%; height: 70px; background: rgba(255,255,255,0.02); backdrop-filter: blur(15px); z-index: 1000; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .logo { font-family: 'Orbitron'; font-weight: 900; font-size: 1.5rem; background: linear-gradient(45deg, var(--ion-color), #ff007f); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 10px var(--ion-color)); }

        /* الأزرار الأيونية الجانبية */
        .side-actions { position: absolute; left: 15px; bottom: 110px; display: flex; flex-direction: column; gap: 22px; z-index: 500; }
        .ion-btn { width: 52px; height: 52px; border-radius: 18px; background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .ion-btn i { font-size: 1.4rem; color: #fff; }
        .ion-btn span { font-size: 9px; margin-top: 4px; font-weight: bold; color: var(--ion-color); }
        .ion-btn:active { transform: scale(0.8) rotate(10deg); border-color: var(--ion-color); box-shadow: 0 0 20px var(--ion-color); }

        /* شريط الملاحة السفلي الأنيق */
        .bottom-nav { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); width: 88%; max-width: 400px; height: 70px; background: rgba(255,255,255,0.03); backdrop-filter: blur(30px); border: 1px solid rgba(255,255,255,0.1); border-radius: 30px; display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
        .nav-link { font-size: 1.5rem; color: rgba(255,255,255,0.2); transition: 0.3s; }
        .active-link { color: var(--ion-color); filter: drop-shadow(0 0 10px var(--ion-color)); }
        
        .plus-orb { width: 55px; height: 55px; background: linear-gradient(45deg, var(--ion-color), #ff007f); border-radius: 20px; display: flex; align-items: center; justify-content: center; transform: translateY(-15px) rotate(45deg); box-shadow: 0 10px 25px rgba(0,243,255,0.3); border: 3px solid #000; }
        .plus-orb i { transform: rotate(-45deg); font-size: 1.5rem; color: #fff; }

        /* القوائم الشفافة الملونة */
        .ionic-panel { position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(50px); z-index: 2000; display: none; flex-direction: column; padding: 40px 20px; animation: slideIn 0.4s ease; }
        @keyframes slideIn { from { transform: translateY(100%); } to { transform: translateY(0); } }
    </style>
</head>
<body>

    <header class="glass-header">
        <div class="logo">VØID_X</div>
        <div id="time" class="text-[10px] font-bold opacity-30 tracking-[3px]">00:00</div>
    </header>

    <main class="viewport" id="feed"></main>

    <nav class="bottom-nav">
        <i class="fas fa-fingerprint nav-link" onclick="openAdmin()"></i>
        <div class="plus-orb" id="upload-trigger"><i class="fas fa-plus"></i></div>
        <i class="fas fa-atom nav-link" onclick="openChat()"></i>
    </nav>

    <div id="chat-panel" class="ionic-panel">
        <div class="flex justify-between items-center mb-8">
            <span class="font-[Orbitron] text-xs tracking-[5px] text-pink-500">IONIC_CHAT</span>
            <i class="fas fa-times text-2xl" onclick="closeAll()"></i>
        </div>
        <div id="chat-flow" class="flex-1 overflow-y-auto space-y-4"></div>
        <div class="mt-6 flex gap-2">
            <input type="text" id="chat-in" class="bg-white/5 flex-1 p-5 rounded-2xl outline-none border border-white/10" placeholder="Type something...">
            <button onclick="send()" class="bg-cyan-500 text-black px-6 rounded-2xl"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <div id="admin-panel" class="ionic-panel">
        <div class="flex justify-between items-center mb-10">
            <span class="font-[Orbitron] text-xs tracking-[5px] text-cyan-400">CORE_MANAGEMENT</span>
            <i class="fas fa-times text-2xl" onclick="closeAll()"></i>
        </div>
        <div id="admin-list" class="space-y-4 overflow-y-auto"></div>
    </div>

    <script>
        // إعداداتك الخاصة
        const ADS = "https://data527.click/21330bf1d025d41336e6/57154ac610/?placementName=default";
        const fbConfig = { databaseURL: "https://fokx-c135a-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(fbConfig);
        const db = firebase.database();
        let isMuted = true;
        const MY_ID = "CRYSTAL-" + Math.floor(Math.random()*888);

        function triggerAd() { window.open(ADS, '_blank'); }
        function openChat() { triggerAd(); document.getElementById('chat-panel').style.display = 'flex'; }
        function closeAll() { document.querySelectorAll('.ionic-panel').forEach(p => p.style.display = 'none'); }
        setInterval(() => { document.getElementById('time').innerText = new Date().toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit'}); }, 1000);

        // جلب المحتوى
        db.ref('videos').on('value', snap => {
            const feed = document.getElementById('feed');
            const alist = document.getElementById('admin-list');
            const data = snap.val();
            feed.innerHTML = ''; alist.innerHTML = '';
            if(!data) return;

            Object.keys(data).reverse().forEach(id => {
                const v = data[id];
                const frame = document.createElement('div');
                frame.className = 'vid-frame';
                frame.innerHTML = `
                    <video loop playsinline muted src="${v.url}" onclick="this.paused?this.play():this.pause()"></video>
                    <div class="side-actions">
                        <div class="ion-btn" onclick="toggleMute()"><i class="fas ${isMuted?'fa-volume-mute':'fa-volume-up'} m-icon"></i><span>AUDIO</span></div>
                        <div class="ion-btn" onclick="like('${id}')"><i class="fas fa-bolt text-yellow-400"></i><span>${v.likes || 0}</span></div>
                        <div class="ion-btn" onclick="openChat()"><i class="fas fa-comment-dots"></i><span>CHAT</span></div>
                        <div class="ion-btn" onclick="share()"><i class="fas fa-share-nodes"></i><span>SHARE</span></div>
                    </div>
                `;
                feed.appendChild(frame);
                alist.innerHTML += `<div class="bg-white/5 p-4 rounded-2xl flex justify-between items-center border border-white/5">
                    <video src="${v.url}" class="w-12 h-12 rounded-lg object-cover"></video>
                    <button onclick="del('${id}')" class="text-red-500"><i class="fas fa-trash-alt"></i></button>
                </div>`;
            });
            initObs();
        });

        function toggleMute() {
            isMuted = !isMuted;
            document.querySelectorAll('video').forEach(v => v.muted = isMuted);
            document.querySelectorAll('.m-icon').forEach(i => i.className = isMuted ? 'fas fa-volume-mute m-icon' : 'fas fa-volume-up m-icon');
        }

        function like(id) { triggerAd(); db.ref(`videos/${id}/likes`).transaction(l => (l || 0) + 1); }
        function share() { triggerAd(); if(navigator.share) navigator.share({url: window.location.href}); }
        function openAdmin() { if(prompt("ENTER KEY:") === "1234") document.getElementById('admin-panel').style.display = 'flex'; }
        function del(id) { if(confirm("DELETE?")) db.ref(`videos/${id}`).remove(); }

        function send() {
            const i = document.getElementById('chat-in');
            if(i.value.trim()) { db.ref('chat').push({u: MY_ID, t: i.value}); i.value = ''; }
        }
        db.ref('chat').limitToLast(15).on('value', s => {
            const box = document.getElementById('chat-flow'); box.innerHTML = '';
            s.forEach(m => {
                const d = m.val();
                box.innerHTML += `<div class="bg-white/5 p-4 rounded-2xl border-r-4 border-cyan-500">
                    <div class="text-[9px] font-bold text-cyan-400 mb-1 font-[Orbitron]">${d.u}</div>
                    <p class="text-sm opacity-90">${d.t}</p>
                </div>`;
            });
            box.scrollTop = box.scrollHeight;
        });

        const widget = cloudinary.createUploadWidget({
            cloudName: "dk5kas1gc", uploadPreset: "go_kck",
            styles: { palette: { window: "#000", windowBorder: "#00f3ff", tabIcon: "#00f3ff", textLight: "#fff", link: "#00f3ff", action: "#ff007f" } }
        }, (err, res) => { if(!err && res.event === "success") db.ref('videos').push({url: res.info.secure_url, likes: 0}); });
        document.getElementById('upload-trigger').onclick = () => widget.open();

        function initObs() {
            const obs = new IntersectionObserver(entries => {
                entries.forEach(e => {
                    const v = e.target.querySelector('video');
                    if(e.isIntersecting) {
                        e.target.classList.add('active');
                        v.play().catch(()=>{});
                        // تغيير لون الأيونات عشوائياً عند التمرير
                        const colors = ['#00f3ff', '#ff007f', '#00ff88', '#ffcc00'];
                        document.documentElement.style.setProperty('--ion-color', colors[Math.floor(Math.random()*colors.length)]);
                    } else {
                        e.target.classList.remove('active');
                        v.pause(); v.currentTime = 0;
                    }
                });
            }, { threshold: 0.6 });
            document.querySelectorAll('.vid-frame').forEach(f => obs.observe(f));
        }
    </script>
</body>
</html>
