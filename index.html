<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VOID-MASTER V18.1 | THE FINAL ASSET</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Share+Tech+Mono&family=Cairo:wght@400;700;900&display=swap');
        
        :root { 
            --v-cyan: #00f2ff; 
            --v-gold: #ffd700;
            --bg: #000;
        }

        body, html { margin: 0; padding: 0; height: 100%; background: #000; color: #fff; overflow: hidden; font-family: 'Cairo', sans-serif; user-select: none; }

        /* محرك الجيل 14 - التمرير الشبحي السلس */
        .scroll-engine { 
            height: 100vh; overflow-y: scroll; 
            scroll-snap-type: y mandatory; scrollbar-width: none; 
            -webkit-overflow-scrolling: touch;
        }
        .scroll-engine::-webkit-scrollbar { display: none; }

        .v-seg { 
            height: 100vh; width: 100vw; scroll-snap-align: start; 
            scroll-snap-stop: always; position: relative; overflow: hidden; 
            background: #000; display: flex; align-items: center; justify-content: center;
        }

        video { 
            width: 100%; height: 100%; object-fit: cover; 
            filter: brightness(0.85) contrast(1.15);
            /* تأثير الثقب الأسود القوي من الجيل 14 */
            mask-image: radial-gradient(circle, black 55%, transparent 95%);
            -webkit-mask-image: radial-gradient(circle, black 55%, transparent 95%);
            transition: transform 0.8s cubic-bezier(0.2, 1, 0.3, 1);
        }

        /* الكتابات الأيونية (HUD) */
        .hud-text {
            position: absolute; font-family: 'Share Tech Mono'; font-size: 8px;
            color: var(--v-cyan); text-shadow: 0 0 10px var(--v-cyan);
            z-index: 30; opacity: 0.7; pointer-events: none;
        }
        .hud-tl { top: 90px; left: 25px; }
        .hud-br { bottom: 135px; right: 25px; text-align: right; animation: pulse-data 2s infinite; }
        @keyframes pulse-data { 0%, 100% { opacity: 0.7; } 50% { opacity: 0.1; } }

        /* الأزرار اليسارية الموسطة */
        .sidebar-left { 
            position: absolute; left: 15px; top: 50%; transform: translateY(-50%); 
            display: flex; flex-direction: column; gap: 18px; z-index: 100; 
        }
        
        .ion-btn { 
            width: 52px; height: 52px; background: rgba(0, 242, 255, 0.04); 
            backdrop-filter: blur(15px); border: 1px solid rgba(0, 242, 255, 0.15); 
            border-radius: 14px; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; cursor: pointer; 
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .ion-btn:active { transform: scale(0.8); border-color: #fff; }
        .ion-btn i { font-size: 19px; color: #fff; filter: drop-shadow(0 0 8px var(--v-cyan)); }
        .ion-btn .fa-medal { color: var(--v-gold); filter: drop-shadow(0 0 12px var(--v-gold)); }
        .ion-btn span { font-size: 9px; font-family: 'Share Tech Mono'; color: var(--v-cyan); margin-top: 3px; font-weight: bold; }

        /* الصحن المركزي المطور */
        nav { 
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); 
            width: 90%; max-width: 410px; height: 70px; 
            background: rgba(0, 5, 12, 0.85); backdrop-filter: blur(35px);
            border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 35px;
            display: flex; justify-content: space-around; align-items: center; z-index: 500;
        }

        .void-core {
            width: 70px; height: 70px; background: linear-gradient(135deg, var(--v-cyan), #0044ff);
            border-radius: 50%; margin-top: -45px; display: flex; align-items: center; justify-content: center;
            border: 5px solid #000; color: white; font-size: 26px; cursor: pointer;
            box-shadow: 0 0 35px var(--v-cyan); transition: 0.4s;
        }
        .void-core:hover { transform: scale(1.1) rotate(180deg); }

        /* لوحة التحكم والدردشة */
        #core-panel {
            position: fixed; inset: 0; z-index: 2000; background: rgba(0, 0, 0, 0.98);
            display: none; flex-direction: column; padding: 40px 25px; border-top: 4px solid var(--v-cyan);
        }
        .chat-view { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 12px; }
        .msg-node { background: rgba(0, 242, 255, 0.08); border-right: 3px solid var(--v-cyan); padding: 12px; border-radius: 4px; font-size: 13px; font-family: 'Share Tech Mono'; color: #fff; }
        .input-bar { display: flex; gap: 10px; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 20px; border: 1px solid rgba(0,242,255,0.2); }
    </style>
</head>
<body>

    <header class="fixed top-8 left-6 right-6 z-[600] flex justify-between items-center pointer-events-none">
        <div class="bg-black/70 p-3 border-l-4 border-cyan-400 pointer-events-auto rounded flex items-center gap-3 backdrop-blur-md">
            <i class="fas fa-ghost text-cyan-400 animate-pulse"></i>
            <span class="font-[Orbitron] text-[10px] font-black tracking-[4px]">VOID_MASTER_V18.1</span>
        </div>
        <div class="font-mono text-[9px] text-cyan-400 bg-black/60 px-4 py-1 rounded-full border border-cyan-900" id="clock">00:00:00</div>
    </header>

    <main class="scroll-engine" id="video-stack"></main>

    <nav>
        <div class="cursor-pointer text-white/20 hover:text-cyan-400 transition" onclick="checkAdmin()"><i class="fas fa-fingerprint text-2xl"></i></div>
        <div class="void-core" onclick="toggleCore()"><i class="fas fa-comment-dots text-white text-2xl"></i></div>
        <div class="cursor-pointer text-white/20 hover:text-blue-500 transition" onclick="window.open(ADS.SHARE, '_blank')"><i class="fas fa-share-nodes text-2xl"></i></div>
    </nav>

    <div id="core-panel">
        <div class="flex justify-between items-center mb-8">
            <h2 class="font-[Orbitron] text-cyan-400 text-xl font-bold tracking-widest">TACTICAL_HUB</h2>
            <div class="flex gap-8">
                <i class="fas fa-cloud-arrow-up text-xl text-white cursor-pointer" onclick="openUpload()"></i>
                <i class="fas fa-times text-xl text-red-500 cursor-pointer" onclick="toggleCore()"></i>
            </div>
        </div>
        <div class="chat-view" id="chat-box"></div>
        <div class="input-bar mt-4">
            <input type="text" id="msg-input" class="flex-1 bg-transparent border-none outline-none text-cyan-400 font-mono text-sm" placeholder="Send tactical data...">
            <button onclick="sendSignal()" class="text-cyan-400"><i class="fas fa-paper-plane text-xl"></i></button>
        </div>
    </div>

    <script>
        const MASTER_KEY = "1234";
        const ADS = {
            LIKE: "https://www.effectivegatecpm.com/kckhwnffm5?key=a044912bc242a8918aac753c22e082b1",
            CHAT: "https://www.effectivegatecpm.com/fd8bgr2e?key=c5bd0ed87d0ddc0c53101f52264d4b1e",
            SHARE: "https://www.effectivegatecpm.com/xbht9gqc?key=13bf2e14db4efc9eb9f9e55fe90705ef",
            EXTRA: "https://www.effectivegatecpm.com/k60w64w4gk?key=564f3d8cc4ac85949f218179b742495e"
        };

        firebase.initializeApp({ databaseURL: "https://goks-e0cba-default-rtdb.firebaseio.com/" });
        const db = firebase.database();

        const widget = cloudinary.createUploadWidget({ 
            cloudName: "dhdg9gu88", uploadPreset: "go_2go", sources: ['local'],
            clientAllowedFormats: ["video"]
        }, (err, res) => {
            if (!err && res.event === "success") {
                db.ref('go_2go_content/').push({ url: res.info.secure_url, likes: 0, timestamp: Date.now() });
            }
        });
        function openUpload() { widget.open(); }

        db.ref('go_2go_content').on('value', (snap) => {
            const container = document.getElementById('video-stack');
            const data = snap.val(); container.innerHTML = '';
            if(!data) return;
            Object.keys(data).reverse().forEach((id) => {
                const vid = data[id];
                const section = document.createElement('section');
                section.className = 'v-seg';
                section.innerHTML = `
                    <div class="hud-text hud-tl">DATA_NODE: SWAT_${id.substring(1,3)}<br>SIGNAL: 100%_SECURE</div>
                    <div class="hud-text hud-br">COORD: ${(Math.random()*100).toFixed(4)}N<br>REC_SYNC: STABLE</div>
                    <video id="vid-${id}" loop playsinline src="${vid.url}" preload="auto"></video>
                    <div class="sidebar-left">
                        <div class="ion-btn" onclick="window.open('${ADS.LIKE}', '_blank'); triggerLike('${id}')"><i class="fas fa-medal"></i><span>${vid.likes || 0}</span></div>
                        <div class="ion-btn" onclick="window.open('${ADS.CHAT}', '_blank'); toggleCore()"><i class="fas fa-helmet-safety"></i><span>SQUAD</span></div>
                        <div class="ion-btn" onclick="window.open('${ADS.EXTRA}', '_blank'); toggleMute(this, '${id}')"><i class="fas fa-walkie-talkie"></i></div>
                        <div class="ion-btn" onclick="window.open('${ADS.SHARE}', '_blank'); navigator.share({url:window.location.href})"><i class="fas fa-satellite"></i></div>
                    </div>
                `;
                container.appendChild(section);
            });
            initVoidObserver();
        });

        function initVoidObserver() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    const video = entry.target.querySelector('video');
                    if (entry.isIntersecting) {
                        video.play().catch(() => {});
                        video.style.transform = "scale(1)";
                    } else {
                        video.pause();
                        video.currentTime = 0;
                        video.style.transform = "scale(1.1)";
                    }
                });
            }, { threshold: 0.8 });
            document.querySelectorAll('.v-seg').forEach(s => observer.observe(s));
        }

        function toggleCore() { const p = document.getElementById('core-panel'); p.style.display = (p.style.display==='flex')?'none':'flex'; }
        function sendSignal() { const i = document.getElementById('msg-input'); if(i.value.trim()){ db.ref('vox_chat').push({msg: i.value, time: Date.now()}); i.value=''; } }
        db.ref('vox_chat').limitToLast(20).on('value', s => {
            const b = document.getElementById('chat-box'); b.innerHTML = '';
            s.forEach(m => { b.innerHTML += `<div class="msg-node">REC_MSG:: ${m.val().msg}</div>`; });
            b.scrollTop = b.scrollHeight;
        });

        function triggerLike(id) { db.ref('go_2go_content/' + id + '/likes').transaction(l => (l || 0) + 1); if(navigator.vibrate) navigator.vibrate(30); }
        function toggleMute(btn, id) { const v = document.getElementById('vid-'+id); v.muted = !v.muted; btn.innerHTML = v.muted ? '<i class="fas fa-volume-mute text-red-500"></i>' : '<i class="fas fa-walkie-talkie"></i>'; }
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-GB'); }, 1000);
        function checkAdmin() { if(prompt("SCAN ID:") === MASTER_KEY) alert("ACCESS_GRANTED"); }
    </script>
</body>
</html>
