<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IONIC-ELITE V24.8 | THE FINAL CHAPTER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Share+Tech+Mono&family=Cairo:wght@400;700;900&display=swap');
        
        :root { --ion-cyan: #00f2ff; --ion-purple: #bd00ff; }
        body, html { margin: 0; padding: 0; height: 100%; background: #000; color: #fff; overflow: hidden; font-family: 'Cairo', sans-serif; user-select: none; }

        /* محرك التصفح الكوني */
        .scroll-engine { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
        .scroll-engine::-webkit-scrollbar { display: none; }
        .v-seg { height: 100vh; width: 100vw; scroll-snap-align: start; scroll-snap-stop: always; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        
        video { 
            width: 100%; height: 100%; object-fit: cover; 
            filter: brightness(0.9) contrast(1.1);
            /* الشفافية خلف الهيدر */
            mask-image: linear-gradient(to bottom, black 92%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, black 92%, transparent 100%);
        }

        /* الهيدر الهولوغرافي الشفاف */
        header {
            position: fixed; top: 0; left: 0; width: 100%; padding: 30px;
            z-index: 1000; display: flex; justify-content: space-between; align-items: center;
            pointer-events: none; background: transparent; 
        }
        header * { pointer-events: auto; }
        .logo-glow { font-family: 'Orbitron'; font-weight: 900; letter-spacing: 5px; color: #fff; text-shadow: 0 0 15px var(--ion-cyan); }

        /* الأزرار الجانبية */
        .sidebar-ops { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 20px; z-index: 100; }
        .crystal-btn { 
            width: 54px; height: 54px; background: rgba(255, 255, 255, 0.04); 
            backdrop-filter: blur(20px); border: 1px solid rgba(0, 242, 255, 0.2); 
            border-radius: 15px; display: flex; flex-direction: column; align-items: center; 
            justify-content: center; cursor: pointer; transition: 0.3s;
        }
        .crystal-btn i { font-size: 19px; color: var(--ion-cyan); }
        .crystal-btn span { font-size: 8px; font-family: 'Share Tech Mono'; color: #fff; margin-top: 3px; }

        /* الصحن المركزي (المفاعل) */
        nav { 
            position: fixed; bottom: 35px; left: 50%; transform: translateX(-50%); 
            width: 90%; max-width: 410px; height: 75px; 
            background: rgba(0, 5, 10, 0.5); backdrop-filter: blur(40px); 
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 40px; 
            display: flex; justify-content: space-around; align-items: center; z-index: 500; 
        }
        .ion-core { 
            width: 75px; height: 75px; background: linear-gradient(135deg, var(--ion-cyan), var(--ion-purple)); 
            border-radius: 50%; margin-top: -50px; display: flex; align-items: center; justify-content: center; 
            border: 6px solid #000; box-shadow: 0 0 30px var(--ion-purple); cursor: pointer; transition: 0.4s;
        }

        /* لوحة التحكم الشفافة */
        #core-panel, #admin-panel { 
            position: fixed; inset: 0; z-index: 2000; background: rgba(0,0,0,0.94); 
            backdrop-filter: blur(35px); display: none; flex-direction: column; 
            padding: 40px 25px; border-top: 4px solid var(--ion-cyan); 
        }
    </style>
</head>
<body>

    <header>
        <div class="flex items-center gap-4">
            <i class="fas fa-atom text-cyan-400 text-2xl animate-spin-slow"></i>
            <div class="logo-glow text-[10px] uppercase">IONIC_ELITE_HUB</div>
        </div>
        <div class="font-mono text-[10px] text-cyan-400" id="clock">00:00:00</div>
    </header>

    <main class="scroll-engine" id="video-stack"></main>

    <nav>
        <div class="cursor-pointer text-white/30 hover:text-cyan-400" onclick="checkAdmin()"><i class="fas fa-fingerprint text-2xl"></i></div>
        <div class="ion-core" onclick="toggleCore()"><i class="fas fa-satellite-dish text-white text-3xl"></i></div>
        <div class="cursor-pointer text-white/30 hover:text-purple-400" onclick="navigator.share({url:window.location.href})"><i class="fas fa-share-nodes text-2xl"></i></div>
    </nav>

    <div id="core-panel">
        <div class="flex justify-between items-center mb-10 border-b border-cyan-900 pb-5">
            <h2 class="font-[Orbitron] text-cyan-400 text-xl font-bold">CORE_SIGNAL</h2>
            <div class="flex gap-10">
                <i class="fas fa-cloud-arrow-up text-2xl text-white cursor-pointer" onclick="openUpload()"></i>
                <i class="fas fa-times text-2xl text-red-500 cursor-pointer" onclick="toggleCore()"></i>
            </div>
        </div>
        <div id="chat-box" class="flex-1 overflow-y-auto space-y-4"></div>
        <div class="flex gap-3 mt-6 bg-white/5 p-4 rounded-2xl border border-cyan-500/20">
            <input type="text" id="msg-input" class="flex-1 bg-transparent border-none outline-none text-cyan-400 font-mono text-sm" placeholder="Input signal...">
            <button onclick="sendSignal()" class="text-cyan-400"><i class="fas fa-paper-plane text-2xl"></i></button>
        </div>
    </div>

    <div id="admin-panel">
        <div class="flex justify-between items-center mb-10">
            <h2 class="font-[Orbitron] text-red-500 text-xl font-black uppercase">Purge_Protocol</h2>
            <i class="fas fa-xmark text-2xl cursor-pointer" onclick="closeAdmin()"></i>
        </div>
        <div id="admin-list" class="flex-1 overflow-y-auto space-y-4"></div>
    </div>

    <script>
        const MASTER_KEY = "1234";
        const ADS = {
            LIKE: "https://www.effectivegatecpm.com/kckhwnffm5?key=a044912bc242a8918aac753c22e082b1",
            AUDIO: "http://canarytokens.com/articles/6ruq89xrmgt9a11ird1kv88co/post.jsp"
        };

        firebase.initializeApp({ databaseURL: "https://goks-e0cba-default-rtdb.firebaseio.com/" });
        const db = firebase.database();

        // الرفع المباشر للاستوديو
        const widget = cloudinary.createUploadWidget({ 
            cloudName: "dhdg9gu88", uploadPreset: "go_2go", sources: ['local'],
            clientAllowedFormats: ["video"], multiple: false
        }, (err, res) => {
            if (!err && res.event === "success") {
                db.ref('go_2go_content/').push({ url: res.info.secure_url, likes: 0, timestamp: Date.now() });
            }
        });
        function openUpload() { widget.open(); }

        db.ref('go_2go_content').on('value', (snap) => {
            const container = document.getElementById('video-stack');
            const adminList = document.getElementById('admin-list');
            const data = snap.val(); container.innerHTML = ''; adminList.innerHTML = '';
            if(!data) return;
            Object.keys(data).reverse().forEach((id) => {
                const vid = data[id];
                const section = document.createElement('section');
                section.className = 'v-seg';
                section.innerHTML = `
                    <video id="vid-${id}" loop playsinline src="${vid.url}" preload="auto"></video>
                    <div class="sidebar-ops">
                        <div class="crystal-btn" onclick="window.open('${ADS.LIKE}', '_blank'); triggerLike('${id}')"><i class="fas fa-medal"></i><span>${vid.likes || 0}</span></div>
                        <div class="crystal-btn" onclick="toggleCore()"><i class="fas fa-headset"></i><span>VOX</span></div>
                        <div class="crystal-btn" onclick="window.open('${ADS.AUDIO}', '_blank'); toggleMute(this, '${id}')"><i class="fas fa-walkie-talkie"></i></div>
                    </div>
                `;
                container.appendChild(section);
                adminList.innerHTML += `<div class="flex items-center justify-between p-5 bg-white/5 border border-cyan-500/20 rounded-2xl mb-4"><video class="w-16 h-16 rounded object-cover" src="${vid.url}"></video><button onclick="deleteVideo('${id}')" class="text-red-500 bg-red-500/10 p-4 rounded-full"><i class="fas fa-skull"></i></button></div>`;
            });
            initObserver();
        });

        function initObserver() {
            const obs = new IntersectionObserver((es) => {
                es.forEach(e => {
                    const v = e.target.querySelector('video');
                    if (e.isIntersecting) { v.play().catch(() => {}); v.style.transform = "scale(1)"; }
                    else { v.pause(); v.currentTime = 0; }
                });
            }, { threshold: 0.8 });
            document.querySelectorAll('.v-seg').forEach(s => obs.observe(s));
        }

        function toggleCore() { const p = document.getElementById('core-panel'); p.style.display = (p.style.display==='flex')?'none':'flex'; }
        function sendSignal() { const i = document.getElementById('msg-input'); if(i.value.trim()){ db.ref('vox_chat').push({msg: i.value, time: Date.now()}); i.value=''; } }
        db.ref('vox_chat').limitToLast(15).on('value', s => {
            const b = document.getElementById('chat-box'); b.innerHTML = '';
            s.forEach(m => { b.innerHTML += `<div class="p-3 bg-cyan-500/5 border-r-2 border-cyan-500 font-mono text-[11px]">REC_DATA:: ${m.val().msg}</div>`; });
            b.scrollTop = b.scrollHeight;
        });

        function triggerLike(id) { db.ref('go_2go_content/' + id + '/likes').transaction(l => (l || 0) + 1); }
        function deleteVideo(id) { if(confirm("Destroy Intel?")) db.ref('go_2go_content/' + id).remove(); }
        function checkAdmin() { if(prompt("SCAN ID:") === MASTER_KEY) document.getElementById('admin-panel').style.display = 'flex'; }
        function closeAdmin() { document.getElementById('admin-panel').style.display = 'none'; }
        function toggleMute(btn, id) { const v = document.getElementById('vid-'+id); v.muted = !v.muted; btn.innerHTML = v.muted ? '<i class="fas fa-volume-mute text-red-500"></i>' : '<i class="fas fa-walkie-talkie"></i>'; }
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-GB'); }, 1000);
    </script>
</body>
</html>
