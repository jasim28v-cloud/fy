<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VØID_X | ELITE EDITION</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;900&family=Cairo:wght@400;700&display=swap');
        
        :root { --neon: #ff007f; --bg: #050002; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); color: #fff; overflow: hidden; font-family: 'Cairo', sans-serif; user-select: none; }

        /* خلفية ناعمة جداً */
        .pink-void-bg { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at 50% 50%, #150008 0%, #000 100%); }
        
        /* محرك التمرير عالي الأداء */
        .scroll-engine { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; scroll-behavior: smooth; -webkit-overflow-scrolling: touch; }
        .scroll-engine::-webkit-scrollbar { display: none; }
        
        .video-segment { height: 100vh; width: 100vw; scroll-snap-align: start; scroll-snap-stop: always; position: relative; overflow: hidden; }
        .crystal-frame { width: 100%; height: 100%; position: relative; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* هيدر زجاجي */
        header { position: fixed; top: 20px; left: 20px; right: 20px; z-index: 500; display: flex; justify-content: space-between; align-items: center; pointer-events: none; }
        .brand-box { padding: 10px 25px; border-radius: 20px; border-left: 5px solid var(--neon); background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); pointer-events: auto; }
        .brand-name { font-family: 'Orbitron', sans-serif; font-weight: 900; letter-spacing: 3px; color: #fff; text-shadow: 0 0 15px var(--neon); }

        /* العلامة المائية الاحترافية */
        .v-watermark { position: absolute; top: 25%; right: 10%; font-family: 'Orbitron'; font-size: 0.75rem; color: rgba(255,255,255,0.1); z-index: 20; letter-spacing: 5px; animation: floatMark 12s infinite linear; pointer-events: none; }
        @keyframes floatMark { 0% { transform: translate(0,0); } 50% { transform: translate(-40px, 60px); } 100% { transform: translate(0,0); } }

        /* الأزرار الجانبية الشفافة */
        .side-actions { position: absolute; left: 20px; bottom: 160px; display: flex; flex-direction: column; gap: 15px; z-index: 100; }
        .action-btn { width: 58px; height: 58px; border-radius: 22px; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.1); transition: 0.4s; cursor: pointer; }
        .action-btn i { font-size: 1.4rem; color: var(--neon); filter: drop-shadow(0 0 10px var(--neon)); }
        .btn-label { font-size: 10px; font-weight: 700; margin-top: 3px; color: #fff; opacity: 0.6; font-family: 'Orbitron'; }

        /* نافيجيشن أيوني */
        nav { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); width: 92%; max-width: 420px; height: 80px; border-radius: 40px; background: rgba(255, 255, 255, 0.04); backdrop-filter: blur(30px); border: 1px solid rgba(255,255,255,0.15); display: flex; justify-content: space-around; align-items: center; z-index: 200; }
        .finger-admin { color: var(--neon); cursor: pointer; filter: drop-shadow(0 0 12px var(--neon)); transition: 0.4s; }

        #upload-trigger { background: var(--neon); box-shadow: 0 0 30px var(--neon); cursor: pointer; width: 65px; height: 65px; border-radius: 25px; display: flex; align-items: center; justify-content: center; transform: translateY(-18px); border: 5px solid var(--bg); transition: 0.3s; }

        /* القوائم الجانبية */
        #admin-panel, #chat-overlay { position: fixed; inset: 0; z-index: 1000; background: rgba(0,0,0,0.97); display: none; flex-direction: column; padding: 40px 25px; backdrop-filter: blur(30px); }
        .video-item { display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 20px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>

    <div class="pink-void-bg"></div>

    <header>
        <div class="brand-box"><span class="brand-name">VØID_X ELITE</span></div>
        <div class="text-[12px] font-[Orbitron] text-white/50 bg-white/5 px-4 py-2 rounded-full border border-white/10" id="clock">00:00:00</div>
    </header>

    <main class="scroll-engine" id="video-stack"></main>

    <nav>
        <div class="finger-admin" onclick="openAdmin()"><i class="fas fa-fingerprint text-4xl"></i></div>
        <div id="upload-trigger"><i class="fas fa-plus text-3xl text-white"></i></div>
        <div onclick="toggleChatWithAd()" style="color: rgba(255,255,255,0.3);"><i class="fas fa-comment-dots text-3xl"></i></div>
    </nav>

    <div id="admin-panel">
        <div class="flex justify-between items-center mb-10">
            <h2 class="font-[Orbitron] text-xl text-pink-500 tracking-widest">ADMIN_CENTRAL</h2>
            <i class="fas fa-xmark text-3xl" onclick="closeAdmin()"></i>
        </div>
        <div id="admin-list" class="flex-1 overflow-y-auto"></div>
    </div>

    <div id="chat-overlay">
        <div class="flex justify-between items-center mb-8">
            <h2 class="font-[Orbitron] text-pink-500 text-2xl">GLOBAL_CHAT</h2>
            <i class="fas fa-chevron-down text-3xl" onclick="toggleChat()"></i>
        </div>
        <div id="chat-box" class="flex-1 overflow-y-auto space-y-4"></div>
        <div class="mt-4 flex gap-3">
            <input type="text" id="msg-input" class="bg-white/5 flex-1 rounded-2xl p-4 outline-none border border-white/10" placeholder="Say something...">
            <button onclick="sendMsg()" class="bg-pink-600 px-6 rounded-2xl"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <script>
        const ADMIN_CODE = "1234";
        const AD_LINKS = ["https://www.effectivegatecpm.com/bxwxuk2f39?key=566216691dc8b76a740840e94f68f44c", "https://www.effectivegatecpm.com/k60w64w4gk?key=564f3d8cc4ac85949f218179b742495e"];
        let currentAd = 0;
        let isMuted = true;
        const USR_ID = "ELITE-" + Math.floor(Math.random()*9999);

        // روابط السحابة والديتابيس الجديدة
        const firebaseConfig = { databaseURL: "https://fokx-c135a-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function triggerAd() { window.open(AD_LINKS[currentAd], '_blank'); currentAd = (currentAd + 1) % AD_LINKS.length; }
        
        function toggleMute() {
            isMuted = !isMuted;
            document.querySelectorAll('video').forEach(v => v.muted = isMuted);
            document.querySelectorAll('.mute-icon').forEach(i => i.className = isMuted ? 'fas fa-volume-xmark' : 'fas fa-volume-high');
        }

        function toggleChatWithAd() { triggerAd(); toggleChat(); }

        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-GB'); }, 1000);

        // جلب البيانات
        db.ref('videos').on('value', (snap) => {
            const container = document.getElementById('video-stack');
            const adminList = document.getElementById('admin-list');
            const data = snap.val();
            container.innerHTML = ''; adminList.innerHTML = '';
            if(!data) return;
            
            Object.keys(data).reverse().forEach((id) => {
                const vid = data[id];
                const section = document.createElement('section');
                section.className = 'video-segment';
                section.innerHTML = `
                    <div class="crystal-frame">
                        <div class="v-watermark">VØID_X ELITE</div>
                        <video loop playsinline muted src="${vid.url}" onclick="this.paused ? this.play() : this.pause()"></video>
                        <div class="side-actions">
                            <div class="action-btn" onclick="toggleMute()">
                                <i class="${isMuted ? 'fas fa-volume-xmark' : 'fas fa-volume-high'} mute-icon"></i>
                                <span class="btn-label">SOUND</span>
                            </div>
                            <div class="action-btn" onclick="likeVideo('${id}')">
                                <i class="fas fa-bolt"></i>
                                <span class="btn-label">${vid.likes || 0}</span>
                            </div>
                            <div class="action-btn" onclick="toggleChatWithAd()">
                                <i class="fas fa-terminal"></i>
                                <span class="btn-label">CHAT</span>
                            </div>
                            <div class="action-btn" onclick="shareVideo()">
                                <i class="fas fa-share-nodes"></i>
                                <span class="btn-label">SEND</span>
                            </div>
                        </div>
                    </div>
                `;
                container.appendChild(section);

                adminList.innerHTML += `
                    <div class="video-item border-l-4 border-pink-600">
                        <video class="w-16 h-16 rounded-lg object-cover" src="${vid.url}"></video>
                        <span class="text-[10px] opacity-40 font-mono">${id.substring(0,10)}</span>
                        <button onclick="deleteVideo('${id}')" class="text-red-500 p-2"><i class="fas fa-trash-can"></i></button>
                    </div>
                `;
            });
            initObserver();
        });

        // الوظائف الأساسية
        function openAdmin() { if(prompt("SECURITY CODE:") === ADMIN_CODE) document.getElementById('admin-panel').style.display = 'flex'; }
        function closeAdmin() { document.getElementById('admin-panel').style.display = 'none'; }
        function deleteVideo(id) { if(confirm("Confirm Delete?")) db.ref(`videos/${id}`).remove(); }
        function likeVideo(id) { triggerAd(); db.ref(`videos/${id}/likes`).transaction(l => (l || 0) + 1); }
        function shareVideo() { triggerAd(); if(navigator.share) navigator.share({url: window.location.href}); }
        function toggleChat() { const c = document.getElementById('chat-overlay'); c.style.display = c.style.display==='flex'?'none':'flex'; }
        
        function sendMsg() {
            const inp = document.getElementById('msg-input');
            if(inp.value.trim()){ db.ref('chat').push({user:USR_ID, text:inp.value}); inp.value=''; }
        }

        db.ref('chat').limitToLast(20).on('value', s => {
            const box = document.getElementById('chat-box'); box.innerHTML = '';
            s.forEach(m => {
                const d = m.val();
                box.innerHTML += `<div class="bg-white/5 p-4 rounded-2xl border-l-2 border-pink-500/30">
                    <span class="text-[10px] text-pink-500 font-bold block mb-1 uppercase">${d.user}</span>
                    <p class="text-sm text-white/80">${d.text}</p>
                </div>`;
            });
            box.scrollTop = box.scrollHeight;
        });

        // سحابة Cloudinary الجديدة
        const myWidget = cloudinary.createUploadWidget({ 
            cloudName: "dk5kas1gc", uploadPreset: "go_kck",
            maxFiles: 1, clientAllowedFormats: ["mp4", "mov", "webm"],
            styles: { palette: { window: "#050002", sourceBg: "#050002", windowBorder: "#ff007f", tabIcon: "#ff007f", menuIcons: "#ff007f", link: "#ff007f", action: "#ff007f", inProgress: "#ff007f", complete: "#20ff88", textLight: "#ffffff" } }
        }, (err, res) => {
            if (!err && res.event === "success") db.ref('videos/').push({ url: res.info.secure_url, likes: 0, timestamp: Date.now() });
        });
        document.getElementById("upload-trigger").onclick = () => myWidget.open();

        function initObserver() {
            const colors = ['#ff007f', '#00f3ff', '#00ffaa', '#ffaa00', '#bd00ff'];
            const obs = new IntersectionObserver((es) => {
                es.forEach(e => {
                    const v = e.target.querySelector('video');
                    if(e.isIntersecting) { 
                        v.muted = isMuted;
                        v.play().catch(()=>{});
                        const randomColor = colors[Math.floor(Math.random() * colors.length)];
                        document.documentElement.style.setProperty('--neon', randomColor);
                    } else { v.pause(); v.currentTime = 0; }
                });
            }, { threshold: 0.6 });
            document.querySelectorAll('.video-segment').forEach(s => obs.observe(s));
        }
    </script>
</body>
</html>
