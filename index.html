<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VØID_X | SUPREME 2026</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Cairo:wght@300;700&display=swap');
        
        :root { --ion-cyan: #00f3ff; --ion-pink: #ff007f; --ion-yellow: #ffcc00; --ion-green: #00ff88; }
        body, html { margin: 0; padding: 0; height: 100%; background: #000; color: #fff; overflow: hidden; font-family: 'Cairo', sans-serif; }

        /* حاوية التمرير */
        .viewport { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .viewport::-webkit-scrollbar { display: none; }
        
        .vid-frame { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }

        /* العلامة المائية في المنتصف */
        .watermark { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-30deg);
            font-family: 'Orbitron'; font-size: 2.8rem; font-weight: 900; 
            color: rgba(255, 255, 255, 0.07); pointer-events: none; z-index: 10; white-space: nowrap;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }

        /* الهيدر الصافي تماماً */
        .top-bar { 
            position: fixed; top: 15px; width: 100%; z-index: 1000; 
            display: flex; align-items: center; padding: 0 20px; gap: 12px;
            pointer-events: none;
        }
        .logo-text { 
            pointer-events: auto; font-family: 'Orbitron'; font-weight: 900; font-size: 1.5rem; 
            color: #fff; text-shadow: 0 0 15px var(--ion-cyan); 
        }
        .digital-clock { 
            font-family: 'Orbitron'; font-size: 1.1rem; color: var(--ion-cyan); 
            background: rgba(0,0,0,0.3); padding: 2px 10px; border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,243,255,0.2);
        }

        /* الأزرار الأيونية الملونة المرتفعة */
        .side-dock { 
            position: absolute; left: 15px; bottom: 140px; /* مرتفعة كما طلبت */
            display: flex; flex-direction: column; gap: 24px; z-index: 500; 
        }
        .ion-circle { 
            width: 54px; height: 54px; border-radius: 50%; 
            background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            border: 2px solid rgba(255,255,255,0.1); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }
        .ion-circle i { font-size: 1.4rem; }
        .ion-circle span { font-size: 9px; font-weight: bold; margin-top: 3px; color: #fff; }

        /* تلوين الأزرار */
        .btn-audio { color: var(--ion-yellow); border-color: var(--ion-yellow); box-shadow: 0 0 15px var(--ion-yellow); }
        .btn-like { color: var(--ion-pink); border-color: var(--ion-pink); box-shadow: 0 0 15px var(--ion-pink); }
        .btn-share { color: var(--ion-cyan); border-color: var(--ion-cyan); box-shadow: 0 0 15px var(--ion-cyan); }

        .ion-circle:active { transform: scale(0.8) rotate(15deg); }

        /* شريط التنقل السفلي */
        nav { 
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); 
            width: 90%; max-width: 420px; height: 70px; 
            background: rgba(255,255,255,0.05); backdrop-filter: blur(25px); 
            border: 1px solid rgba(255,255,255,0.1); border-radius: 25px; 
            display: flex; justify-content: space-around; align-items: center; z-index: 1000; 
        }
        .nav-icon { font-size: 1.6rem; color: rgba(255,255,255,0.3); transition: 0.3s; }
        
        /* زر الرفع المباشر المذهل */
        .upload-master { 
            width: 60px; height: 60px; background: #fff; color: #000;
            border-radius: 20px; display: flex; align-items: center; justify-content: center; 
            transform: translateY(-15px); box-shadow: 0 10px 30px rgba(255,255,255,0.4); 
            cursor: pointer; border: 4px solid #000;
        }

        .full-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.98); backdrop-filter: blur(40px); z-index: 2000; display: none; flex-direction: column; padding: 40px 20px; }
    </style>
</head>
<body>

    <header class="top-bar">
        <div class="logo-text">VØID_X</div>
        <div id="digital-clock" class="digital-clock">00:00:00</div>
    </header>

    <main class="viewport" id="video-feed"></main>

    <nav>
        <i class="fas fa-fingerprint nav-icon" onclick="openAdmin()"></i>
        <div class="upload-master" id="btn-upload-direct"><i class="fas fa-plus text-2xl"></i></div>
        <i class="fas fa-atom nav-icon" onclick="openPanel('chat-box')"></i>
    </nav>

    <div id="chat-box" class="full-overlay">
        <div class="flex justify-between items-center mb-10">
            <span class="font-[Orbitron] text-pink-500 tracking-widest">IONIC_CHAT</span>
            <i class="fas fa-times text-3xl" onclick="closePanels()"></i>
        </div>
        <div id="chat-content" class="flex-1 overflow-y-auto space-y-4"></div>
        <div class="mt-5 flex gap-3">
            <input type="text" id="chat-input" class="bg-white/10 flex-1 p-5 rounded-2xl outline-none" placeholder="Transmit thought...">
            <button onclick="sendChat()" class="bg-cyan-500 text-black px-8 rounded-2xl font-black"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <div id="admin-panel" class="full-overlay">
        <div class="flex justify-between items-center mb-10">
            <span class="font-[Orbitron] text-cyan-400">CORE_SYNC</span>
            <i class="fas fa-times text-3xl" onclick="closePanels()"></i>
        </div>
        <div id="admin-list" class="space-y-4 overflow-y-auto"></div>
    </div>

    <script>
        const MY_AD = "https://data527.click/21330bf1d025d41336e6/57154ac610/?placementName=default";
        const fbConfig = { databaseURL: "https://fokx-c135a-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(fbConfig);
        const db = firebase.database();
        let isMuted = true;

        // تحديث الساعة الرقمية بجانب اللوجو
        setInterval(() => {
            document.getElementById('digital-clock').innerText = new Date().toLocaleTimeString('en-GB');
        }, 1000);

        function openPanel(id) { window.open(MY_AD, '_blank'); document.getElementById(id).style.display = 'flex'; }
        function closePanels() { document.querySelectorAll('.full-overlay').forEach(p => p.style.display = 'none'); }

        // جلب الفيديوهات مع العلامة المائية والأزرار الملونة
        db.ref('videos').on('value', snap => {
            const feed = document.getElementById('video-feed');
            const alist = document.getElementById('admin-list');
            const data = snap.val();
            feed.innerHTML = ''; alist.innerHTML = '';
            if(!data) return;

            Object.keys(data).reverse().forEach(id => {
                const v = data[id];
                const seg = document.createElement('div');
                seg.className = 'vid-frame';
                seg.innerHTML = `
                    <div class="watermark">VØID_X</div>
                    <video loop playsinline muted src="${v.url}" onclick="this.paused?this.play():this.pause()"></video>
                    <div class="side-dock">
                        <div class="ion-circle btn-audio" onclick="toggleAudio(this)"><i class="fas fa-volume-mute"></i></div>
                        <div class="ion-circle btn-like" onclick="addLike('${id}')"><i class="fas fa-heart"></i><span>${v.likes || 0}</span></div>
                        <div class="ion-circle btn-share" onclick="window.open('${MY_AD}')"><i class="fas fa-share-nodes"></i><span>SHARE</span></div>
                    </div>
                `;
                feed.appendChild(seg);
                alist.innerHTML += `<div class="bg-white/5 p-4 rounded-2xl flex justify-between items-center border border-white/5">
                    <video src="${v.url}" class="w-14 h-14 object-cover rounded-xl"></video>
                    <button onclick="removeVid('${id}')" class="text-red-500 text-xl"><i class="fas fa-trash-alt"></i></button>
                </div>`;
            });
            initObserver();
        });

        function toggleAudio(btn) {
            window.open(MY_AD, '_blank');
            isMuted = !isMuted;
            document.querySelectorAll('video').forEach(v => v.muted = isMuted);
            btn.innerHTML = isMuted ? '<i class="fas fa-volume-mute"></i>' : '<i class="fas fa-volume-up"></i>';
        }

        function addLike(id) { window.open(MY_AD, '_blank'); db.ref(`videos/${id}/likes`).transaction(l => (l || 0) + 1); }
        function openAdmin() { if(prompt("ENTER MASTER KEY:") === "1234") document.getElementById('admin-panel').style.display = 'flex'; }
        function removeVid(id) { if(confirm("DELETE FOREVER?")) db.ref(`videos/${id}`).remove(); }

        // نظام الدردشة المباشر
        function sendChat() {
            const inp = document.getElementById('chat-input');
            if(inp.value.trim()) { db.ref('chat').push({ msg: inp.value }); inp.value = ''; }
        }
        db.ref('chat').limitToLast(12).on('value', s => {
            const flow = document.getElementById('chat-content'); flow.innerHTML = '';
            s.forEach(m => {
                flow.innerHTML += `<div class="bg-white/5 p-4 rounded-2xl border-r-4 border-pink-500 animate-pulse">${m.val().msg}</div>`;
            });
            flow.scrollTop = flow.scrollHeight;
        });

        // زر الرفع المباشر (Cloudinary)
        const uploader = cloudinary.createUploadWidget({ cloudName: "dk5kas1gc", uploadPreset: "go_kck" }, 
        (err, res) => { if(!err && res.event === "success") db.ref('videos').push({url: res.info.secure_url, likes: 0}); });
        
        document.getElementById('btn-upload-direct').onclick = () => { 
            window.open(MY_AD, '_blank'); // ربح عند الرفع
            uploader.open(); 
        };

        function initObserver() {
            const observer = new IntersectionObserver(entries => {
                entries.forEach(e => {
                    const v = e.target.querySelector('video');
                    if(e.isIntersecting) v.play().catch(()=>{});
                    else { v.pause(); v.currentTime = 0; }
                });
            }, { threshold: 0.6 });
            document.querySelectorAll('.vid-frame').forEach(f => observer.observe(f));
        }
    </script>
</body>
</html>
