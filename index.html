<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VOID-OPERATOR V18 | THE FINAL ASSET</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Share+Tech+Mono&family=Cairo:wght@400;700;900&display=swap');
        
        :root { 
            --void-cyan: #00f2ff; 
            --void-glow: rgba(0, 242, 255, 0.5);
            --bg-deep: #000;
        }

        body, html { margin: 0; padding: 0; height: 100%; background: #000; color: #fff; overflow: hidden; font-family: 'Cairo', sans-serif; user-select: none; }

        /* محرك التصفح (Void-Engine) - انسيابية من عالم آخر */
        .void-engine { 
            height: 100vh; overflow-y: scroll; 
            scroll-snap-type: y mandatory; /* جذب مغناطيسي للتمرير */
            scrollbar-width: none; -webkit-overflow-scrolling: touch;
        }
        .void-engine::-webkit-scrollbar { display: none; }

        .v-seg { 
            height: 100vh; width: 100vw; scroll-snap-align: start; 
            scroll-snap-stop: always; /* توقف إجباري لكل فيديو */
            position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center;
        }

        /* تأثير الثقب الأسود (Black Hole Effect) - تلاشي الأطراف العميق */
        video { 
            width: 100%; height: 100%; object-fit: cover; 
            filter: brightness(0.6) contrast(1.3);
            -webkit-mask-image: radial-gradient(circle, black 30%, transparent 100%);
            mask-image: radial-gradient(circle, black 30%, transparent 100%);
            transition: transform 0.8s cubic-bezier(0.15, 0.85, 0.35, 1);
        }

        /* كتابات تقنية حديثة فوق الفيديو */
        .video-overlay { position: absolute; inset: 0; z-index: 25; pointer-events: none; }
        .scan-line {
            position: absolute; width: 100%; height: 2px; 
            background: linear-gradient(to right, transparent, var(--void-cyan), transparent);
            top: 0; animation: scan 4s linear infinite; opacity: 0.2;
        }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }

        .tech-data { position: absolute; font-family: 'Share Tech Mono'; font-size: 8px; color: var(--void-cyan); text-shadow: 0 0 5px var(--void-cyan); opacity: 0.7; }
        .data-tr { top: 110px; right: 25px; text-align: right; line-height: 1.5; }
        .data-bl { bottom: 160px; left: 25px; border-left: 2px solid var(--void-cyan); padding-left: 10px; }

        /* الأزرار الجانبية */
        .sidebar-ops { 
            position: absolute; left: 15px; top: 50%; transform: translateY(-50%); 
            display: flex; flex-direction: column; gap: 20px; z-index: 100; 
        }
        .op-btn { 
            width: 50px; height: 50px; background: rgba(0, 242, 255, 0.05); 
            backdrop-filter: blur(15px); border: 1.5px solid rgba(0, 242, 255, 0.2); 
            border-radius: 12px; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; cursor: pointer; transition: 0.3s;
        }
        .op-btn:active { transform: scale(0.85); border-color: #fff; }
        .op-btn i { font-size: 18px; color: #fff; filter: drop-shadow(0 0 5px var(--void-cyan)); }
        .op-btn span { font-size: 8px; color: var(--void-cyan); font-family: 'Share Tech Mono'; margin-top: 4px; }

        /* مركز التحكم (Control Hub) */
        .control-hub {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            z-index: 500; display: flex; align-items: center; gap: 30px;
            background: rgba(0,5,15,0.85); padding: 12px 35px; border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(25px);
        }
        .main-dial {
            width: 65px; height: 65px; background: linear-gradient(135deg, var(--void-cyan), #0044ff);
            border-radius: 50%; border: 4px solid #000; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 25px var(--void-cyan); transition: 0.4s;
        }
        .main-dial:active { transform: scale(0.8) rotate(45deg); }

        /* نافذة الدردشة */
        #chat-panel {
            position: fixed; inset: 0; z-index: 2000; background: rgba(0, 0, 0, 0.97);
            display: none; flex-direction: column; padding: 40px 25px; border-top: 4px solid var(--void-cyan);
        }
        .chat-area { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .msg-node { background: rgba(0, 242, 255, 0.06); border-right: 3px solid var(--void-cyan); padding: 12px; font-size: 12px; font-family: 'Share Tech Mono'; color: #fff; }
    </style>
</head>
<body>

    <header class="fixed top-8 left-8 right-8 z-[600] flex justify-between items-center pointer-events-none">
        <div class="bg-black/40 p-3 border-l-4 border-cyan-400 pointer-events-auto rounded backdrop-blur-xl flex items-center gap-3">
            <i class="fas fa-atom text-cyan-400 animate-spin"></i>
            <span class="font-[Orbitron] text-[10px] tracking-[4px]">VOID_SYSTEM_V18</span>
        </div>
        <div id="clock" class="font-mono text-cyan-400 text-[11px] bg-black/50 px-4 py-1 rounded-full border border-cyan-900">00:00:00</div>
    </header>

    <main class="void-engine" id="video-stack"></main>

    <div class="control-hub">
        <div class="cursor-pointer text-white/30" onclick="toggleChat()"><i class="fas fa-terminal text-xl"></i></div>
        <div class="main-dial" onclick="openUpload()">
            <i class="fas fa-plus text-white text-2xl"></i>
        </div>
        <div class="cursor-pointer text-white/30" onclick="window.open('https://www.effectivegatecpm.com/xbht9gqc?key=13bf2e14db4efc9eb9f9e55fe90705ef', '_blank')"><i class="fas fa-satellite-dish text-xl"></i></div>
    </div>

    <div id="chat-panel">
        <div class="flex justify-between items-center mb-8 border-b border-cyan-900/50 pb-4">
            <h2 class="font-[Orbitron] text-cyan-400 text-lg tracking-[5px]">COMMS_FEED</h2>
            <i class="fas fa-times text-xl text-red-500 cursor-pointer" onclick="toggleChat()"></i>
        </div>
        <div class="chat-area" id="chat-box"></div>
        <div class="mt-6 flex gap-3 bg-white/5 p-4 rounded-2xl border border-cyan-500/20">
            <input type="text" id="msg-input" class="flex-1 bg-transparent outline-none text-cyan-400 font-mono text-sm" placeholder="TYPE SIGNAL...">
            <button onclick="sendSignal()" class="text-cyan-400"><i class="fas fa-paper-plane text-xl"></i></button>
        </div>
    </div>

    <script>
        const ADS = {
            LIKE: "https://www.effectivegatecpm.com/kckhwnffm5?key=a044912bc242a8918aac753c22e082b1",
            CHAT: "https://www.effectivegatecpm.com/fd8bgr2e?key=c5bd0ed87d0ddc0c53101f52264d4b1e",
            AUDIO: "https://www.effectivegatecpm.com/k60w64w4gk?key=564f3d8cc4ac85949f218179b742495e"
        };

        firebase.initializeApp({ databaseURL: "https://goks-e0cba-default-rtdb.firebaseio.com/" });
        const db = firebase.database();

        // نظام الرفع المباشر (استوديو + كاميرا)
        const widget = cloudinary.createUploadWidget({ 
            cloudName: "dhdg9gu88", uploadPreset: "go_2go",
            sources: ['local', 'camera'], clientAllowedFormats: ["video"]
        }, (err, res) => {
            if (!err && res.event === "success") {
                db.ref('go_2go_content/').push({ url: res.info.secure_url, likes: 0, timestamp: Date.now() });
            }
        });
        function openUpload() { widget.open(); }

        function toggleChat() {
            const p = document.getElementById('chat-panel');
            const isOff = p.style.display === 'none' || p.style.display === '';
            p.style.display = isOff ? 'flex' : 'none';
            if(isOff) window.open(ADS.CHAT, '_blank');
        }

        function sendSignal() {
            const i = document.getElementById('msg-input');
            if(i.value.trim()){ db.ref('vox_chat').push({ msg: i.value, time: Date.now() }); i.value = ''; }
        }

        db.ref('vox_chat').limitToLast(20).on('value', s => {
            const b = document.getElementById('chat-box'); b.innerHTML = '';
            s.forEach(m => { b.innerHTML += `<div class="msg-node">DATA_LINK:: ${m.val().msg}</div>`; });
            b.scrollTop = b.scrollHeight;
        });

        db.ref('go_2go_content').on('value', (snap) => {
            const container = document.getElementById('video-stack');
            const data = snap.val(); container.innerHTML = '';
            if(!data) return;
            Object.keys(data).reverse().forEach((id) => {
                const vid = data[id];
                const section = document.createElement('section');
                section.className = 'v-seg';
                section.innerHTML = `
                    <div class="video-overlay">
                        <div class="scan-line"></div>
                        <div class="tech-data data-tr">UNIT_ID: VOID_${id.substring(1,5)}<br>SIG_STRENGTH: 98%<br>ENCRYPT: ON</div>
                        <div class="tech-data data-bl">COORDS: ${(Math.random()*90).toFixed(4)}N<br>BITRATE: 45.2 Mbps</div>
                    </div>
                    <video id="vid-${id}" loop playsinline src="${vid.url}"></video>
                    <div class="sidebar-ops">
                        <div class="op-btn" onclick="window.open(ADS.LIKE, '_blank'); triggerLike('${id}')">
                            <i class="fas fa-bolt text-cyan-400"></i>
                            <span>${vid.likes || 0}</span>
                        </div>
                        <div class="op-btn" onclick="toggleChat()">
                            <i class="fas fa-comment-dots"></i>
                            <span>CHAT</span>
                        </div>
                        <div class="op-btn" onclick="window.open(ADS.AUDIO, '_blank'); toggleMute(this, '${id}')">
                            <i class="fas fa-walkie-talkie"></i>
                        </div>
                    </div>
                `;
                container.appendChild(section);
            });
            initObserver();
        });

        function triggerLike(id) { db.ref('go_2go_content/' + id + '/likes').transaction(l => (l || 0) + 1); }
        function toggleMute(btn, id) { 
            const v = document.getElementById('vid-'+id); v.muted = !v.muted;
            btn.innerHTML = v.muted ? '<i class="fas fa-volume-mute text-red-500"></i>' : '<i class="fas fa-walkie-talkie"></i>';
        }

        function initObserver() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    const video = entry.target.querySelector('video');
                    if (entry.isIntersecting) {
                        video.play().catch(() => {});
                        video.style.transform = "scale(1)";
                    } else {
                        video.pause();
                        video.currentTime = 0;
                        video.style.transform = "scale(1.15)"; /* تكبير خفيف عند الخروج لتعزيز تأثير الثقب */
                    }
                });
            }, { threshold: 0.8 });
            document.querySelectorAll('.v-seg').forEach(s => observer.observe(s));
        }

        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-GB'); }, 1000);
    </script>
</body>
</html>
