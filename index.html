<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CENTRAL COMMAND V17 | FINAL ASSET</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Share+Tech+Mono&family=Cairo:wght@400;700;900&display=swap');
        
        :root { 
            --q-blue: #00f2ff; 
            --q-gold: #ffd700;
            --q-red: #ff003c;
            --bg: #000;
        }

        body, html { margin: 0; padding: 0; height: 100%; background: #000; color: #fff; overflow: hidden; font-family: 'Cairo', sans-serif; }

        /* محرك التمرير النهائي - انسيابية مطلقة */
        .scroll-engine { 
            height: 100vh; overflow-y: scroll; 
            scroll-snap-type: y mandatory; scrollbar-width: none; 
            -webkit-overflow-scrolling: touch;
        }
        .scroll-engine::-webkit-scrollbar { display: none; }

        .v-seg { 
            height: 100vh; width: 100vw; scroll-snap-align: start; 
            scroll-snap-stop: always; position: relative; overflow: hidden; 
            background: #000;
        }

        video { 
            width: 100%; height: 100%; object-fit: cover; 
            filter: brightness(0.9) contrast(1.1);
            transition: transform 0.8s ease;
        }

        /* الطبقات الأيونية الختامية */
        .hud-overlay {
            position: absolute; inset: 0; pointer-events: none; z-index: 20;
            background: radial-gradient(circle, transparent 30%, rgba(0,0,0,0.5) 100%);
            border: 1px solid rgba(0, 242, 255, 0.05);
        }

        .data-stream {
            position: absolute; font-family: 'Share Tech Mono'; font-size: 8px;
            color: var(--q-blue); text-shadow: 0 0 10px var(--q-blue);
            z-index: 30; opacity: 0.6;
        }
        .stream-tl { top: 90px; left: 20px; }
        .stream-br { bottom: 130px; right: 20px; text-align: right; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.6; } 50% { opacity: 0.1; } }

        /* أزرار العمليات - اليسار الموسط */
        .sidebar-tactical { 
            position: absolute; left: 15px; top: 50%; transform: translateY(-50%); 
            display: flex; flex-direction: column; gap: 20px; z-index: 100; 
        }
        
        .btn-asset { 
            width: 55px; height: 55px; background: rgba(0, 242, 255, 0.05); 
            backdrop-filter: blur(20px); border: 1.5px solid rgba(0, 242, 255, 0.2); 
            border-radius: 14px; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; cursor: pointer; 
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .btn-asset:active { transform: scale(0.8); border-color: #fff; box-shadow: 0 0 20px var(--q-blue); }
        .btn-asset i { font-size: 20px; color: #fff; filter: drop-shadow(0 0 8px var(--q-blue)); }
        .btn-asset .fa-medal { color: var(--q-gold); filter: drop-shadow(0 0 10px var(--q-gold)); }
        .btn-asset span { font-size: 9px; font-family: 'Share Tech Mono'; color: var(--q-blue); margin-top: 3px; font-weight: 900; }

        /* ناف بار "نواة القيادة المركزية" */
        nav { 
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); 
            width: 88%; max-width: 410px; height: 70px; 
            background: rgba(0, 5, 10, 0.85); backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 35px;
            display: flex; justify-content: space-around; align-items: center; z-index: 500;
        }

        .master-core {
            width: 70px; height: 70px; background: linear-gradient(135deg, var(--q-blue), #0044ff);
            border-radius: 50%; margin-top: -45px; display: flex; align-items: center; justify-content: center;
            border: 5px solid #000; color: white; font-size: 26px; cursor: pointer;
            box-shadow: 0 0 30px var(--q-blue); transition: 0.4s;
        }
        .master-core:hover { transform: scale(1.1); box-shadow: 0 0 50px var(--q-blue); }

        /* لوحات التحكم */
        #admin-panel {
            position: fixed; inset: 0; z-index: 2000; background: rgba(0, 0, 0, 0.98);
            display: none; flex-direction: column; padding: 40px 25px;
            border-top: 5px solid var(--q-blue);
        }
        .stencil-title { font-family: 'Black Ops One', cursive; letter-spacing: 4px; color: var(--q-blue); }
    </style>
</head>
<body>

    <header class="fixed top-6 left-6 right-6 z-[600] flex justify-between items-center pointer-events-none">
        <div class="bg-black/60 p-3 border-l-4 border-cyan-400 pointer-events-auto rounded backdrop-blur-xl flex items-center gap-3">
            <i class="fas fa-microchip text-cyan-400 animate-pulse"></i>
            <span class="font-[Orbitron] text-[10px] font-black tracking-[4px] text-white">COMMAND_V17</span>
        </div>
        <div class="font-mono text-[9px] text-cyan-400 bg-black/70 px-4 py-1 rounded-full border border-cyan-900" id="clock">00:00:00</div>
    </header>

    <main class="scroll-engine" id="video-stack"></main>

    <nav>
        <div class="cursor-pointer text-white/20 hover:text-cyan-400 transition" onclick="checkAdmin()"><i class="fas fa-fingerprint text-2xl"></i></div>
        <div class="master-core" id="final-upload-trigger"><i class="fas fa-bolt"></i></div>
        <div class="cursor-pointer text-white/20 hover:text-blue-500 transition" onclick="toggleChat()"><i class="fas fa-satellite-dish text-2xl"></i></div>
    </nav>

    <div id="admin-panel">
        <div class="flex justify-between items-center mb-10 border-b border-cyan-900 pb-4">
            <h2 class="stencil-title text-xl text-white">SYSTEM_PURGE</h2>
            <i class="fas fa-xmark text-2xl cursor-pointer" onclick="closeAdmin()"></i>
        </div>
        <div id="admin-list" class="flex-1 overflow-y-auto space-y-4"></div>
    </div>

    <script>
        const MASTER_KEY = "1234";
        const ADS = {
            LIKE: "https://www.effectivegatecpm.com/kckhwnffm5?key=a044912bc242a8918aac753c22e082b1",
            CHAT: "https://www.effectivegatecpm.com/fd8bgr2e?key=c5bd0ed87d0ddc0c53101f52264d4b1e",
            SHARE: "https://www.effectivegatecpm.com/xbht9gqc?key=13bf2e14db4efc9eb9f9e55fe90705ef",
            EXTRA: "https://www.effectivegatecpm.com/k60w64w4gk?key=564f3d8cc4ac85949f218179b742495e"
        };

        firebase.initializeApp({ databaseURL: "https://goks-e0cba-default-rtdb.firebaseio.com/" });
        const db = firebase.database();

        // محرك الرفع الختامي
        const widget = cloudinary.createUploadWidget({ 
            cloudName: "dhdg9gu88", uploadPreset: "go_2go", sources: ['local'],
            clientAllowedFormats: ["video"],
            styles: { palette: { window: "#000", windowBorder: "#00f2ff", tabIcon: "#00f2ff", action: "#fff", textLight: "#fff" } }
        }, (err, res) => {
            if (!err && res.event === "success") {
                db.ref('go_2go_content/').push({ url: res.info.secure_url, likes: 0, timestamp: Date.now() });
            }
        });
        document.getElementById("final-upload-trigger").onclick = () => widget.open();

        setInterval(() => { document.getElementById('clock').innerText = "OP_TIME: " + new Date().toLocaleTimeString('en-GB'); }, 1000);

        db.ref('go_2go_content').on('value', (snap) => {
            const container = document.getElementById('video-stack');
            const adminList = document.getElementById('admin-list');
            const data = snap.val();
            container.innerHTML = ''; adminList.innerHTML = '';
            if(!data) return;

            Object.keys(data).reverse().forEach((id) => {
                const vid = data[id];
                const section = document.createElement('section');
                section.className = 'v-seg';
                section.innerHTML = `
                    <div class="hud-overlay"></div>
                    <div class="data-stream stream-tl">
                        SYNCING_NODE... [OK]<br>
                        ENC_STRENGTH: MAXIMUM<br>
                        UNIT: SWAT_V17
                    </div>
                    <div class="data-stream stream-br">
                        COORD: ${ (Math.random()*100).toFixed(4) }N<br>
                        STATUS: SECURE_LINK
                    </div>
                    <video id="vid-${id}" loop playsinline src="${vid.url}" preload="auto"></video>
                    
                    <div class="sidebar-tactical">
                        <div class="btn-asset" onclick="window.open('${ADS.LIKE}', '_blank'); triggerLike('${id}')">
                            <i class="fas fa-medal"></i>
                            <span>${vid.likes || 0}</span>
                        </div>
                        <div class="btn-asset" onclick="window.open('${ADS.CHAT}', '_blank'); toggleChat()">
                            <i class="fas fa-helmet-safety"></i>
                            <span>SQUAD</span>
                        </div>
                        <div class="btn-asset" onclick="window.open('${ADS.EXTRA}', '_blank'); toggleMute(this, '${id}')">
                            <i class="fas fa-walkie-talkie"></i>
                        </div>
                        <div class="btn-asset" onclick="window.open('${ADS.SHARE}', '_blank'); navigator.share({url:window.location.href})">
                            <i class="fas fa-satellite"></i>
                        </div>
                    </div>

                    <div class="absolute bottom-32 left-10 border-l-2 border-cyan-400 pl-4">
                        <p class="font-mono text-[9px] text-cyan-400 opacity-70 tracking-tighter">DATA_NODE_STREAM</p>
                        <h3 class="font-[Orbitron] text-white text-lg tracking-[5px] font-black">COMMAND_0${id.substring(1,2)}</h3>
                    </div>
                `;
                container.appendChild(section);

                adminList.innerHTML += `<div class="flex items-center justify-between bg-white/5 p-4 rounded-xl border border-white/10">
                    <video class="w-14 h-14 rounded-lg object-cover" src="${vid.url}"></video>
                    <button onclick="deleteVideo('${id}')" class="text-red-500 bg-red-500/10 p-3 rounded-full"><i class="fas fa-trash"></i></button>
                </div>`;
            });
            initFinalObserver();
        });

        function initFinalObserver() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    const video = entry.target.querySelector('video');
                    if (entry.isIntersecting) {
                        video.play().catch(() => {});
                        video.style.transform = "scale(1)";
                    } else {
                        video.pause();
                        video.currentTime = 0;
                        video.style.transform = "scale(1.05)";
                    }
                });
            }, { threshold: 0.8 });
            document.querySelectorAll('.v-seg').forEach(s => observer.observe(s));
        }

        function checkAdmin() { if(prompt("SCAN BIOMETRIC:") === MASTER_KEY) document.getElementById('admin-panel').style.display = 'flex'; }
        function closeAdmin() { document.getElementById('admin-panel').style.display = 'none'; }
        function deleteVideo(id) { if(confirm("Permanently erase data?")) db.ref('go_2go_content/' + id).remove(); }
        function triggerLike(id) { db.ref('go_2go_content/' + id + '/likes').transaction(l => (l || 0) + 1); if(navigator.vibrate) navigator.vibrate(30); }
        function toggleMute(btn, id) { const v = document.getElementById('vid-'+id); v.muted = !v.muted; btn.innerHTML = v.muted ? '<i class="fas fa-volume-mute text-red-500"></i>' : '<i class="fas fa-walkie-talkie"></i>'; }
        function toggleChat() { alert("CONNECTED"); }
    </script>
</body>
</html>
