<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VØID_X | HYPER ELITE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;900&family=Cairo:wght@400;700&display=swap');
        
        :root { --neon: #ff007f; --bg: #020001; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); color: #fff; overflow: hidden; font-family: 'Cairo', sans-serif; user-select: none; scroll-behavior: smooth; }

        /* شاشة التحميل الهايبر */
        #loader {
            position: fixed; inset: 0; z-index: 9999; background: #000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .v-logo { font-family: 'Orbitron'; font-size: 3rem; font-weight: 900; background: linear-gradient(to bottom, #fff, var(--neon)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 15px var(--neon)); animation: scan 2s infinite alternate; }
        @keyframes scan { from { filter: hue-rotate(0deg) drop-shadow(0 0 15px var(--neon)); } to { filter: hue-rotate(90deg) drop-shadow(0 0 30px #00f3ff); } }

        /* محرك التمرير الفائق */
        .viewport { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
        .viewport::-webkit-scrollbar { display: none; }
        
        .card { height: 100vh; width: 100vw; scroll-snap-align: start; scroll-snap-stop: always; position: relative; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; transition: opacity 0.5s; }

        /* الهيدر الزجاجي المطور */
        header { position: fixed; top: 15px; width: 100%; padding: 0 20px; z-index: 1000; display: flex; justify-content: space-between; align-items: center; pointer-events: none; }
        .glass-tag { background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); padding: 8px 18px; border-radius: 100px; pointer-events: auto; box-shadow: 0 4px 30px rgba(0,0,0,0.1); }
        .sys-status { font-family: 'Orbitron'; font-size: 10px; color: var(--neon); letter-spacing: 2px; }

        /* الأزرار الجانبية (الأيونيك) */
        .side-bar { position: absolute; left: 15px; bottom: 140px; display: flex; flex-direction: column; gap: 20px; z-index: 500; }
        .btn-ionic { width: 54px; height: 54px; border-radius: 18px; background: rgba(255,255,255,0.07); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .btn-ionic i { font-size: 1.3rem; color: #fff; filter: drop-shadow(0 0 5px var(--neon)); }
        .count { font-size: 9px; font-weight: 900; margin-top: 4px; font-family: 'Orbitron'; color: rgba(255,255,255,0.6); }
        .btn-ionic:active { transform: scale(0.9) rotate(-10deg); background: var(--neon); }

        /* شريط التحكم السفلي */
        nav { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 380px; height: 70px; background: rgba(10,10,10,0.6); backdrop-filter: blur(30px); border: 1px solid rgba(255,255,255,0.1); border-radius: 35px; display: flex; justify-content: space-around; align-items: center; z-index: 1000; box-shadow: 0 -10px 40px rgba(0,0,0,0.5); }
        .admin-trigger { font-size: 2rem; color: var(--neon); cursor: pointer; transition: 0.5s; }
        .add-btn { width: 55px; height: 55px; background: var(--neon); border-radius: 20px; display: flex; align-items: center; justify-content: center; transform: translateY(-20px); border: 4px solid var(--bg); box-shadow: 0 10px 20px rgba(255,0,127,0.3); }

        /* العلامة المائية */
        .watermark { position: absolute; bottom: 100px; right: 20px; writing-mode: vertical-rl; font-family: 'Orbitron'; font-size: 10px; color: rgba(255,255,255,0.1); letter-spacing: 5px; pointer-events: none; }

        /* القوائم */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.98); backdrop-filter: blur(40px); z-index: 2000; display: none; flex-direction: column; padding: 30px; }
        .video-card { background: rgba(255,255,255,0.03); border-radius: 20px; padding: 12px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: space-between; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="v-logo">VØID_X</div>
        <div class="sys-status mt-4">INITIALIZING ELITE CORE...</div>
    </div>

    <header>
        <div class="glass-tag"><span class="brand-name font-black tracking-tighter italic">VØID_X <span class="text-pink-500">ELITE</span></span></div>
        <div class="glass-tag sys-status" id="timer">00:00:00</div>
    </header>

    <main class="viewport" id="feed"></main>

    <nav>
        <div onclick="openAdmin()"><i class="fas fa-fingerprint admin-trigger"></i></div>
        <div class="add-btn" id="upload-btn"><i class="fas fa-plus text-2xl text-white"></i></div>
        <div onclick="openChatWithAd()"><i class="fas fa-comment-alt text-2xl opacity-30"></i></div>
    </nav>

    <div id="admin-ui" class="overlay">
        <div class="flex justify-between items-center mb-10">
            <h1 class="font-[Orbitron] text-2xl text-pink-500 font-black">CORE_DATABASE</h1>
            <i class="fas fa-times text-3xl" onclick="closeAdmin()"></i>
        </div>
        <div id="admin-list" class="flex-1 overflow-y-auto"></div>
    </div>

    <div id="chat-ui" class="overlay">
        <div class="flex justify-between items-center mb-6">
            <h1 class="font-[Orbitron] text-2xl text-pink-500">SECURE_CHAT</h1>
            <i class="fas fa-chevron-down text-3xl" onclick="toggleChat()"></i>
        </div>
        <div id="chat-msgs" class="flex-1 overflow-y-auto space-y-4 pr-2"></div>
        <div class="mt-4 flex gap-2">
            <input type="text" id="msg-input" class="bg-white/5 flex-1 rounded-2xl p-4 outline-none border border-white/10" placeholder="Type encrypted message...">
            <button onclick="sendMsg()" class="bg-pink-600 px-6 rounded-2xl"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <script>
        // التكوينات التقنية (الروابط الجديدة)
        const firebaseConfig = { databaseURL: "https://fokx-c135a-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const AD_LINKS = ["https://www.effectivegatecpm.com/bxwxuk2f39?key=566216691dc8b76a740840e94f68f44c", "https://www.effectivegatecpm.com/k60w64w4gk?key=564f3d8cc4ac85949f218179b742495e"];
        let currentAd = 0;
        let isMuted = true;
        const USR_ID = "ELITE-" + Math.random().toString(36).substr(2, 4).toUpperCase();

        function triggerAd() { window.open(AD_LINKS[currentAd], '_blank'); currentAd = (currentAd + 1) % AD_LINKS.length; }
        function openChatWithAd() { triggerAd(); toggleChat(); }

        // محرك الوقت
        setInterval(() => { document.getElementById('timer').innerText = new Date().toLocaleTimeString('en-GB'); }, 1000);

        // تحميل المحتوى
        db.ref('videos').on('value', (snap) => {
            const feed = document.getElementById('feed');
            const adminList = document.getElementById('admin-list');
            const data = snap.val();
            feed.innerHTML = ''; adminList.innerHTML = '';
            
            if(data) {
                Object.keys(data).reverse().forEach(id => {
                    const v = data[id];
                    const section = document.createElement('div');
                    section.className = 'card';
                    section.innerHTML = `
                        <div class="watermark">VØID_X SUPREME</div>
                        <video loop playsinline muted src="${v.url}" onclick="this.paused ? this.play() : this.pause()"></video>
                        <div class="side-bar">
                            <div class="btn-ionic" onclick="toggleMute()">
                                <i class="fas ${isMuted ? 'fa-volume-mute' : 'fa-volume-up'} m-icon"></i>
                                <span class="count">VOL</span>
                            </div>
                            <div class="btn-ionic" onclick="likeVid('${id}')">
                                <i class="fas fa-bolt text-pink-500"></i>
                                <span class="count">${v.likes || 0}</span>
                            </div>
                            <div class="btn-ionic" onclick="openChatWithAd()">
                                <i class="fas fa-terminal"></i>
                                <span class="count">ID</span>
                            </div>
                            <div class="btn-ionic" onclick="shareVid()">
                                <i class="fas fa-share-nodes"></i>
                                <span class="count">LINK</span>
                            </div>
                        </div>
                    `;
                    feed.appendChild(section);

                    adminList.innerHTML += `
                        <div class="video-card">
                            <video src="${v.url}" class="w-12 h-12 rounded-lg object-cover"></video>
                            <span class="text-[10px] opacity-40 font-mono">${id}</span>
                            <button onclick="deleteVid('${id}')" class="text-red-500"><i class="fas fa-trash"></i></button>
                        </div>
                    `;
                });
                observeFeed();
            }
            setTimeout(() => { document.getElementById('loader').style.display = 'none'; }, 2000);
        });

        function toggleMute() {
            isMuted = !isMuted;
            document.querySelectorAll('video').forEach(v => v.muted = isMuted);
            document.querySelectorAll('.m-icon').forEach(i => i.className = isMuted ? 'fas fa-volume-mute m-icon' : 'fas fa-volume-up m-icon');
        }

        function likeVid(id) { triggerAd(); db.ref(`videos/${id}/likes`).transaction(l => (l || 0) + 1); }
        function shareVid() { triggerAd(); if(navigator.share) navigator.share({url: window.location.href}); }
        function openAdmin() { if(prompt("ACCESS CODE:") === "1234") document.getElementById('admin-ui').style.display = 'flex'; }
        function closeAdmin() { document.getElementById('admin-ui').style.display = 'none'; }
        function toggleChat() { const c = document.getElementById('chat-ui'); c.style.display = c.style.display==='flex'?'none':'flex'; }
        function deleteVid(id) { if(confirm("Permanently delete?")) db.ref(`videos/${id}`).remove(); }

        // محرك الدردشة
        function sendMsg() {
            const i = document.getElementById('msg-input');
            if(i.value.trim()) { db.ref('chat').push({u: USR_ID, t: i.value}); i.value = ''; }
        }
        db.ref('chat').limitToLast(15).on('value', s => {
            const b = document.getElementById('chat-msgs'); b.innerHTML = '';
            s.forEach(m => {
                const d = m.val();
                b.innerHTML += `<div class="bg-white/5 p-4 rounded-2xl border-r-2 border-pink-500/30">
                    <div class="text-[9px] font-black text-pink-500 mb-1 tracking-tighter">${d.u}</div>
                    <div class="text-sm opacity-80">${d.t}</div>
                </div>`;
            });
            b.scrollTop = b.scrollHeight;
        });

        // محرك الرفع السحابي (Cloudinary dk5kas1gc)
        const widget = cloudinary.createUploadWidget({
            cloudName: "dk5kas1gc", uploadPreset: "go_kck",
            clientAllowedFormats: ["mp4", "mov"], maxFiles: 1,
            styles: { palette: { window: "#000", windowBorder: "#ff007f", tabIcon: "#ff007f", menuIcons: "#ff007f", textLight: "#fff", link: "#ff007f", action: "#ff007f", inactiveTabIcon: "#444" } }
        }, (err, res) => {
            if(!err && res.event === "success") db.ref('videos').push({url: res.info.secure_url, likes: 0});
        });
        document.getElementById('upload-btn').onclick = () => widget.open();

        // محرك الملاحظة الذكي (High Performance Observer)
        function observeFeed() {
            const obs = new IntersectionObserver(entries => {
                entries.forEach(e => {
                    const v = e.target.querySelector('video');
                    if(e.isIntersecting) {
                        v.play().catch(()=>{});
                        document.documentElement.style.setProperty('--neon', ['#ff007f', '#00f3ff', '#bd00ff', '#00ff88'][Math.floor(Math.random()*4)]);
                    } else { v.pause(); v.currentTime = 0; }
                });
            }, { threshold: 0.7 });
            document.querySelectorAll('.card').forEach(c => obs.observe(c));
        }
    </script>
</body>
</html>
