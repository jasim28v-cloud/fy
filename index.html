<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VØID_X | ULTRA GLASS PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js" async></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;900&family=Cairo:wght@400;700&display=swap');
        
        :root { --neon: #ff007f; --bg: #050002; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); color: #fff; overflow: hidden; font-family: 'Cairo', sans-serif; user-select: none; -webkit-tap-highlight-color: transparent; }

        .pink-void-bg { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at 50% 50%, #1a000d 0%, #000 100%); will-change: transform; }
        
        .scroll-engine { 
            height: 100vh; 
            overflow-y: scroll; 
            scroll-snap-type: y mandatory; 
            scrollbar-width: none; 
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }
        .scroll-engine::-webkit-scrollbar { display: none; }
        
        .video-segment { 
            height: 100vh; width: 100vw; scroll-snap-align: start; scroll-snap-stop: always; 
            position: relative; overflow: hidden;
            contain: strict; /* تسريع معالجة المتصفح لكل فيديو على حدة */
        }
        .crystal-frame { width: 100%; height: 100%; position: relative; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; background: #000; will-change: transform; }

        header { position: fixed; top: 25px; left: 20px; right: 20px; z-index: 500; display: flex; justify-content: space-between; align-items: center; pointer-events: none; }
        .brand-box { padding: 8px 22px; border-radius: 20px; border-left: 4px solid var(--neon); background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); pointer-events: auto; }
        .brand-name { font-family: 'Orbitron', sans-serif; font-weight: 900; letter-spacing: 2px; color: #fff; text-shadow: 0 0 15px var(--neon); }

        .v-watermark { position: absolute; top: 20%; right: 10%; font-family: 'Orbitron'; font-size: 0.8rem; color: rgba(255,255,255,0.15); z-index: 20; letter-spacing: 4px; animation: floatMark 10s infinite; }
        @keyframes floatMark { 0%, 100% { transform: translate(0,0); } 50% { transform: translate(-15px, 30px); } }

        .side-actions { position: absolute; left: 20px; bottom: 180px; display: flex; flex-direction: column; gap: 15px; z-index: 100; }
        .action-btn { width: 55px; height: 55px; border-radius: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); transition: 0.3s; }
        .action-btn i { font-size: 1.3rem; color: var(--neon); filter: drop-shadow(0 0 8px var(--neon)); }
        .btn-label { font-size: 9px; font-weight: bold; margin-top: 2px; color: #fff; opacity: 0.7; font-family: 'Orbitron'; }

        nav { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; height: 75px; border-radius: 35px; background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-around; align-items: center; z-index: 200; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #upload-trigger { background: var(--neon); box-shadow: 0 0 25px var(--neon); cursor: pointer; width: 62px; height: 62px; border-radius: 22px; display: flex; align-items: center; justify-content: center; transform: translateY(-15px); border: 4px solid var(--bg); }

        .overlay-panel { position: fixed; inset: 0; z-index: 1000; background: rgba(5,0,2,0.96); display: none; flex-direction: column; padding: 40px 25px; backdrop-filter: blur(30px); }
        .video-item { display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.05); padding: 12px; border-radius: 18px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>

    <div class="pink-void-bg"></div>

    <header>
        <div class="brand-box"><span class="brand-name">VØID_X</span></div>
        <div class="text-[11px] font-[Orbitron] text-white/80 px-4 py-2 rounded-full border border-white/10 backdrop-blur-md" id="clock">00:00:00</div>
    </header>

    <main class="scroll-engine" id="video-stack"></main>

    <nav id="main-nav">
        <div class="text-pink-500 cursor-pointer" onclick="openAdmin()"><i class="fas fa-fingerprint text-3xl"></i></div>
        <div id="upload-trigger"><i class="fas fa-plus text-2xl text-white"></i></div>
        <div onclick="toggleChat()" style="color: rgba(255,255,255,0.3);"><i class="fas fa-comment-dots text-2xl"></i></div>
    </nav>

    <div id="admin-panel" class="overlay-panel">
        <div class="flex justify-between items-center mb-10">
            <h2 class="font-[Orbitron] text-xl text-pink-500">ADMIN_CORE</h2>
            <i class="fas fa-xmark text-3xl cursor-pointer" onclick="closeAdmin()"></i>
        </div>
        <div id="admin-list" class="flex-1 overflow-y-auto pr-2"></div>
    </div>

    <div id="chat-overlay" class="overlay-panel">
        <div class="flex justify-between items-center mb-8">
            <h2 class="font-[Orbitron] text-pink-500 text-2xl">VØID_CHAT</h2>
            <i class="fas fa-chevron-down text-3xl cursor-pointer" onclick="toggleChat()"></i>
        </div>
        <div id="chat-box" class="flex-1 overflow-y-auto space-y-4 pr-2"></div>
        <div class="mt-4 flex gap-3">
            <input type="text" id="msg-input" class="bg-white/5 flex-1 rounded-2xl p-4 outline-none border border-white/10 text-sm" placeholder="Type message...">
            <button onclick="sendMsg()" class="bg-pink-600 px-6 rounded-2xl"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <script>
        const ADMIN_CODE = "1234";
        // تم استخدام رابط الإعلان الخاص بك من المعلومات المحفوظة
        const AD_LINKS = ["https://data527.click/21330bf1d025d41336e6/57154ac610/?placementName=default"];
        let isMuted = true;
        let videoObserver = null;
        const USR_ID = "ION-" + Math.floor(Math.random()*999);

        const firebaseConfig = { databaseURL: "https://goms-8fdfd-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function triggerAd() { window.open(AD_LINKS[0], '_blank'); }
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-GB'); }, 1000);

        function toggleMute() {
            isMuted = !isMuted;
            document.querySelectorAll('video').forEach(v => v.muted = isMuted);
            document.querySelectorAll('.mute-icon').forEach(i => i.className = isMuted ? 'fas fa-volume-xmark mute-icon' : 'fas fa-volume-high mute-icon');
        }

        // جلب البيانات مع تحسين الأداء (تحميل محدود لتسريع البداية)
        db.ref('videos').limitToLast(25).on('value', (snap) => {
            const container = document.getElementById('video-stack');
            const adminList = document.getElementById('admin-list');
            const data = snap.val();
            
            // تنظيف المراقب القديم لمنع تسرب الذاكرة
            if(videoObserver) videoObserver.disconnect();
            
            container.innerHTML = ''; adminList.innerHTML = '';
            if(!data) return;
            
            const fragment = document.createDocumentFragment();
            Object.keys(data).reverse().forEach((id) => {
                const vid = data[id];
                const section = document.createElement('section');
                section.className = 'video-segment';
                section.innerHTML = `
                    <div class="crystal-frame">
                        <div class="v-watermark">VØID_X SUPREME</div>
                        <video loop playsinline muted preload="metadata" src="${vid.url}" onclick="this.paused ? this.play() : this.pause()"></video>
                        <div class="side-actions">
                            <div class="action-btn" onclick="toggleMute()">
                                <i class="${isMuted ? 'fas fa-volume-xmark' : 'fas fa-volume-high'} mute-icon"></i>
                                <span class="btn-label">AUDIO</span>
                            </div>
                            <div class="action-btn" onclick="likeVideo('${id}')">
                                <i class="fas fa-bolt"></i>
                                <span class="btn-label">${vid.likes || 0}</span>
                            </div>
                            <div class="action-btn" onclick="toggleChat()">
                                <i class="fas fa-terminal"></i>
                                <span class="btn-label">CHAT</span>
                            </div>
                            <div class="action-btn" onclick="shareVideo()">
                                <i class="fas fa-share-nodes"></i>
                                <span class="btn-label">SEND</span>
                            </div>
                        </div>
                    </div>
                `;
                fragment.appendChild(section);

                adminList.innerHTML += `
                    <div class="video-item border-l-4 border-pink-600">
                        <div class="flex items-center gap-3">
                            <video class="w-12 h-12 rounded-lg object-cover" src="${vid.url}"></video>
                            <span class="text-[10px] opacity-50 font-mono">${id.substring(0,8)}</span>
                        </div>
                        <button onclick="deleteVideo('${id}')" class="text-red-500 p-2"><i class="fas fa-trash"></i></button>
                    </div>
                `;
            });
            container.appendChild(fragment);
            initObserver();
        });

        function initObserver() {
            const colors = ['#ff007f', '#00f3ff', '#00ffaa', '#bd00ff'];
            videoObserver = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    const v = entry.target.querySelector('video');
                    if(entry.isIntersecting) { 
                        v.play().catch(()=>{});
                        document.documentElement.style.setProperty('--neon', colors[Math.floor(Math.random() * colors.length)]);
                    } else { 
                        v.pause(); 
                        v.currentTime = 0; // تحرير الذاكرة من الفيديو الذي لا يظهر
                    }
                });
            }, { threshold: 0.6 });
            document.querySelectorAll('.video-segment').forEach(s => videoObserver.observe(s));
        }

        function openAdmin() { if(prompt("ADMIN PASS:") === ADMIN_CODE) document.getElementById('admin-panel').style.display = 'flex'; }
        function closeAdmin() { document.getElementById('admin-panel').style.display = 'none'; }
        function deleteVideo(id) { if(confirm("حذف؟")) db.ref(`videos/${id}`).remove(); }
        function likeVideo(id) { triggerAd(); db.ref(`videos/${id}/likes`).transaction(l => (l || 0) + 1); }
        function shareVideo() { triggerAd(); if(navigator.share) navigator.share({url: window.location.href}); }
        function toggleChat() { 
            const c = document.getElementById('chat-overlay'); 
            c.style.display = c.style.display==='flex'?'none':'flex'; 
        }
        
        function sendMsg() {
            const inp = document.getElementById('msg-input');
            if(inp.value.trim()){ db.ref('chat').push({user:USR_ID, text:inp.value}); inp.value=''; }
        }

        db.ref('chat').limitToLast(12).on('value', s => {
            const box = document.getElementById('chat-box'); box.innerHTML = '';
            s.forEach(m => {
                const d = m.val();
                box.innerHTML += `<div class="bg-white/5 p-4 rounded-2xl border-r-2 border-pink-500/30">
                    <span class="text-[10px] text-pink-500 font-bold block mb-1 uppercase">${d.user}</span>
                    <p class="text-sm text-white/80">${d.text}</p>
                </div>`;
            });
            box.scrollTop = box.scrollHeight;
        });

        const myWidget = cloudinary.createUploadWidget({ 
            cloudName: "dpcysggzh", uploadPreset: "poro_go",
            maxFiles: 1, clientAllowedFormats: ["mp4", "mov"],
            styles: { palette: { window: "#050002", windowBorder: "#ff007f", tabIcon: "#ff007f", textLight: "#ffffff" } }
        }, (err, res) => {
            if (!err && res.event === "success") db.ref('videos/').push({ url: res.info.secure_url, likes: 0, timestamp: Date.now() });
        });
        document.getElementById("upload-trigger").onclick = () => myWidget.open();
    </script>
</body>
</html>
