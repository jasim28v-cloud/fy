<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VØID_X | HYPER ELITE v3</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;900&family=Cairo:wght@400;700&display=swap');
        
        :root { 
            --neon: #ff007f; 
            --bg: #050505; 
            --ionic-blur: blur(25px);
            --safe-area-inset-bottom: env(safe-area-inset-bottom);
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; 
            background: var(--bg); color: #fff; 
            overflow: hidden; font-family: 'Cairo', sans-serif; 
            user-select: none; -webkit-tap-highlight-color: transparent;
        }

        /* تحسين سلاسة التمرير */
        .viewport { 
            height: 100vh; overflow-y: scroll; 
            scroll-snap-type: y mandatory; scrollbar-width: none; 
            -webkit-overflow-scrolling: touch; 
        }
        .viewport::-webkit-scrollbar { display: none; }
        
        .card { 
            height: 100vh; width: 100vw; 
            scroll-snap-align: start; scroll-snap-stop: always; 
            position: relative; background: #000; overflow: hidden;
        }
        
        video { width: 100%; height: 100%; object-fit: cover; }

        /* العلامة المائية المتطورة */
        .watermark-overlay {
            position: absolute; inset: 0;
            display: flex; justify-content: center; align-items: center;
            pointer-events: none; z-index: 5; opacity: 0.15;
            font-family: 'Orbitron'; font-size: 8vw; font-weight: 900;
            color: white; transform: rotate(-25deg);
            animation: drift 10s infinite alternate ease-in-out;
            white-space: nowrap;
        }

        @keyframes drift {
            from { transform: rotate(-25deg) translateX(-10%); }
            to { transform: rotate(-25deg) translateX(10%); }
        }

        header { 
            position: fixed; top: env(safe-area-inset-top, 15px); 
            width: 100%; padding: 0 20px; z-index: 1000; 
            display: flex; justify-content: space-between; align-items: center; 
        }

        .glass-tag { 
            background: rgba(255,255,255,0.05); 
            backdrop-filter: var(--ionic-blur); -webkit-backdrop-filter: var(--ionic-blur);
            border: 1px solid rgba(255,255,255,0.1); 
            padding: 8px 18px; border-radius: 20px; 
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }

        /* أزرار جانبية ملونة بنمط نيون */
        .side-bar { 
            position: absolute; left: 15px; bottom: 160px; 
            display: flex; flex-direction: column; gap: 22px; z-index: 500; 
        }

        .btn-ionic { 
            width: 52px; height: 52px; border-radius: 18px; 
            background: rgba(15, 15, 15, 0.6); 
            backdrop-filter: var(--ionic-blur); -webkit-backdrop-filter: var(--ionic-blur);
            border: 1px solid rgba(255,255,255,0.1); 
            display: flex; flex-direction: column; align-items: center; 
            justify-content: center; transition: all 0.3s;
        }

        /* ألوان الأيقونات */
        .icon-mute { color: #ffffff; }
        .icon-like { color: #ff0055; filter: drop-shadow(0 0 5px #ff0055); }
        .icon-chat { color: #00f3ff; filter: drop-shadow(0 0 5px #00f3ff); }
        .icon-share { color: #00ff88; filter: drop-shadow(0 0 5px #00ff88); }

        .btn-ionic:active { transform: scale(0.85) rotate(5deg); }

        /* شريط التنقل السفلي */
        nav { 
            position: fixed; bottom: calc(25px + var(--safe-area-inset-bottom)); 
            left: 50%; transform: translateX(-50%); 
            width: 85%; max-width: 380px; height: 70px; 
            background: rgba(10, 10, 10, 0.8); 
            backdrop-filter: var(--ionic-blur); -webkit-backdrop-filter: var(--ionic-blur);
            border: 1px solid rgba(255,255,255,0.08); 
            border-radius: 35px; display: flex; 
            justify-content: space-around; align-items: center; z-index: 1000; 
        }

        .add-btn { 
            width: 60px; height: 60px; background: linear-gradient(45deg, var(--neon), #bd00ff); 
            border-radius: 50%; display: flex; align-items: center; 
            justify-content: center; transform: translateY(-20px); 
            border: 4px solid var(--bg); box-shadow: 0 10px 20px rgba(255,0,127,0.4);
        }

        .overlay { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.95); 
            backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            z-index: 2000; display: none; flex-direction: column; padding: 30px; 
        }
    </style>
</head>
<body>

    <header>
        <div class="glass-tag"><span class="font-[Orbitron] font-black italic tracking-tighter">VØID_X <span class="text-pink-500">SYSTEM</span></span></div>
        <div class="glass-tag font-[Orbitron] text-[10px] text-pink-400" id="timer">00:00:00</div>
    </header>

    <main class="viewport" id="feed"></main>

    <nav>
        <div onclick="openAdmin()"><i class="fas fa-key text-xl text-gray-400"></i></div>
        <div class="add-btn" id="upload-btn"><i class="fas fa-plus text-2xl text-white"></i></div>
        <div onclick="openChatWithAd()"><i class="fas fa-ghost text-xl text-gray-400"></i></div>
    </nav>

    <div id="admin-ui" class="overlay">
        <div class="flex justify-between items-center mb-8">
            <h1 class="font-[Orbitron] text-xl text-pink-500">ROOT_ACCESS</h1>
            <button onclick="closeAdmin()" class="w-10 h-10 rounded-full bg-white/10 flex items-center justify-center"><i class="fas fa-times"></i></button>
        </div>
        <div id="admin-list" class="flex-1 overflow-y-auto space-y-4"></div>
    </div>

    <div id="chat-ui" class="overlay">
        <div class="flex justify-between items-center mb-6">
            <h1 class="font-[Orbitron] text-xl text-cyan-400">ENCRYPTED_FEED</h1>
            <i class="fas fa-chevron-down" onclick="toggleChat()"></i>
        </div>
        <div id="chat-msgs" class="flex-1 overflow-y-auto space-y-4"></div>
        <div class="mt-4 flex gap-2">
            <input type="text" id="msg-input" class="bg-white/5 flex-1 rounded-2xl p-4 outline-none border border-white/10" placeholder="اكتب شيئاً...">
            <button onclick="sendMsg()" class="bg-pink-600 px-6 rounded-2xl"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://fokx-c135a-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const USR_ID = "NODE-" + Math.random().toString(36).substr(2, 4).toUpperCase();

        let isMuted = true;

        // تحديث الوقت
        setInterval(() => { 
            document.getElementById('timer').innerText = new Date().toLocaleTimeString('en-GB', { hour12: false }); 
        }, 1000);

        // جلب الفيديوهات وتحديث الواجهة
        db.ref('videos').on('value', (snap) => {
            const feed = document.getElementById('feed');
            const data = snap.val();
            feed.innerHTML = '';
            
            if(data) {
                Object.keys(data).reverse().forEach(id => {
                    const v = data[id];
                    const section = document.createElement('div');
                    section.className = 'card';
                    section.innerHTML = `
                        <div class="watermark-overlay">VØID_X ELITE</div>
                        
                        <video loop playsinline muted src="${v.url}" onclick="togglePlay(this)"></video>
                        
                        <div class="side-bar">
                            <div class="btn-ionic" onclick="toggleMute()">
                                <i class="fas ${isMuted ? 'fa-volume-mute' : 'fa-volume-up'} icon-mute"></i>
                            </div>
                            <div class="btn-ionic" onclick="likeVid('${id}')">
                                <i class="fas fa-heart icon-like"></i>
                                <span class="text-[10px] font-bold mt-1 text-pink-500">${v.likes || 0}</span>
                            </div>
                            <div class="btn-ionic" onclick="openChatWithAd()">
                                <i class="fas fa-comment-dots icon-chat"></i>
                            </div>
                            <div class="btn-ionic" onclick="shareVid()">
                                <i class="fas fa-share icon-share"></i>
                            </div>
                        </div>

                        <div class="absolute bottom-[100px] right-5 left-20 pointer-events-none">
                            <h3 class="font-[Orbitron] text-xs text-pink-500 mb-1">@SYSTEM_VØID</h3>
                            <p class="text-[11px] opacity-60">HYPER_CORE_v3 // DATA_STREAM_STABLE</p>
                        </div>
                    `;
                    feed.appendChild(section);
                });
                observeFeed();
            }
        });

        function togglePlay(v) { v.paused ? v.play() : v.pause(); }

        function toggleMute() {
            isMuted = !isMuted;
            document.querySelectorAll('video').forEach(v => v.muted = isMuted);
            // تحديث شكل الأيقونات
            document.querySelectorAll('.icon-mute').forEach(i => {
                i.className = isMuted ? 'fas fa-volume-mute icon-mute' : 'fas fa-volume-up icon-mute';
            });
        }

        function observeFeed() {
            const obs = new IntersectionObserver(entries => {
                entries.forEach(e => {
                    const v = e.target.querySelector('video');
                    if(e.isIntersecting) {
                        v.play().catch(()=>{});
                        // تأثير تغيير ألوان النيون عشوائياً عند التمرير
                        const colors = ['#ff007f', '#00f3ff', '#bd00ff', '#00ff88', '#ff8800'];
                        const randomColor = colors[Math.floor(Math.random()*colors.length)];
                        document.documentElement.style.setProperty('--neon', randomColor);
                    } else { v.pause(); v.currentTime = 0; }
                });
            }, { threshold: 0.7 });
            document.querySelectorAll('.card').forEach(c => obs.observe(c));
        }

        // باقي الوظائف (رفع، حذف، دردشة) تبقى كما هي مع الحفاظ على الكود البرمجي
        const widget = cloudinary.createUploadWidget({
            cloudName: "dk5kas1gc", uploadPreset: "go_kck",
            clientAllowedFormats: ["mp4", "mov"]
        }, (err, res) => {
            if(!err && res.event === "success") db.ref('videos').push({url: res.info.secure_url, likes: 0});
        });
        document.getElementById('upload-btn').onclick = () => widget.open();

        function openAdmin() { if(prompt("ACCESS CODE:") === "1234") document.getElementById('admin-ui').style.display = 'flex'; }
        function closeAdmin() { document.getElementById('admin-ui').style.display = 'none'; }
        function toggleChat() { const c = document.getElementById('chat-ui'); c.style.display = c.style.display==='flex'?'none':'flex'; }
        function openChatWithAd() { toggleChat(); }
        function likeVid(id) { db.ref(`videos/${id}/likes`).transaction(l => (l || 0) + 1); }
        function shareVid() { if(navigator.share) navigator.share({url: window.location.href}); }

        // نظام الدردشة المحسن
        function sendMsg() {
            const i = document.getElementById('msg-input');
            if(i.value.trim()) { db.ref('chat').push({u: USR_ID, t: i.value}); i.value = ''; }
        }

        db.ref('chat').limitToLast(15).on('value', s => {
            const b = document.getElementById('chat-msgs'); b.innerHTML = '';
            s.forEach(m => {
                const d = m.val();
                b.innerHTML += `<div class="bg-white/5 p-3 rounded-xl border-l-2 border-pink-500">
                    <div class="text-[9px] text-pink-400 font-bold uppercase">${d.u}</div>
                    <div class="text-sm">${d.t}</div>
                </div>`;
            });
            b.scrollTop = b.scrollHeight;
        });
    </script>
</body>
</html>
