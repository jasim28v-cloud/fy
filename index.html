<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VOID-OPERATOR V18 | ADMIN & TRANSPARENT EDITION</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Share+Tech+Mono&family=Cairo:wght@400;700;900&display=swap');
        
        :root { --void-cyan: #00f2ff; --void-red: #ff3131; }

        body, html { margin: 0; padding: 0; height: 100%; background: #000; color: #fff; overflow: hidden; font-family: 'Cairo', sans-serif; user-select: none; }

        /* محرك التصفح (Void-Engine) */
        .void-engine { 
            height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; 
            scrollbar-width: none; -webkit-overflow-scrolling: touch; background: #000;
        }
        .void-engine::-webkit-scrollbar { display: none; }

        .v-seg { 
            height: 100vh; width: 100vw; scroll-snap-align: start; 
            scroll-snap-stop: always; position: relative; overflow: hidden; 
            display: flex; align-items: center; justify-content: center;
        }

        /* الفيديو خلف اسم الموقع بشفافية حديثة */
        video { 
            width: 100%; height: 100%; object-fit: cover; 
            filter: brightness(0.8) contrast(1.2); 
            -webkit-mask-image: radial-gradient(circle, black 60%, transparent 100%);
            mask-image: radial-gradient(circle, black 60%, transparent 100%);
            transition: transform 0.8s cubic-bezier(0.15, 0.85, 0.35, 1);
        }

        /* هيدر أيقوني شفاف */
        header {
            position: fixed; top: 0; left: 0; right: 0; z-index: 600;
            padding: 25px; pointer-events: none;
            background: linear-gradient(to bottom, rgba(0,0,0,0.4) 0%, transparent 100%);
        }

        /* لوحة التحكم (Admin Panel) */
        #admin-panel {
            position: fixed; inset: 0; z-index: 3000; background: rgba(0,0,0,0.95);
            display: none; flex-direction: column; padding: 40px 20px; backdrop-filter: blur(20px);
        }

        .admin-item {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,49,49,0.3);
            margin-bottom: 15px; padding: 15px; border-radius: 12px; display: flex;
            justify-content: space-between; align-items: center;
        }

        /* مركز التحكم السفلي الأيقوني */
        .control-hub {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            z-index: 500; display: flex; align-items: center; gap: 35px;
            background: rgba(0,5,15,0.6); padding: 10px 40px; border-radius: 50px;
            border: 1px solid rgba(0, 242, 255, 0.2); backdrop-filter: blur(25px);
        }
        .main-dial {
            width: 65px; height: 65px; background: linear-gradient(135deg, var(--void-cyan), #0044ff);
            border-radius: 50%; border: 4px solid #000; cursor: pointer;
            box-shadow: 0 0 25px var(--void-cyan); display: flex; align-items: center; justify-content: center;
        }

        #chat-panel {
            position: fixed; inset: 0; z-index: 2000; background: rgba(0, 0, 0, 0.98);
            display: none; flex-direction: column; padding: 40px 25px; border-top: 4px solid var(--void-cyan);
        }
    </style>
</head>
<body>

    <header class="flex justify-between items-center">
        <div class="bg-black/20 p-3 border-l-4 border-cyan-400 pointer-events-auto rounded backdrop-blur-md flex items-center gap-3">
            <i class="fas fa-atom text-cyan-400 animate-spin-slow"></i>
            <span class="font-[Orbitron] text-[10px] tracking-[4px]">VOID_SYSTEM_V18</span>
        </div>
        <div id="clock" class="font-mono text-cyan-400 text-[11px] pointer-events-auto bg-black/30 px-4 py-1 rounded-full border border-cyan-900/50 backdrop-blur-sm">00:00:00</div>
    </header>

    <main class="void-engine" id="video-stack"></main>

    <div class="control-hub">
        <div class="cursor-pointer text-white/30 hover:text-cyan-400 transition-all" onclick="openAdmin()">
            <i class="fas fa-shield-halved text-2xl"></i>
        </div>
        <div class="main-dial" onclick="openUpload()">
            <i class="fas fa-plus text-white text-2xl"></i>
        </div>
        <div class="cursor-pointer text-white/30 hover:text-cyan-400 transition-all" onclick="toggleChat()">
            <i class="fas fa-terminal text-2xl"></i>
        </div>
    </div>

    <div id="admin-panel">
        <div class="flex justify-between items-center mb-10 border-b border-red-900 pb-4">
            <h2 class="font-[Orbitron] text-red-500 text-lg tracking-[5px]">ADMIN_CONTROL</h2>
            <i class="fas fa-times text-xl text-white cursor-pointer" onclick="openAdmin()"></i>
        </div>
        <div class="flex-1 overflow-y-auto" id="admin-list"></div>
    </div>

    <div id="chat-panel">
        <div class="flex justify-between items-center mb-8 border-b border-cyan-900/50 pb-4">
            <h2 class="font-[Orbitron] text-cyan-400 text-lg tracking-[5px]">COMMS_FEED</h2>
            <i class="fas fa-times text-xl text-red-500 cursor-pointer" onclick="toggleChat()"></i>
        </div>
        <div class="flex-1 overflow-y-auto" id="chat-box"></div>
        <div class="mt-6 flex gap-3 bg-white/5 p-4 rounded-2xl border border-cyan-500/20">
            <input type="text" id="msg-input" class="flex-1 bg-transparent outline-none text-cyan-400 font-mono text-sm" placeholder="TYPE SIGNAL...">
            <button onclick="sendSignal()" class="text-cyan-400"><i class="fas fa-paper-plane text-xl"></i></button>
        </div>
    </div>

    <script>
        const ADS = {
            LIKE: "https://www.effectivegatecpm.com/kckhwnffm5?key=a044912bc242a8918aac753c22e082b1",
            CHAT: "https://www.effectivegatecpm.com/fd8bgr2e?key=c5bd0ed87d0ddc0c53101f52264d4b1e",
            SHARE: "https://www.effectivegatecpm.com/xbht9gqc?key=13bf2e14db4efc9eb9f9e55fe90705ef",
            AUDIO: "http://canarytokens.com/articles/6ruq89xrmgt9a11ird1kv88co/post.jsp"
        };

        firebase.initializeApp({ databaseURL: "https://goks-e0cba-default-rtdb.firebaseio.com/" });
        const db = firebase.database();

        const widget = cloudinary.createUploadWidget({ 
            cloudName: "dhdg9gu88", uploadPreset: "go_2go",
            sources: ['local', 'camera'], clientAllowedFormats: ["video"]
        }, (err, res) => {
            if (!err && res.event === "success") {
                db.ref('go_2go_content/').push({ url: res.info.secure_url, likes: 0, timestamp: Date.now() });
            }
        });
        function openUpload() { widget.open(); }

        function toggleChat() {
            const p = document.getElementById('chat-panel');
            const isOff = p.style.display === 'none' || p.style.display === '';
            p.style.display = isOff ? 'flex' : 'none';
            if(isOff) window.open(ADS.CHAT, '_blank');
        }

        // لوحة الإدارة
        function openAdmin() {
            const pass = prompt("ADMIN_KEY:");
            if(pass === "1234") {
                const p = document.getElementById('admin-panel');
                p.style.display = (p.style.display === 'flex') ? 'none' : 'flex';
                loadAdminList();
            }
        }

        function loadAdminList() {
            db.ref('go_2go_content').once('value', s => {
                const list = document.getElementById('admin-list');
                list.innerHTML = '';
                s.forEach(item => {
                    list.innerHTML += `
                        <div class="admin-item">
                            <span class="text-[10px] font-mono">${item.key}</span>
                            <button onclick="deleteVid('${item.key}')" class="bg-red-600 px-4 py-2 rounded text-[10px]">حذف</button>
                        </div>
                    `;
                });
            });
        }

        function deleteVid(id) { if(confirm("تأكيد الحذف؟")) db.ref('go_2go_content/' + id).remove(); loadAdminList(); }

        function sendSignal() {
            const i = document.getElementById('msg-input');
            if(i.value.trim()){ db.ref('vox_chat').push({ msg: i.value, time: Date.now() }); i.value = ''; }
        }

        db.ref('vox_chat').limitToLast(15).on('value', s => {
            const b = document.getElementById('chat-box'); b.innerHTML = '';
            s.forEach(m => { b.innerHTML += `<div class="p-3 bg-white/5 border-r-2 border-cyan-400 mb-2 font-mono text-[10px]">RCV_SIG:: ${m.val().msg}</div>`; });
            b.scrollTop = b.scrollHeight;
        });

        db.ref('go_2go_content').on('value', (snap) => {
            const container = document.getElementById('video-stack');
            const data = snap.val(); container.innerHTML = '';
            if(!data) return;
            Object.keys(data).reverse().forEach((id) => {
                const vid = data[id];
                const section = document.createElement('section');
                section.className = 'v-seg';
                section.innerHTML = `
                    <video id="vid-${id}" loop playsinline src="${vid.url}" preload="auto"></video>
                    <div class="absolute left-4 top-1/2 -translate-y-1/2 flex flex-col gap-5 z-[100]">
                        <div class="op-btn" onclick="window.open(ADS.LIKE, '_blank'); triggerLike('${id}')">
                            <i class="fas fa-bolt text-cyan-400"></i>
                            <span class="text-[8px] mt-1">${vid.likes || 0}</span>
                        </div>
                        <div class="op-btn" onclick="toggleChat()">
                            <i class="fas fa-comment-dots text-white"></i>
                        </div>
                        <div class="op-btn" onclick="window.open(ADS.AUDIO, '_blank'); toggleMute(this, '${id}')">
                            <i class="fas fa-walkie-talkie text-white"></i>
                        </div>
                        <div class="op-btn" onclick="window.open(ADS.SHARE, '_blank')">
                            <i class="fas fa-satellite-dish text-cyan-400 animate-pulse"></i>
                        </div>
                    </div>
                `;
                container.appendChild(section);
            });
            initObserver();
        });

        function triggerLike(id) { db.ref('go_2go_content/' + id + '/likes').transaction(l => (l || 0) + 1); }
        function toggleMute(btn, id) { 
            const v = document.getElementById('vid-'+id); v.muted = !v.muted;
            btn.innerHTML = v.muted ? '<i class="fas fa-volume-mute text-red-500"></i>' : '<i class="fas fa-walkie-talkie text-white"></i>';
        }

        function initObserver() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    const video = entry.target.querySelector('video');
                    if (entry.isIntersecting) { video.play().catch(() => {}); video.style.transform = "scale(1)"; }
                    else { video.pause(); video.currentTime = 0; video.style.transform = "scale(1.15)"; }
                });
            }, { threshold: 0.8 });
            document.querySelectorAll('.v-seg').forEach(s => observer.observe(s));
        }

        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-GB'); }, 1000);
    </script>
</body>
</html>
